              <Section icon="📄" label="Outros Documentos"/>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="EAD Number" value={f("eadNum")} onChange={s("eadNum")} placeholder="SRC0000000000"/>
                <FInp label="EAD Validade" type="date" value={f("eadExp")} onChange={s("eadExp")}/>
              </div>
              <FInp label="A-Number (Alien Registration)" value={f("aNumber")} onChange={s("aNumber")} placeholder="A000000000"/>

              {/* I-20 Section */}
              <Section icon="🎓" label="Formulário I-20 (Estudante F-1)"/>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="Número do I-20" value={f("i20Num")} onChange={s("i20Num")} placeholder="N00000000000"/>
                <FInp label="Escola / Universidade" value={f("i20School")} onChange={s("i20School")} placeholder="Ex: Boston University"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="Data de início do programa" type="date" value={f("i20Start")} onChange={s("i20Start")}/>
                <FInp label="Data de término do programa" type="date" value={f("i20End")} onChange={s("i20End")}/>
              </div>

              {/* Visa History */}
              <Section icon="📜" label="Histórico de Status Imigratório"/>
              <VisaHistoryEditor history={visaHistory} setHistory={setVisaHistory} mobile={mobile}/>

              {msg&&<div style={{padding:"10px 14px",background:msg.type==="success"?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${msg.type==="success"?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:10,color:msg.type==="success"?T.green:T.red,fontSize:13,marginBottom:14}}>{msg.text}</div>}
              <Btn onClick={savePersonal} disabled={saving} style={{width:"100%",marginTop:4}}>{saving?"Salvando…":"💾 Salvar documentos"}</Btn>
            </Card>
          )}

          {/* TAB: Arquivos no Drive */}
          {tab==="drive"&&(
            <DocumentsSection user={clientToView||user} clients={clients} clientInfo={clientToView} isAdmin={isAdmin}/>
          )}
        </>
      )}

      {isAdmin&&!selectedClient&&(
        <Card style={{textAlign:"center",padding:40}}>
          <div style={{fontSize:36,marginBottom:12}}>👤</div>
          <div style={{color:T.faint,fontSize:14}}>Selecione um cliente acima para ver o perfil</div>
        </Card>
      )}
    </div>
  );
}

function App() {
  // ── Páginas públicas ─────────────────────────────
  const params = typeof window!=="undefined" ? new URLSearchParams(window.location.search) : new URLSearchParams();
  if (params.get("public")==="jobs")    return <PublicJobs/>;
  if (params.get("public")==="privacy") return <PrivacyPolicy/>;

  const mobile = useIsMobile();
  const [user,setUser]             = useState(null);
  const [authLoading,setAuthLoading] = useState(true);
  const [active,setActive]         = useState("dashboard");
  const [messages,setMessages]     = useState([]);
  const [payments,setPayments]     = useState([]);
  const [caseStatus,setCaseStatus] = useState([]);
  const [bulletin,setBulletin]     = useState(DEFAULT_BULLETIN);
  const [clients,setClients]       = useState([]);

  // ── Verificar sessão ao montar ───────────────────
  useEffect(()=>{
    // Timeout de segurança — nunca fica travado mais de 8 segundos
    const timeout = setTimeout(()=>setAuthLoading(false), 8000);
    initFirebase().then(()=>{
      _auth.onAuthStateChanged(_auth.inst, async fbUser => {
        clearTimeout(timeout);
        if (fbUser) {
          try {
            const doc = await dbGet("users", fbUser.uid);
            if (doc) setUser({ uid: fbUser.uid, ...doc });
          } catch(e) {
            console.error("Erro ao carregar perfil:", e);
          }
        }
        setAuthLoading(false);
      });
    }).catch(()=>setAuthLoading(false));
  },[]);

  // ── Carregar dados após login ────────────────────
  useEffect(()=>{
    if (!user || !_db) return;
    const isAdmin = user.role==="admin";
    const isDev   = user.role==="developer";
    const unsubs = [];

    if (isAdmin || isDev) {
      // Admin/Developer: escuta todos os dados em tempo real
      unsubs.push(dbListen("messages",  setMessages));
      unsubs.push(dbListen("payments",  setPayments));
      // Use real-time listener for clients to get driveFolderId updates
      unsubs.push(dbListen("users", setClients, _db.where("role","==","client")));
    } else {
      // Cliente: escuta apenas seus próprios dados
      const cid = user.clientId || user.uid;
      unsubs.push(dbListen("messages", setMessages, _db.where("clientId","==",cid)));
      unsubs.push(dbListen("payments", setPayments, _db.where("clientId","==",cid)));
      dbGet("caseStatus", cid).then(d => setCaseStatus(d?.stages || DEFAULT_CASE));
    }

    // Bulletin (compartilhado)
    dbGet("bulletin","current").then(d => { if(d) setBulletin(d); });

    return () => unsubs.forEach(u=>u());
  },[user]);

  const logout = async () => {
    await writeLog("logout", {email:user.email, role:user.role});
    await _auth.signOut(_auth.inst);
    setUser(null); setMessages([]); setPayments([]); setCaseStatus([]); setClients([]);
    setActive("dashboard");
  };

  // ── Callbacks que gravam no Firestore ────────────
  const handleSetMessages = (fn) => {
    // Apenas atualiza estado local (real-time listener mantém sync)
    setMessages(fn);
  };

  const handleAddMessage = async (msgData) => {
    const id = await dbAdd("messages", msgData);
    await writeLog("message_sent", {subject:msgData.subject, clientId:msgData.clientId, source:msgData.source});
    if (msgData.source === "client") {
      // Cliente enviou → notificar admins
      const senderName = msgData.from || "Cliente";
      for (const admin of ADMIN_NOTIFY_EMAILS) {
        await sendEmail({
          to_email:   admin.email,
          to_name:    admin.name,
          subject:    `📩 Nova mensagem de ${senderName} — Zion Portal`,
          event_type: "new_message_admin",
          message:    `${senderName} enviou uma nova mensagem no portal:\n\n` +
                      `📌 Assunto: ${msgData.subject}\n\n` +
                      `"${msgData.body}"\n\n` +
                      `Acesse o portal para responder.`,
        });
      }
    } else {
      // Zion/Sponsor enviou → notificar cliente
      const cl = clients.find(c=>(c.clientId||c.uid)===msgData.clientId);
      if (cl?.email) {
        await sendEmail({
          to_email:   cl.email,
          to_name:    cl.name?.split(" ")[0] || "Cliente",
          subject:    `✉ Nova mensagem: ${msgData.subject} — Zion Solutions`,
          event_type: "new_message",
          message:    `Você recebeu uma nova mensagem da Zion Solutions:\n\n"${msgData.body}"\n\nAcesse o portal para responder.`,
        });
      }
    }
    return id;
  };

  const handleAddPayment = async (payData) => {
    const id = await dbAdd("payments", payData);
    return id;
  };

  const handleUpdatePayment = async (id, status) => {
    await dbUpdate("payments", id, { status });
    await writeLog(`payment_${status}`, {paymentId:id, status});
    if (status==="confirmed" || status==="rejected") {
      const pay = payments.find(p=>p.id===id);
      const cl  = clients.find(c=>(c.clientId||c.uid)===pay?.clientId);
      if (cl?.email) {
        const isConfirmed = status==="confirmed";
        await sendEmail({
          to_email:   cl.email,
          to_name:    cl.name?.split(" ")[0] || "Cliente",
          subject:    isConfirmed ? "✅ Pagamento confirmado — Zion Solutions" : "❌ Comprovante rejeitado — Zion Solutions",
          event_type: isConfirmed ? "payment_confirmed" : "payment_rejected",
          message:    isConfirmed
            ? `Seu pagamento de ${fmtUSD(pay?.amount||0)} (${pay?.description}) foi confirmado pela Zion Solutions. Acesse o portal para ver seu progresso atualizado.`
            : `Seu comprovante de ${fmtUSD(pay?.amount||0)} (${pay?.description}) foi rejeitado. Por favor, acesse o portal e envie novamente com o comprovante correto.`,
        });
      }
    }
  };

  const handleDeletePayment = async (id) => {
    // Deleta o documento do Firestore
    try {
      const { deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      await deleteDoc(doc(_db.inst, "payments", id));
    } catch(e) {
      // Fallback: marca como deletado se não conseguir deletar
      await dbUpdate("payments", id, { status: "deleted", deletedAt: new Date().toISOString() });
    }
  };

  const handleUpdateCaseStatus = async (stages, clientInfo) => {
    const cid = clientInfo?.clientId || user.clientId || user.uid;
    await dbUpdate("caseStatus", cid, { stages });
    setCaseStatus(stages);
    // Notificar cliente quando status do processo muda
    if (clientInfo?.email) {
      const updatedStage = stages.find(s=>s.status!=="pending"&&s.status!=="approved");
      if (updatedStage) {
        await sendEmail({
          to_email:   clientInfo.email,
          to_name:    clientInfo.name?.split(" ")[0] || "Cliente",
          subject:    "📋 Atualização no seu processo — Zion Solutions",
          event_type: "case_update",
          message:    `Há uma atualização no seu processo de imigração. A etapa "${updatedStage.stage}" está agora com status: ${updatedStage.status}. ${updatedStage.note||""} Acesse o portal para mais detalhes.`,
        });
      }
    }
  };

  const handleUpdateBulletin = async (data) => {
    const existing = await dbGet("bulletin","current");
    if (existing) await dbUpdate("bulletin","current", data);
    else await dbAdd("bulletin", { ...data });
    setBulletin(data);
  };

  const handleAddClient = async (clientData) => {
    const id = await dbAdd("clients", clientData);
    setClients(p=>[...p, { id, ...clientData }]);
  };

  // ── Loading inicial ──────────────────────────────
  if (authLoading) return (
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:44,height:44,borderRadius:"50%",border:`3px solid rgba(200,169,110,0.2)`,borderTopColor:T.gold,animation:"spin .8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{color:T.faint,fontSize:14}}>Conectando ao Firebase…</div>
    </div>
  );

  if (!user) return <Login onLogin={u=>{setUser(u);setActive("dashboard");writeLog("login",{email:u.email,role:u.role});}}/>;

  const isAdmin = user.role==="admin";
  const isDev   = user.role==="developer";
  const unread  = messages.filter(m=>m.clientId===(user.clientId||"")&&m.source!=="client"&&!m.read).length;

  const pageTitle = {
    dashboard:(isAdmin||isDev)?"Dashboard":`Olá, ${user.name?.split(" ")[0]} 👋`,
    profile:isAdmin||isDev?"Perfil & Documentos":"Meu Perfil",
    messages:"Mensagens", payments:(isAdmin||isDev)?"Pagamentos":"Financeiro",
    cases:(isAdmin||isDev)?"Processos":"Meu Processo", bulletin:"Visa Bulletin",
    clients:"Clientes", users:"Usuários", jobs:"Vagas",
    reports:"Relatórios", devpanel:"⚡ Dev Panel", more:"Menu",
  }[active]||"";

  // Props compartilhadas entre views
  const sharedProps = {
    user, mobile, setActive,
    messages,
    setMessages: handleSetMessages,
    addMessage:  handleAddMessage,
    payments,
    addPayment:     handleAddPayment,
    updatePayment:  handleUpdatePayment,
    deletePayment:  handleDeletePayment,
    caseStatus,
    updateCaseStatus: handleUpdateCaseStatus,
    bulletin,
    updateBulletin: handleUpdateBulletin,
    clients,
    addClient: handleAddClient,
    setClients,
  };


// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const renderView = () => {
    switch(active){
      case "dashboard": return <Dashboard {...sharedProps}/>;
      case "messages":  return <Messages  {...sharedProps}/>;
      case "payments":  return <Payments  {...sharedProps}/>;
      case "cases":     return <Cases     {...sharedProps}/>;
      case "bulletin":  return <Bulletin  {...sharedProps}/>;
      case "clients":   return <Clients   {...sharedProps}/>;
      case "users":     return <Users     mobile={mobile}/>;
      case "jobs":      return <Jobs      mobile={mobile}/>;
      case "reports":   return <Reports   {...sharedProps} caseStatus={caseStatus}/>;
      case "devpanel":  return <DevPanel  payments={payments} clients={clients} messages={messages} mobile={mobile}/>;
      case "profile":   return <ClientProfile user={user} clients={clients} setClients={setClients} mobile={mobile}/>;
      case "more":      return <More user={user} setActive={setActive} onLogout={logout}/>;
      default: return null;
    }
  };

  // ── DESKTOP ────────────────────────────────────────────────────────────────
  if (!mobile) return (
    <div style={{display:"flex",minHeight:"100vh",background:T.bg,fontFamily:"Georgia,'Times New Roman',serif",color:T.text}}>
      <Sidebar user={user} active={active} setActive={setActive} onLogout={logout}/>
      <main style={{flex:1,padding:32,overflowY:"auto"}}>
        <div style={{maxWidth:960,margin:"0 auto"}}>
          <div style={{marginBottom:24}}>
            <h2 style={{color:T.text,margin:0,fontSize:22,fontWeight:700}}>{pageTitle}</h2>
            <p style={{color:T.faint,margin:"4px 0 0",fontSize:13}}>{new Date().toLocaleDateString("pt-BR",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</p>
          </div>
          {renderView()}
        </div>
      </main>
    </div>
  );

  // ── MOBILE ─────────────────────────────────────────────────────────────────
  return (
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"Georgia,'Times New Roman',serif",color:T.text,maxWidth:480,margin:"0 auto"}}>
      <div style={{position:"sticky",top:0,background:"rgba(8,13,26,0.95)",backdropFilter:"blur(10px)",borderBottom:`1px solid ${T.border}`,padding:"14px 16px",zIndex:50,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:"50%",background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:"bold",color:"#0A0F1E"}}>Z</div>
          <span style={{color:T.gold,fontWeight:700,fontSize:14}}>Zion Solutions</span>
        </div>
        <span style={{color:T.text,fontWeight:700,fontSize:16}}>{pageTitle}</span>
        <div style={{width:36}}/>
      </div>
      <div style={{padding:"16px 16px 88px"}}>{renderView()}</div>
      <BottomNav user={user} active={active} setActive={setActive} onLogout={logout} unread={unread}/>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
