// ── Cliente: plano com progresso automático + enviar comprovante ─────────────
function PaymentsClient({user,payments,addPayment,clients,mobile}) {
  const [open,setOpen]         = useState(false);
  const [stmtOpen,setStmtOpen] = useState(false);
  const [uploading,setUploading] = useState(false);
  const [selectedOption,setSelectedOption] = useState(null);
  const [receiptUrl,setReceiptUrl] = useState("");
  const [receiptFile,setReceiptFile] = useState(null);
  const [driveFolderId, setDriveFolderId] = useState(user?.driveFolderId || null);

  // Busca driveFolderId do Firestore ao montar o componente
  useEffect(()=>{
    const uid = user.uid || user.id;
    if (!uid) return;
    dbGet("users", uid).then(doc=>{
      if (doc?.driveFolderId) setDriveFolderId(doc.driveFolderId);
    }).catch(()=>{});
  }, [user.uid]);

  const myPay    = payments.filter(p=>p.clientId===user.clientId);
  const clientData = clients.find(c=>(c.clientId||c.uid)===user.clientId||c.uid===user.uid) || user;

  // Valores do plano — prioriza clientData do Firestore, depois user.plan
  const hasPlan = !!(clientData?.plan?.total || user?.plan?.total);
  const plan_assinatura  = clientData?.plan?.assinatura  ?? user?.plan?.assinatura  ?? 0;
  const plan_parcela     = clientData?.plan?.parcela     ?? user?.plan?.parcela     ?? 0;
  const plan_numParcelas = clientData?.plan?.numParcelas ?? user?.plan?.numParcelas ?? 0;
  const plan_i140        = clientData?.plan?.i140        ?? user?.plan?.i140        ?? 0;
  const plan_dependente  = clientData?.plan?.dependente  ?? user?.plan?.dependente  ?? 0;
  const totalOwed = plan_assinatura + (plan_parcela*plan_numParcelas) + plan_i140 + plan_dependente;

  // Gera lista de opções de pagamento do plano
  const planOptions = [
    { id:"assinatura", label:"Assinatura do contrato",   amount: plan_assinatura },
    // Parcelas individuais
    ...Array.from({length: plan_numParcelas}, (_,i) => ({
      id: `parcela_${i+1}`,
      label: `${i+1}ª parcela`,
      amount: plan_parcela,
    })),
    { id:"i140",      label:"Aplicação do I-140",        amount: plan_i140 },
    { id:"dependente",label:"Dependente",                amount: plan_dependente > 0 ? plan_dependente : null },
    { id:"uscis",     label:"Taxas USCIS (governo)",     amount: null, custom: true },
    { id:"outro",     label:"Outro (valor personalizado)", amount: null, custom: true },
  ].filter(o => o.amount !== 0 || o.custom); // remove itens com valor zero

  // Pagamentos confirmados para checar quais já foram pagos
  const paidLabels = myPay.filter(p=>p.status==="confirmed").map(p=>p.description);

  // Progresso por etapa
  const totalPago = myPay.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
  const pendentes = myPay.filter(p=>p.status==="pending_review");
  let saldo = totalPago;
  const calcStage = amt => { if(!amt)return{pago:0,done:false}; const p=Math.min(amt,saldo); saldo=Math.max(0,saldo-amt); return{pago:p,done:p>=amt}; };
  const s1=calcStage(plan_assinatura);
  const s2=calcStage(plan_parcela*plan_numParcelas);
  const s3=calcStage(plan_i140);
  const s4=calcStage(plan_dependente);
  const stages = [
    {label:"Assinatura do contrato",                              amount:plan_assinatura,              ...s1, icon:"✍️"},
    {label:`${plan_numParcelas}× parcelas de ${fmtUSD(plan_parcela)}`, amount:plan_parcela*plan_numParcelas, ...s2, icon:"📅"},
    {label:"Aplicação do I-140",                                  amount:plan_i140,                    ...s3, icon:"📋"},
    {label:"Dependente",                                          amount:plan_dependente,              ...s4, icon:"👥"},
    {label:"Taxas USCIS (governo)",                               amount:null, pago:0, done:false, note:"A definir", icon:"🏛"},
  ];
  const pct = Math.min(100,Math.round((totalPago/totalOwed)*100));

  const [customAmount, setCustomAmount] = useState("");

  const submit = async() => {
    if(!selectedOption) return;
    const amount = selectedOption.custom ? Number(customAmount) : selectedOption.amount;
    if(!amount||amount<=0) return;
    setUploading(true);
    try {
      let finalReceiptUrl = receiptUrl||null;

      if (receiptFile) {
        // Busca folderId fresco do Firestore na hora do submit
        let folderIdFresh = driveFolderId;
        if (!folderIdFresh) {
          try {
            const uid = user.uid || user.id;
            const freshDoc = await dbGet("users", uid);
            folderIdFresh = freshDoc?.driveFolderId || null;
            if (folderIdFresh) setDriveFolderId(folderIdFresh);
          } catch(e) {}
        }

        if (folderIdFresh) {
          try {
            const uploaded = await driveUploadFile(folderIdFresh, "💳 Comprovantes de Pagamento", receiptFile);
            finalReceiptUrl = uploaded.viewLink;
          } catch(e) {
            console.warn("Drive upload failed:", e.message);
          }
        }
      }

      await addPayment({
        clientId:    user.clientId||user.uid,
        description: selectedOption.label,
        amount,
        date:        new Date().toISOString().split("T")[0],
        status:      "pending_review",
        receiptUrl:  finalReceiptUrl,
        planOptionId: selectedOption.id,
      });
      setOpen(false); setSelectedOption(null); setReceiptUrl(""); setCustomAmount(""); setReceiptFile(null);
    } finally { setUploading(false); }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

      {/* Aviso se plano não configurado */}
      {!hasPlan&&(
        <div style={{padding:"14px 16px",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:14}}>
          <div style={{color:T.amber,fontWeight:600,fontSize:14,marginBottom:4}}>⚠️ Plano não configurado</div>
          <div style={{color:T.dim,fontSize:13,lineHeight:1.6}}>Seu plano de pagamento ainda não foi cadastrado pela Zion Solutions. Entre em contato para regularizar.</div>
        </div>
      )}
      {pendentes.length>0&&(
        <div style={{padding:"12px 16px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:T.amber,fontWeight:600,fontSize:14}}>⏳ {pendentes.length} comprovante{pendentes.length>1?"s":""} em revisão</div><div style={{color:T.dim,fontSize:12,marginTop:2}}>Aguardando confirmação da Zion Solutions</div></div>
        </div>
      )}

      {/* Card principal — progresso geral */}
      <Card style={{background:`linear-gradient(135deg,rgba(200,169,110,0.12),rgba(16,185,129,0.04))`,borderColor:"rgba(200,169,110,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{color:T.faint,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Progresso Total</div>
            <div style={{display:"flex",alignItems:"baseline",gap:8}}>
              <span style={{color:T.green,fontSize:32,fontWeight:700}}>{fmtUSD(totalPago)}</span>
              <span style={{color:T.faint,fontSize:14}}>de {fmtUSD(totalOwed)}</span>
            </div>
          </div>
          <div style={{textAlign:"center"}}>
            {/* Círculo de progresso */}
            <div style={{position:"relative",width:72,height:72}}>
              <svg width="72" height="72" style={{transform:"rotate(-90deg)"}}>
                <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="8"/>
                <circle cx="36" cy="36" r="28" fill="none" stroke={pct>=100?T.green:T.gold} strokeWidth="8"
                  strokeDasharray={`${2*Math.PI*28}`}
                  strokeDashoffset={`${2*Math.PI*28*(1-pct/100)}`}
                  strokeLinecap="round" style={{transition:"stroke-dashoffset 0.8s ease"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:pct>=100?T.green:T.gold,fontWeight:700,fontSize:15}}>{pct}%</span>
              </div>
            </div>
          </div>
        </div>
        <ProgBar value={totalPago} total={totalOwed} h={10}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
          <div><div style={{color:T.faint,fontSize:11}}>Pago</div><div style={{color:T.green,fontWeight:700,fontSize:15}}>{fmtUSD(totalPago)}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:T.faint,fontSize:11}}>Restante</div><div style={{color:T.amber,fontWeight:700,fontSize:15}}>{fmtUSD(Math.max(0,totalOwed-totalPago))}</div></div>
        </div>
      </Card>

      {/* Plano detalhado com progresso por etapa */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{color:T.gold,margin:0,fontSize:15}}>Plano de Pagamento</h3>
          <Btn onClick={()=>setOpen(true)} style={{padding:"7px 16px",fontSize:13}}>+ Enviar Comprovante</Btn>
        </div>
        {stages.map((item,i)=>(
          <div key={i} style={{padding:"14px 0",borderBottom:i<stages.length-1?`1px solid ${T.border}`:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:item.amount&&!item.done&&item.pago>0?10:0}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {/* Ícone de status */}
                <div style={{width:32,height:32,borderRadius:"50%",background:item.done?"rgba(16,185,129,0.15)":item.pago>0?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,border:`2px solid ${item.done?T.green:item.pago>0?T.amber:"rgba(255,255,255,0.1)"}`}}>
                  {item.done?"✓":item.pago>0?"…":item.icon}
                </div>
                <div>
                  <div style={{color:item.done?T.text:item.pago>0?T.text:T.dim,fontSize:13,fontWeight:item.done||item.pago>0?600:400}}>{item.label}</div>
                  {item.done&&<div style={{color:T.green,fontSize:11,marginTop:2}}>✓ Quitado</div>}
                  {!item.done&&item.pago>0&&<div style={{color:T.amber,fontSize:11,marginTop:2}}>Em andamento</div>}
                  {!item.done&&item.pago===0&&item.amount&&<div style={{color:T.faint,fontSize:11,marginTop:2}}>Aguardando etapas anteriores</div>}
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                {item.amount?(
                  item.done
                    ? <span style={{color:T.green,fontWeight:700,fontSize:14}}>{fmtUSD(item.amount)}</span>
                    : item.pago>0
                      ? <div><span style={{color:T.amber,fontWeight:700,fontSize:14}}>{fmtUSD(item.pago)}</span><div style={{color:T.faint,fontSize:11}}>{fmtUSD(item.amount)} total</div></div>
                      : <span style={{color:T.faint,fontSize:13}}>{fmtUSD(item.amount)}</span>
                ):(
                  <span style={{color:T.faint,fontSize:12,fontStyle:"italic"}}>{item.note}</span>
                )}
              </div>
            </div>
            {/* Barra de progresso parcial */}
            {item.amount&&!item.done&&item.pago>0&&(
              <div style={{marginLeft:44}}>
                <ProgBar value={item.pago} total={item.amount} color={T.amber} h={6}/>
                <div style={{color:T.faint,fontSize:11,marginTop:4}}>{Math.round((item.pago/item.amount)*100)}% desta etapa</div>
              </div>
            )}
          </div>
        ))}
      </Card>

      {/* Histórico */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h3 style={{color:T.gold,margin:0,fontSize:15}}>Histórico de Pagamentos</h3>
          <Btn variant="ghost" onClick={()=>setStmtOpen(true)} style={{padding:"6px 14px",fontSize:12}}>📄 Extrato</Btn>
        </div>
        {myPay.length===0
          ? <div style={{color:T.faint,textAlign:"center",padding:20,fontSize:13}}>Nenhum pagamento registrado.<br/><span style={{fontSize:12}}>Envie um comprovante para começar.</span></div>
          : <div style={{display:"flex",flexDirection:"column",gap:0}}>
              {[...myPay].reverse().map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:p.status==="confirmed"?T.green:p.status==="rejected"?T.red:T.amber,flexShrink:0}}/>
                    <div>
                      <div style={{color:T.text,fontWeight:600,fontSize:13}}>{p.description}</div>
                      <div style={{color:T.faint,fontSize:11,marginTop:2}}>{fmt(p.date)}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:T.gold,fontWeight:700,fontSize:14}}>{fmtUSD(p.amount)}</div>
                    <div style={{fontSize:11,marginTop:2}}>
                      {p.status==="confirmed"&&<span style={{color:T.green}}>✓ Confirmado</span>}
                      {p.status==="rejected" &&<span style={{color:T.red}}>✗ Rejeitado</span>}
                      {p.status==="pending_review"&&<span style={{color:T.amber}}>⏳ Em revisão</span>}
                    </div>
                    {p.receiptUrl&&<a href={p.receiptUrl} target="_blank" rel="noreferrer" style={{color:T.blue,fontSize:11,textDecoration:"none"}}>📎 ver</a>}
                  </div>
                </div>
              ))}
            </div>
        }
      </Card>

      <Overlay open={open} onClose={()=>{setOpen(false);setSelectedOption(null);setReceiptUrl("");setCustomAmount("");}} title="Enviar Comprovante" mobile={mobile}>
        {/* Seleção do item do plano */}
        <div style={{marginBottom:16}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>O que você está pagando? *</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:280,overflowY:"auto"}}>
            {planOptions.map(opt=>{
              const isSelected = selectedOption?.id===opt.id;
              const isPaid = paidLabels.includes(opt.label);
              return (
                <button key={opt.id} onClick={()=>!isPaid&&setSelectedOption(opt)} disabled={isPaid}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:isSelected?"rgba(232,200,122,0.15)":isPaid?"rgba(16,185,129,0.06)":T.surface,border:`2px solid ${isSelected?"rgba(232,200,122,0.5)":isPaid?"rgba(16,185,129,0.2)":T.border}`,borderRadius:12,cursor:isPaid?"default":"pointer",fontFamily:"Georgia,serif",opacity:isPaid?0.7:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:16}}>{isPaid?"✅":isSelected?"🔘":"⬜"}</span>
                    <div style={{textAlign:"left"}}>
                      <div style={{color:isPaid?T.green:T.text,fontWeight:isSelected?700:400,fontSize:14}}>{opt.label}</div>
                      {isPaid&&<div style={{color:T.green,fontSize:11}}>já pago</div>}
                    </div>
                  </div>
                  {opt.amount&&<span style={{color:isSelected?T.gold:T.faint,fontWeight:600,fontSize:14}}>{fmtUSD(opt.amount)}</span>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Valor customizado para "Outro" ou "USCIS" */}
        {selectedOption?.custom&&(
          <FInp label="Valor ($)" type="number" value={customAmount} onChange={e=>setCustomAmount(e.target.value)} placeholder="Digite o valor"/>
        )}

        {/* Resumo do selecionado */}
        {selectedOption&&(
          <div style={{padding:"12px 16px",background:"rgba(232,200,122,0.08)",border:`1px solid rgba(232,200,122,0.2)`,borderRadius:12,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{color:T.faint,fontSize:11}}>Pagamento selecionado</div><div style={{color:T.text,fontWeight:600,fontSize:14}}>{selectedOption.label}</div></div>
            <div style={{color:T.gold,fontWeight:700,fontSize:18}}>{selectedOption.amount?fmtUSD(selectedOption.amount):customAmount?fmtUSD(Number(customAmount)):"—"}</div>
          </div>
        )}

        {/* Comprovante */}
        <div style={{marginBottom:14}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Comprovante</div>
          {receiptFile ? (
            <div style={{padding:"12px 14px",background:"rgba(16,185,129,0.08)",border:"1px solid rgba(16,185,129,0.3)",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{color:T.green,fontSize:13}}>✓ {receiptFile.name}</span>
              <button onClick={()=>setReceiptFile(null)} style={{background:"none",border:"none",color:T.faint,cursor:"pointer",fontSize:20,padding:0}}>×</button>
            </div>
          ) : (
            <input type="file" accept="image/*,application/pdf" onChange={e=>{if(e.target.files&&e.target.files[0]){setReceiptFile(e.target.files[0]);setReceiptUrl("");}}} style={{display:"block",width:"100%",padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:10,color:T.dim,fontSize:13,cursor:"pointer",boxSizing:"border-box"}}/>
          )}
          <div style={{marginTop:8}}>
            <FInp label="Ou cole um link" value={receiptUrl} onChange={e=>{setReceiptUrl(e.target.value);setReceiptFile(null);}} placeholder="https://drive.google.com/..."/>
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={submit} disabled={uploading||!selectedOption||(selectedOption.custom&&!customAmount)} style={{flex:1}}>{uploading?"Enviando…":"Enviar"}</Btn>
          <Btn variant="ghost" onClick={()=>{setOpen(false);setSelectedOption(null);setReceiptUrl("");setCustomAmount("");}} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>

      <PaymentStatementModal
        open={stmtOpen}
        onClose={()=>setStmtOpen(false)}
        payments={myPay}
        client={clientData}
        mobile={mobile}/>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CASES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Cases({user,caseStatus,updateCaseStatus,clients,mobile}) {
  const isAdmin=user.role==="admin"||user.role==="developer";
  const [editing,setEditing]=useState(null), [ed,setEd]=useState({});
  const [selectedClient,setSelectedClient]=useState(null);
  const [clientCaseStatus,setClientCaseStatus]=useState(null);
  const [loadingCase,setLoadingCase]=useState(false);

  // Admin seleciona cliente → carrega caseStatus dele
  const loadClientCase = async (c) => {
    setSelectedClient(c);
    setLoadingCase(true);
    const cid = c.clientId || c.uid;
    const data = await dbGet("caseStatus", cid);
    setClientCaseStatus(data?.stages || DEFAULT_CASE);
    setLoadingCase(false);
    setEditing(null);
  };

  // Usa caseStatus do cliente selecionado (admin) ou do próprio usuário (cliente)
  const displayStatus = isAdmin ? (clientCaseStatus || []) : caseStatus;
  const clientInfo = isAdmin ? selectedClient : user;

  const save = async id => {
    const updated = displayStatus.map(s=>s.id===id?{...s,...ed}:s);
    if (isAdmin && selectedClient) {
      await updateCaseStatus(updated, selectedClient);
      setClientCaseStatus(updated);
    } else {
      await updateCaseStatus(updated);
    }
    setEditing(null);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Seletor de cliente (admin only) */}
      {isAdmin&&(
        <Card>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Selecionar Cliente</div>
          {clients.length===0
            ? <div style={{color:T.faint,fontSize:13}}>Nenhum cliente cadastrado.</div>
            : <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {clients.map(c=>(
                  <button key={c.uid} onClick={()=>loadClientCase(c)}
                    style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:selectedClient?.uid===c.uid?"rgba(232,200,122,0.12)":T.surface,border:`2px solid ${selectedClient?.uid===c.uid?"rgba(232,200,122,0.4)":T.border}`,borderRadius:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                    <div style={{textAlign:"left"}}>
                      <div style={{color:T.text,fontWeight:600,fontSize:14}}>{c.name}</div>
                      <div style={{color:T.faint,fontSize:12,marginTop:2}}>{c.caseType} · {c.sponsor||"—"}</div>
                    </div>
                    {selectedClient?.uid===c.uid&&<span style={{color:T.gold,fontSize:16}}>✓</span>}
                  </button>
                ))}
              </div>
          }
        </Card>
      )}

      {/* Timeline do processo */}
      {(!isAdmin||selectedClient)&&(
        <Card>
          <h3 style={{color:T.gold,margin:"0 0 6px",fontSize:18}}>
            Status do Processo — {clientInfo?.caseType||"EB-3"}
          </h3>
          {isAdmin&&selectedClient&&<div style={{color:T.faint,fontSize:12,marginBottom:6}}>👤 {selectedClient.name}</div>}
          {(()=>{const protos=isAdmin?selectedClient?.protocols:clientInfo?.protocols;return protos&&PROTOCOL_SITES.some(s=>protos[s.id])?(
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>
              {PROTOCOL_SITES.filter(s=>protos?.[s.id]).map(site=>(
                <a key={site.id} href={site.url} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",background:"rgba(255,255,255,0.05)",border:`1px solid ${T.border}`,borderRadius:10,textDecoration:"none"}}>
                  <span style={{color:T.faint,fontSize:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>{site.label}</span>
                  <code style={{color:T.gold,fontSize:12,fontFamily:"monospace"}}>{protos[site.id]}</code>
                  <span style={{color:T.blue,fontSize:11}}>🔗</span>
                </a>
              ))}
            </div>
          ):(!isAdmin&&<div style={{color:T.faint,fontSize:12,fontStyle:"italic",marginBottom:18}}>Nenhum protocolo cadastrado ainda.</div>);})()}
          {loadingCase&&<div style={{color:T.faint,textAlign:"center",padding:30}}>Carregando…</div>}
          {!loadingCase&&(
            <div style={{position:"relative"}}>
              <div style={{position:"absolute",left:19,top:8,bottom:8,width:2,background:T.border}}/>
              {displayStatus.map(stage=>{
                const cfg=SC[stage.status]||SC.pending;
                return (
                  <div key={stage.id} style={{display:"flex",gap:18,paddingBottom:22}}>
                    <div style={{width:40,display:"flex",justifyContent:"center",flexShrink:0,zIndex:1}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:cfg.color,marginTop:6,boxShadow:`0 0 10px ${cfg.color}66`}}/>
                    </div>
                    <div style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 16px"}}>
                      {editing===stage.id?(
                        <div>
                          <div style={{display:"flex",gap:10,marginBottom:10}}>
                            <select value={ed.status} onChange={e=>setEd(p=>({...p,status:e.target.value}))} style={{flex:1,padding:"9px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13,fontFamily:"Georgia,serif"}}>
                              {Object.entries(SC).map(([k,v])=><option key={k} value={k} style={{background:"#0D1117"}}>{v.label}</option>)}
                            </select>
                            <input type="date" value={ed.date||""} onChange={e=>setEd(p=>({...p,date:e.target.value}))} style={{padding:"9px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13}}/>
                          </div>
                          <input value={ed.note||""} onChange={e=>setEd(p=>({...p,note:e.target.value}))} placeholder="Observação" style={{width:"100%",padding:"9px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13,boxSizing:"border-box",fontFamily:"Georgia,serif",marginBottom:10}}/>
                          <div style={{display:"flex",gap:8}}>
                            <Btn style={{padding:"6px 16px",fontSize:12}} onClick={()=>save(stage.id)}>Salvar</Btn>
                            <Btn variant="ghost" style={{padding:"6px 14px",fontSize:12}} onClick={()=>setEditing(null)}>Cancelar</Btn>
                          </div>
                        </div>
                      ):(
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div>
                            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                              <span style={{color:T.text,fontWeight:700,fontSize:15}}>{stage.stage}</span>
                              <Badge status={stage.status}/>
                            </div>
                            {stage.date&&<div style={{color:T.faint,fontSize:12,marginBottom:4}}>📅 {fmt(stage.date)}</div>}
                            <div style={{color:T.dim,fontSize:13,lineHeight:1.5}}>{stage.note}</div>
                          </div>
                          {isAdmin&&<Btn variant="ghost" style={{padding:"5px 12px",fontSize:12,flexShrink:0}} onClick={()=>{setEditing(stage.id);setEd({status:stage.status,note:stage.note||"",date:stage.date||""});}}>Editar</Btn>}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      )}
      {isAdmin&&!selectedClient&&clients.length>0&&(
        <div style={{textAlign:"center",color:T.faint,fontSize:14,padding:20}}>
          ← Selecione um cliente para ver o processo
        </div>
      )}

      {/* Links de pesquisa externa — só para clientes */}
      {!isAdmin&&(
        <Card style={{borderColor:"rgba(96,165,250,0.2)",background:"rgba(96,165,250,0.03)"}}>
          <h3 style={{color:T.gold,margin:"0 0 6px",fontSize:16}}>🔍 Consultar nos Sites Oficiais</h3>
          <p style={{color:T.dim,fontSize:12,lineHeight:1.6,marginBottom:14}}>
            Cada etapa é gerenciada por um órgão diferente. Consulte diretamente:
          </p>

          {/* DOL — PERM */}
          <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:12,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{color:T.text,fontWeight:700,fontSize:13,marginBottom:3}}>🏛 PERM — DOL (Departamento do Trabalho)</div>
                <div style={{color:T.faint,fontSize:11,lineHeight:1.5}}>Para consultar o status da sua certificação de trabalho. Use seu número de protocolo <span style={{color:T.gold,fontFamily:"monospace"}}>G-200-26086-734717</span></div>
              </div>
              <a href="https://flag.dol.gov/case-status-search" target="_blank" rel="noreferrer"
                style={{display:"block",padding:"8px 14px",background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,borderRadius:9,color:"#0A0F1E",fontWeight:700,fontSize:12,textDecoration:"none",flexShrink:0,fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>
                Abrir ↗
              </a>
            </div>
          </div>

          {/* USCIS */}
          <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{color:T.text,fontWeight:700,fontSize:13,marginBottom:3}}>🦅 I-140 / I-485 / Green Card — USCIS</div>
                <div style={{color:T.faint,fontSize:11,lineHeight:1.5}}>Etapas após o PERM. Use o Receipt Number fornecido pela Zion Solutions (ex: <span style={{fontFamily:"monospace"}}>MSC259...</span>)</div>
              </div>
              <a href="https://egov.uscis.gov/casestatus/landing.do" target="_blank" rel="noreferrer"
                style={{display:"block",padding:"8px 14px",background:"rgba(96,165,250,0.15)",border:"1px solid rgba(96,165,250,0.3)",borderRadius:9,color:T.blue,fontWeight:700,fontSize:12,textDecoration:"none",flexShrink:0,fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>
                Abrir ↗
              </a>
            </div>
          </div>
        </Card>
      )}
      {/* Checklist de documentos */}
      <ChecklistSection user={user} clients={clients} isAdmin={isAdmin} clientInfo={clientInfo}/>
      {/* Documentos no Drive */}
      <DocumentsSection user={user} clients={clients} clientInfo={clientInfo} isAdmin={isAdmin}/>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DOCUMENTS SECTION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function DocumentsSection({user, clients, clientInfo, isAdmin}) {
  const client = isAdmin ? clientInfo : (clients?.find(c=>(c.clientId||c.uid)===(user.clientId||user.uid)) || user);
  const [folderId, setFolderId] = useState(client?.driveFolderId || user?.driveFolderId || null);

  // Fetch driveFolderId from Firestore if not in memory
  useEffect(()=>{
    if (folderId) return;
    const uid = isAdmin ? (clientInfo?.uid||clientInfo?.id) : (user.uid||user.id);
    if (!uid) return;
    dbGet("users", uid).then(doc=>{ if(doc?.driveFolderId) setFolderId(doc.driveFolderId); }).catch(()=>{});
  },[user.uid]);
  const [files, setFiles] = useState([]);
  const [loading, setLoading] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [subfolder, setSubfolder] = useState("🪪 Documentos Pessoais");
  const [uploadFile, setUploadFile] = useState(null);
  const [msg, setMsg] = useState(null);
  const [open, setOpen] = useState(false);

  const SUBFOLDERS = ["📋 Processo","🪪 Documentos Pessoais","💳 Comprovantes de Pagamento","📄 Contratos"];

  const loadFiles = async () => {
    if (!folderId) return;
    setLoading(true);
    try {
      const list = await driveListFiles(folderId);
      setFiles(list.filter(f=>f.mimeType!=="application/vnd.google-apps.folder"));
    } catch(e) { setMsg({type:"error",text:"Erro ao carregar arquivos: "+e.message}); }
    finally { setLoading(false); }
  };

  useEffect(()=>{ if(folderId) loadFiles(); },[folderId]);

  const doUpload = async () => {
    if (!uploadFile||!folderId) return;
    setUploading(true); setMsg(null);
    try {
      await driveUploadFile(folderId, subfolder, uploadFile);
      setMsg({type:"success",text:`✓ ${uploadFile.name} enviado para ${subfolder}`});
      setUploadFile(null); setOpen(false);
      await loadFiles();
    } catch(e) { setMsg({type:"error",text:"Erro: "+e.message}); }
    finally { setUploading(false); }
  };

  const fmtSize = b => b ? (b>1048576 ? (b/1048576).toFixed(1)+"MB" : (b/1024).toFixed(0)+"KB") : "—";
  const fileIcon = mime => mime?.includes("pdf")?"📄":mime?.includes("image")?"🖼":mime?.includes("word")?"📝":"📎";

  if (!folderId) return (
    <Card style={{borderColor:"rgba(245,158,11,0.25)",background:"rgba(245,158,11,0.05)"}}>
      <div style={{color:T.amber,fontWeight:600,marginBottom:6}}>📁 Google Drive não configurado</div>
      <div style={{color:T.dim,fontSize:13}}>{isAdmin?"Recadastre o cliente para criar a pasta automaticamente no Drive.":"Aguarde a Zion Solutions configurar seu espaço de documentos."}</div>
    </Card>
  );

  return (
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <h4 style={{color:T.gold,margin:0,fontSize:15}}>📁 Documentos no Google Drive</h4>
          <a href={`https://drive.google.com/drive/folders/${folderId}`} target="_blank" rel="noreferrer"
            style={{color:T.blue,fontSize:11,textDecoration:"none",marginTop:2,display:"inline-block"}}>
            🔗 Abrir pasta no Drive
          </a>
        </div>
        <Btn onClick={()=>setOpen(true)} style={{padding:"7px 14px",fontSize:12}}>+ Enviar arquivo</Btn>
      </div>

      {msg&&<div style={{padding:"10px 14px",background:msg.type==="success"?"rgba(16,185,129,0.1)":"rgba(239,68,68,0.1)",border:`1px solid ${msg.type==="success"?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:10,color:msg.type==="success"?T.green:T.red,fontSize:13,marginBottom:14,display:"flex",justifyContent:"space-between"}}>
        {msg.text}<button onClick={()=>setMsg(null)} style={{background:"none",border:"none",color:"inherit",cursor:"pointer"}}>×</button>
      </div>}

      {loading ? <div style={{color:T.faint,textAlign:"center",padding:20,fontSize:13}}>Carregando arquivos…</div>
      : files.length===0 ? (
        <div style={{textAlign:"center",padding:24,color:T.faint,fontSize:13}}>
          <div style={{fontSize:30,marginBottom:8}}>📂</div>
          Nenhum arquivo enviado ainda.<br/>
          <span style={{fontSize:12}}>Clique em "+ Enviar arquivo" para começar.</span>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:0}}>
          {files.map(f=>(
            <div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 0",borderBottom:`1px solid ${T.border}`}}>
              <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
                <span style={{fontSize:20,flexShrink:0}}>{fileIcon(f.mimeType)}</span>
                <div style={{minWidth:0}}>
                  <div style={{color:T.text,fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
                  <div style={{color:T.faint,fontSize:11,marginTop:1}}>{fmtSize(Number(f.size))} · {new Date(f.createdTime).toLocaleDateString("pt-BR")}</div>
                </div>
              </div>
              <a href={f.webViewLink} target="_blank" rel="noreferrer"
                style={{color:T.blue,fontSize:12,textDecoration:"none",flexShrink:0,marginLeft:10,padding:"5px 10px",background:"rgba(96,165,250,0.1)",borderRadius:8}}>
                Abrir 🔗
              </a>
            </div>
          ))}
        </div>
      )}

      <Overlay open={open} onClose={()=>{setOpen(false);setUploadFile(null);}} title="Enviar Documento" mobile={false}>
        <div style={{marginBottom:14}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Pasta de destino</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {SUBFOLDERS.map(sf=>(
              <button key={sf} onClick={()=>setSubfolder(sf)} style={{padding:"10px 14px",background:subfolder===sf?"rgba(232,200,122,0.12)":T.surface,border:`1px solid ${subfolder===sf?"rgba(232,200,122,0.4)":T.border}`,borderRadius:10,color:subfolder===sf?T.gold:T.dim,fontSize:13,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"left"}}>
                {sf}
              </button>
            ))}
          </div>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Arquivo</div>
          <div style={{padding:20,background:"rgba(255,255,255,0.04)",border:`2px dashed ${uploadFile?"rgba(16,185,129,0.4)":T.border}`,borderRadius:10,textAlign:"center"}}>
            <input type="file" id="doc-upload" onChange={e=>setUploadFile(e.target.files[0])} style={{display:"none"}}/>
            <label htmlFor="doc-upload" style={{cursor:"pointer",color:uploadFile?T.green:T.faint,fontSize:13}}>
              {uploadFile?`✓ ${uploadFile.name}`:"📎 Clique para selecionar arquivo"}
            </label>
            {uploadFile&&<div style={{color:T.faint,fontSize:11,marginTop:4}}>Será salvo em: {subfolder}</div>}
          </div>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={doUpload} disabled={!uploadFile||uploading} style={{flex:1}}>{uploading?"Enviando…":"Enviar para o Drive"}</Btn>
          <Btn variant="ghost" onClick={()=>{setOpen(false);setUploadFile(null);}} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>
    </Card>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DOCUMENT CHECKLIST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CHECKLIST_ITEMS = {
  perm: [
    { id:"perm_job_offer",     label:"Carta de oferta de emprego do sponsor" },
    { id:"perm_resume",        label:"Currículo atualizado (em inglês)" },
    { id:"perm_diploma",       label:"Diploma ou certificado de escolaridade" },
    { id:"perm_passport_copy", label:"Cópia do passaporte" },
    { id:"perm_i94",           label:"Cópia do I-94" },
  ],
  i140: [
    { id:"i140_perm_approval", label:"Cópia da aprovação do PERM" },
    { id:"i140_passport",      label:"Passaporte válido" },
    { id:"i140_birth_cert",    label:"Certidão de nascimento (traduzida)" },
    { id:"i140_marriage_cert", label:"Certidão de casamento (se aplicável)" },
    { id:"i140_photos",        label:"2 fotos 2x2 recentes" },
  ],
  i485: [
    { id:"i485_medical",       label:"Exame médico (Formulário I-693)" },
    { id:"i485_tax_returns",   label:"Declarações de imposto de renda (3 anos)" },
    { id:"i485_employment_letter", label:"Carta de emprego atual" },
    { id:"i485_bank_statements",   label:"Extratos bancários (3 meses)" },
    { id:"i485_sponsor_letter",    label:"Carta do sponsor confirmando emprego" },
    { id:"i485_photos",        label:"2 fotos 2x2 recentes" },
  ],
};

function ChecklistSection({user, clients, isAdmin, clientInfo}) {
  const client = isAdmin ? clientInfo : (clients?.find(c=>(c.clientId||c.uid)===(user.clientId||user.uid)) || user);
  const clientId = client?.clientId || client?.uid || user.clientId;
  const [checklist, setChecklist] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    if (!clientId) return;
    dbGet("checklists", clientId).then(data=>{ if(data) setChecklist(data.items||{}); });
  },[clientId]);

  const toggle = async (itemId) => {
    const newVal = !checklist[itemId];
    const updated = {...checklist, [itemId]: newVal};
    setChecklist(updated);
    setSaving(true);
    try { await dbSet("checklists", clientId, { items: updated, updatedAt: new Date().toISOString() }); }
    finally { setSaving(false); }
  };

  const stageItems = [
    { stage:"PERM", key:"perm", color:T.amber },
    { stage:"I-140", key:"i140", color:T.blue },
    { stage:"I-485 (Ajuste de Status)", key:"i485", color:T.green },
  ];

  const totalItems = Object.values(CHECKLIST_ITEMS).flat().length;
  const doneItems  = Object.values(checklist).filter(Boolean).length;
  const pct = Math.round((doneItems/totalItems)*100);

  return (
    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h4 style={{color:T.gold,margin:0,fontSize:15}}>✅ Checklist de Documentos</h4>
        <div style={{textAlign:"right"}}>
          <div style={{color:T.text,fontSize:13,fontWeight:700}}>{doneItems}/{totalItems}</div>
          <div style={{color:T.faint,fontSize:11}}>{pct}% completo</div>
        </div>
      </div>
      <ProgBar value={doneItems} total={totalItems} color={pct===100?T.green:T.gold} h={6}/>
      <div style={{marginTop:20,display:"flex",flexDirection:"column",gap:16}}>
        {stageItems.map(({stage,key,color})=>{
          const items = CHECKLIST_ITEMS[key];
          const done  = items.filter(i=>checklist[i.id]).length;
          return (
            <div key={key}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{color,fontWeight:600,fontSize:13}}>{stage}</span>
                <span style={{color:T.faint,fontSize:12}}>{done}/{items.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {items.map(item=>{
                  const done = !!checklist[item.id];
                  return (
                    <div key={item.id}
                      onClick={()=>isAdmin&&toggle(item.id)}
                      style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:done?"rgba(16,185,129,0.07)":"rgba(255,255,255,0.04)",border:`1px solid ${done?"rgba(16,185,129,0.2)":T.border}`,borderRadius:10,cursor:isAdmin?"pointer":"default",transition:"all 0.15s"}}>
                      <div style={{width:20,height:20,borderRadius:6,border:`2px solid ${done?T.green:"rgba(255,255,255,0.2)"}`,background:done?T.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12,color:"#fff"}}>
                        {done&&"✓"}
                      </div>
                      <span style={{color:done?T.dim:T.text,fontSize:13,textDecoration:done?"line-through":"none"}}>{item.label}</span>
                      {!isAdmin&&done&&<span style={{color:T.green,fontSize:11,marginLeft:"auto",flexShrink:0}}>✓ Entregue</span>}
                      {!isAdmin&&!done&&<span style={{color:T.amber,fontSize:11,marginLeft:"auto",flexShrink:0}}>Pendente</span>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      {isAdmin&&<div style={{color:T.faint,fontSize:11,marginTop:12,textAlign:"center"}}>Clique nos itens para marcar como entregue</div>}
    </Card>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BULLETIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Bulletin({user,bulletin,updateBulletin,mobile}) {
  const isAdmin=user.role==="admin";
  const [editing,setEditing]=useState(false), [draft,setDraft]=useState(bulletin), [saving,setSaving]=useState(false);
  const setB=(key,field,val)=>setDraft(p=>({...p,[key]:{...p[key],brazil:{...p[key].brazil,[field]:val}}}));
  const save=async()=>{ setSaving(true); await updateBulletin(draft); setEditing(false); setSaving(false); };
  const b=editing?draft:bulletin;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div><h3 style={{color:T.gold,margin:"0 0 4px",fontSize:18}}>Visa Bulletin — {b.month}</h3><p style={{color:T.faint,margin:0,fontSize:12}}>Fonte: {b.source} · Atualizado: {fmt(b.updated)}</p></div>
          {isAdmin&&!editing&&<Btn variant="ghost" onClick={()=>setEditing(true)} style={{padding:"7px 14px",fontSize:12}}>Editar</Btn>}
          {isAdmin&&editing&&<div style={{display:"flex",gap:8}}><Btn onClick={save} disabled={saving} style={{padding:"7px 14px",fontSize:12}}>{saving?"Salvando…":"Salvar"}</Btn><Btn variant="ghost" onClick={()=>{setEditing(false);setDraft(bulletin);}} style={{padding:"7px 14px",fontSize:12}}>Cancelar</Btn></div>}
        </div>
        {editing&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20,paddingBottom:20,borderBottom:`1px solid ${T.border}`}}>
          <FInp label="Mês" value={draft.month} onChange={e=>setDraft(p=>({...p,month:e.target.value}))}/>
          <FInp label="Data de atualização" type="date" value={draft.updated} onChange={e=>setDraft(p=>({...p,updated:e.target.value}))}/>
        </div>}
        <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:14}}>
          {[{title:"EB-3 Skilled Workers",key:"eb3",color:T.gold},{title:"EB-3 Other Workers (Unskilled)",key:"eb3Unskilled",color:T.blue}].map(({title,key,color})=>(
            <div key={key} style={{padding:16,background:"rgba(255,255,255,0.04)",borderRadius:12,border:`1px solid ${T.border}`}}>
              <div style={{color,fontWeight:600,fontSize:13,marginBottom:14}}>{title}</div>
              {[{label:"Final Action Date",field:"finalAction"},{label:"Dates for Filing",field:"datesForFiling"}].map(({label,field})=>(
                <div key={field} style={{marginBottom:12}}>
                  <div style={{color:T.faint,fontSize:11,marginBottom:4}}>BRASIL — {label}</div>
                  {editing?<input value={b[key].brazil[field]} onChange={e=>setB(key,field,e.target.value)} style={{width:"100%",padding:"8px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13,boxSizing:"border-box",fontFamily:"Georgia,serif"}}/>:<div style={{color:b[key].brazil[field]==="Current"?T.green:color,fontWeight:700,fontSize:16}}>{b[key].brazil[field]==="Current"?"🟢 Current":fmt(b[key].brazil[field])}</div>}
                </div>
              ))}
            </div>
          ))}
        </div>
      </Card>
      {!isAdmin&&(
        <div style={{padding:16,background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:14}}>
          <div style={{color:T.amber,fontWeight:600,marginBottom:8}}>⚠️ Sua Situação</div>
          <div style={{color:"rgba(255,255,255,0.65)",fontSize:14,lineHeight:1.7}}>Priority date: <strong style={{color:T.text}}>{fmt(user.priorityDate)||"27/03/2026"}</strong>. EB-3 Unskilled analisando até <strong style={{color:T.text}}>{fmt(bulletin.eb3Unskilled.brazil.datesForFiling)}</strong>. Faltam aprox. <strong style={{color:T.text}}>3 anos e 7 meses</strong> para o I-485.</div>
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CLIENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DEPENDENTS TAB — sub-component
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function DependentsTab({form, setForm}) {
  const deps = (() => { try { return JSON.parse(form.dependents||"[]"); } catch{ return []; } })();
  const setDeps = (arr) => setForm(p=>({...p, dependents: JSON.stringify(arr)}));
  const add = () => setDeps([...deps, {name:"",relation:"cônjuge",dob:"",passportNum:"",passportExp:"",visaType:"",visaExp:"",inProcess:false}]);
  const upd = (i, key, val) => { const a=[...deps]; a[i]={...a[i],[key]:val}; setDeps(a); };
  const rem = (i) => setDeps(deps.filter((_,j)=>j!==i));
  const RELATIONS = ["cônjuge","filho(a)","pai/mãe","outro"];
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{padding:"8px 12px",background:"rgba(96,165,250,0.08)",borderRadius:10,color:T.blue,fontSize:12,fontWeight:600}}>👨‍👩‍👧 Dependentes</div>
        <Btn onClick={add} style={{padding:"7px 14px",fontSize:12}}>+ Adicionar</Btn>
      </div>
      {deps.length===0&&(
        <div style={{textAlign:"center",padding:"30px 0",color:T.faint,fontSize:13}}>
          <div style={{fontSize:32,marginBottom:10}}>👨‍👩‍👧</div>
          Nenhum dependente adicionado.<br/>
          <span style={{fontSize:12}}>Clique em "+ Adicionar" para incluir cônjuge, filhos, etc.</span>
        </div>
      )}
      {deps.map((dep,i)=>(
        <div key={i} style={{marginBottom:16,padding:16,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{color:T.gold,fontWeight:600,fontSize:14}}>Dependente {i+1}</span>
            <button onClick={()=>rem(i)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:7,color:T.red,fontSize:12,cursor:"pointer",padding:"4px 10px",fontFamily:"Georgia,serif"}}>Remover</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <FInp label="Nome completo" value={dep.name} onChange={e=>upd(i,"name",e.target.value)} placeholder="Nome do dependente"/>
            <div style={{marginBottom:14}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Parentesco</div><select value={dep.relation} onChange={e=>upd(i,"relation",e.target.value)} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>{RELATIONS.map(r=><option key={r} value={r} style={{background:"#0D1117"}}>{r.charAt(0).toUpperCase()+r.slice(1)}</option>)}</select></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <FInp label="Data de nascimento" type="date" value={dep.dob} onChange={e=>upd(i,"dob",e.target.value)}/>
            <FInp label="Nº Passaporte" value={dep.passportNum} onChange={e=>upd(i,"passportNum",e.target.value)} placeholder="AB123456"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
            <FInp label="Validade Passaporte" type="date" value={dep.passportExp} onChange={e=>upd(i,"passportExp",e.target.value)}/>
            <div style={{marginBottom:14}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Tipo de Visto</div><select value={dep.visaType} onChange={e=>upd(i,"visaType",e.target.value)} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>{"Selecione,B-1/B-2,F-2,H-4,TD,Outro".split(",").map(v=><option key={v} value={v} style={{background:"#0D1117"}}>{v}</option>)}</select></div>
