        <div style={{display:"flex",gap:4,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
          {FORM_TABS.map(t=>(
            <button key={t.id} onClick={()=>setFormTab(t.id)} style={{padding:"7px 12px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,whiteSpace:"nowrap",background:formTab===t.id?`linear-gradient(135deg,${T.goldDim},${T.gold})`:"rgba(255,255,255,0.06)",color:formTab===t.id?"#0A0F1E":T.dim,fontFamily:"Georgia,serif",flexShrink:0}}>
              {t.label}
            </button>
          ))}
        </div>

        {/* ABA 1 — PROCESSO */}
        {formTab==="processo"&&(
          <div>
            <div style={{padding:"8px 12px",background:"rgba(232,200,122,0.08)",borderRadius:10,marginBottom:14,color:T.gold,fontSize:12,fontWeight:600}}>👤 Identificação</div>
            <FInp label="Nome completo *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Nome do cliente"/>
            <FInp label="E-mail *" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="email@cliente.com"/>
            {form.name&&<div style={{padding:"10px 14px",background:"rgba(96,165,250,0.08)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:10,marginBottom:14,fontSize:13,color:T.dim}}>🔑 Senha padrão: <strong style={{color:T.text,fontFamily:"monospace"}}>{form.name.trim().split(" ")[0].toLowerCase()}</strong><div style={{fontSize:11,marginTop:4,color:T.faint}}>Cliente pode alterar via "Esqueci minha senha"</div></div>}
            <div style={{padding:"8px 12px",background:"rgba(232,200,122,0.08)",borderRadius:10,margin:"6px 0 14px",color:T.gold,fontSize:12,fontWeight:600}}>📋 Processo Imigratório</div>
            <div style={{marginBottom:14}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Tipo de Processo</div><select value={form.caseType} onChange={e=>setForm(p=>({...p,caseType:e.target.value}))} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>{TYPES.map(t=><option key={t} value={t} style={{background:"#0D1117"}}>{t}</option>)}</select></div>
            <FInp label="Sponsor / Employer" value={form.sponsor} onChange={e=>setForm(p=>({...p,sponsor:e.target.value}))} placeholder="Empresa patrocinadora"/>
            <FInp label="Priority Date" type="date" value={form.priorityDate} onChange={e=>setForm(p=>({...p,priorityDate:e.target.value}))}/>
            <div style={{padding:"8px 12px",background:"rgba(96,165,250,0.08)",borderRadius:10,margin:"6px 0 14px",color:T.blue,fontSize:12,fontWeight:600}}>🔢 Protocolos <span style={{color:T.faint,fontWeight:400}}>(opcional)</span></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {PROTOCOL_SITES.map(site=>(<FInp key={site.id} label={site.label} value={form[`proto_${site.id}`]||""} onChange={e=>setForm(p=>({...p,[`proto_${site.id}`]:e.target.value}))} placeholder={site.placeholder}/>))}
            </div>
            {planFormJSX}
          </div>
        )}

        {/* ABA 2 — DADOS PESSOAIS */}
        {formTab==="pessoal"&&(
          <div>
            <div style={{padding:"8px 12px",background:"rgba(96,165,250,0.08)",borderRadius:10,marginBottom:14,color:T.blue,fontSize:12,fontWeight:600}}>📞 Contato</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FInp label="Telefone" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="(617) 000-0000"/>
              <FInp label="WhatsApp" value={form.whatsapp} onChange={e=>setForm(p=>({...p,whatsapp:e.target.value}))} placeholder="+55 11 00000-0000"/>
            </div>
            <div style={{padding:"8px 12px",background:"rgba(96,165,250,0.08)",borderRadius:10,margin:"6px 0 14px",color:T.blue,fontSize:12,fontWeight:600}}>🧑 Informações Pessoais</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FInp label="Data de nascimento" type="date" value={form.dob} onChange={e=>setForm(p=>({...p,dob:e.target.value}))}/>
              <FInp label="Nacionalidade" value={form.nationality} onChange={e=>setForm(p=>({...p,nationality:e.target.value}))} placeholder="Brasileira"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FInp label="CPF (Brasil)" value={form.cpf} onChange={e=>setForm(p=>({...p,cpf:e.target.value}))} placeholder="000.000.000-00"/>
              <FInp label="SSN (EUA, opcional)" value={form.ssn} onChange={e=>setForm(p=>({...p,ssn:e.target.value}))} placeholder="XXX-XX-XXXX"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{marginBottom:14}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Estado Civil</div><select value={form.maritalStatus} onChange={e=>setForm(p=>({...p,maritalStatus:e.target.value}))} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>{["solteiro","casado","divorciado","viúvo","união estável"].map(s=><option key={s} value={s} style={{background:"#0D1117"}}>{s.charAt(0).toUpperCase()+s.slice(1)}</option>)}</select></div>
              <FInp label="Profissão / Ocupação" value={form.occupation} onChange={e=>setForm(p=>({...p,occupation:e.target.value}))} placeholder="Ex: Cook, Caregiver"/>
            </div>
            <div style={{padding:"8px 12px",background:"rgba(96,165,250,0.08)",borderRadius:10,margin:"6px 0 14px",color:T.blue,fontSize:12,fontWeight:600}}>🏠 Endereço nos EUA</div>
            <FInp label="Rua e número" value={form.addrStreet} onChange={e=>setForm(p=>({...p,addrStreet:e.target.value}))} placeholder="123 Main St, Apt 2"/>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:12}}>
              <FInp label="Cidade" value={form.addrCity} onChange={e=>setForm(p=>({...p,addrCity:e.target.value}))} placeholder="Milford"/>
              <FInp label="Estado" value={form.addrState} onChange={e=>setForm(p=>({...p,addrState:e.target.value}))} placeholder="MA"/>
              <FInp label="ZIP" value={form.addrZip} onChange={e=>setForm(p=>({...p,addrZip:e.target.value}))} placeholder="01757"/>
            </div>
          </div>
        )}

        {/* ABA 3 — DOCUMENTOS */}
        {formTab==="documentos"&&(
          <div>
            <div style={{padding:"8px 12px",background:"rgba(139,92,246,0.1)",borderRadius:10,marginBottom:14,color:"#A78BFA",fontSize:12,fontWeight:600}}>🛂 Passaporte</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FInp label="Número do passaporte" value={form.passportNum} onChange={e=>setForm(p=>({...p,passportNum:e.target.value}))} placeholder="AB123456"/>
              <FInp label="Validade" type="date" value={form.passportExp} onChange={e=>setForm(p=>({...p,passportExp:e.target.value}))}/>
            </div>
            {form.passportExp&&new Date(form.passportExp)<new Date(Date.now()+180*24*60*60*1000)&&(
              <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,marginBottom:14,color:T.red,fontSize:13}}>⚠️ Passaporte vence em menos de 6 meses!</div>
            )}
            <div style={{padding:"8px 12px",background:"rgba(139,92,246,0.1)",borderRadius:10,margin:"6px 0 14px",color:"#A78BFA",fontSize:12,fontWeight:600}}>🇺🇸 Visto Atual</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
              <div style={{marginBottom:14}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Tipo de Visto</div><select value={form.visaType} onChange={e=>setForm(p=>({...p,visaType:e.target.value}))} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>{"Selecione,B-1/B-2,F-1,J-1,H-1B,H-4,L-1,O-1,TN,E-2,EB-1,EB-2,EB-3,Sem visto (EWI),Outro".split(",").map(v=><option key={v} value={v} style={{background:"#0D1117"}}>{v}</option>)}</select></div>
              <FInp label="Número do visto" value={form.visaNum} onChange={e=>setForm(p=>({...p,visaNum:e.target.value}))} placeholder="V0000000"/>
              <FInp label="Validade" type="date" value={form.visaExp} onChange={e=>setForm(p=>({...p,visaExp:e.target.value}))}/>
            </div>
            {form.visaExp&&new Date(form.visaExp)<new Date(Date.now()+90*24*60*60*1000)&&(
              <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,marginBottom:14,color:T.red,fontSize:13}}>⚠️ Visto vence em menos de 90 dias!</div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FInp label="Data de entrada nos EUA" type="date" value={form.entryDate} onChange={e=>setForm(p=>({...p,entryDate:e.target.value}))}/>
              <FInp label="I-94 Number" value={form.i94} onChange={e=>setForm(p=>({...p,i94:e.target.value}))} placeholder="00000000000"/>
            </div>
            <div style={{padding:"8px 12px",background:"rgba(139,92,246,0.1)",borderRadius:10,margin:"6px 0 14px",color:"#A78BFA",fontSize:12,fontWeight:600}}>📄 Outros Documentos</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FInp label="EAD Number" value={form.eadNum} onChange={e=>setForm(p=>({...p,eadNum:e.target.value}))} placeholder="SRC0000000000"/>
              <FInp label="EAD Validade" type="date" value={form.eadExp} onChange={e=>setForm(p=>({...p,eadExp:e.target.value}))}/>
            </div>
            <FInp label="A-Number (Alien Registration)" value={form.aNumber} onChange={e=>setForm(p=>({...p,aNumber:e.target.value}))} placeholder="A000000000"/>
          </div>
        )}

        {/* ABA 4 — DEPENDENTES */}
        {formTab==="dependentes"&&(
          <DependentsTab form={form} setForm={setForm}/>
        )}

        {/* ABA 5 — EMPREGO */}
        {formTab==="emprego"&&(
          <div>
            <div style={{padding:"8px 12px",background:"rgba(16,185,129,0.08)",borderRadius:10,marginBottom:14,color:T.green,fontSize:12,fontWeight:600}}>💼 Emprego Atual</div>
            <FInp label="Empregador atual" value={form.currentEmployer} onChange={e=>setForm(p=>({...p,currentEmployer:e.target.value}))} placeholder="Nome da empresa"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <FInp label="Cargo / Função" value={form.currentRole} onChange={e=>setForm(p=>({...p,currentRole:e.target.value}))} placeholder="Ex: Cook, Caregiver"/>
              <FInp label="Data de início" type="date" value={form.employmentStart} onChange={e=>setForm(p=>({...p,employmentStart:e.target.value}))}/>
            </div>
            <FInp label="Salário por hora ($)" value={form.salary} onChange={e=>setForm(p=>({...p,salary:e.target.value}))} placeholder="Ex: 22.00" type="number"/>
            <div style={{padding:"8px 12px",background:"rgba(16,185,129,0.08)",borderRadius:10,margin:"6px 0 14px",color:T.green,fontSize:12,fontWeight:600}}>📋 Histórico de Empregos nos EUA</div>
            <div style={{marginBottom:14}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Empregos anteriores (opcional)</div><textarea value={form.prevEmployers} onChange={e=>setForm(p=>({...p,prevEmployers:e.target.value}))} rows={4} placeholder="Ex:&#10;Edgstone Hospitality — Cook — Jan 2023 a Dez 2023&#10;Embassy Suites — Cook — Jan 2024 a atual" style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:14,resize:"none",boxSizing:"border-box",fontFamily:"Georgia,serif",outline:"none"}}/></div>
          </div>
        )}

        {msg&&<div style={{padding:"10px 14px",background:msg.type==="success"?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${msg.type==="success"?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:10,color:msg.type==="success"?T.green:T.red,fontSize:13,marginBottom:14,marginTop:8}}>{msg.text}</div>}
        <div style={{display:"flex",gap:10,marginTop:8}}>
          {formTab!=="processo"&&<Btn variant="ghost" onClick={()=>setFormTab(FORM_TABS[FORM_TABS.findIndex(t=>t.id===formTab)-1].id)} style={{padding:"10px 16px",fontSize:13}}>‹ Anterior</Btn>}
          {formTab!=="emprego"&&<Btn variant="ghost" onClick={()=>setFormTab(FORM_TABS[FORM_TABS.findIndex(t=>t.id===formTab)+1].id)} style={{flex:1,fontSize:13}}>Próximo ›</Btn>}
          {formTab==="emprego"&&<Btn onClick={add} disabled={loading} style={{flex:1}}>{loading?"Cadastrando…":"Cadastrar e Enviar Boas-Vindas"}</Btn>}
          <Btn variant="ghost" onClick={()=>{setOpen(false);setFormTab("processo");}} style={{padding:"10px 16px",fontSize:13}}>Cancelar</Btn>
        </div>
      </Overlay>
      {/* Ver plano */}
      <Overlay open={!!planView} onClose={()=>setPlanView(null)} title={`Plano — ${planView?.name?.split(" ")[0]}`} mobile={mobile}>
        {planView?.plan&&<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          {[{label:"Assinatura do contrato",value:fmtUSD(planView.plan.assinatura)},{label:`${planView.plan.numParcelas}× parcelas de`,value:fmtUSD(planView.plan.parcela)},{label:"Aplicação do I-140",value:fmtUSD(planView.plan.i140)},{label:"Dependente",value:fmtUSD(planView.plan.dependente)}].map((row,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"11px 14px",background:"rgba(255,255,255,0.04)",borderRadius:10,border:`1px solid ${T.border}`}}><span style={{color:T.dim,fontSize:13}}>{row.label}</span><span style={{color:T.gold,fontWeight:700}}>{row.value}</span></div>
          ))}
          <div style={{display:"flex",justifyContent:"space-between",padding:"13px 14px",background:"rgba(232,200,122,0.1)",borderRadius:10,border:`1px solid rgba(232,200,122,0.25)`}}><span style={{color:T.text,fontWeight:700,fontSize:14}}>TOTAL DO PROCESSO</span><span style={{color:T.gold,fontWeight:700,fontSize:18}}>{fmtUSD(planView.plan.total)}</span></div>
        </div>}
        {planView?.plan?.obs&&<div style={{padding:"10px 14px",background:T.surface,borderRadius:10,color:T.dim,fontSize:13,marginBottom:12}}>📝 {planView.plan.obs}</div>}
        <div style={{color:T.faint,fontSize:11}}>⚠️ Taxas USCIS cobradas separadamente pelo governo.</div>
      </Overlay>
      {/* Ver Perfil Completo */}
      <Overlay open={!!viewProfile} onClose={()=>setViewProfile(null)} title={`Perfil — ${viewProfile?.name?.split(" ").slice(0,2).join(" ")}`} mobile={mobile} width={560}>
        {viewProfile&&(()=>{
          const c=viewProfile;
          const Section=({icon,label,children})=><div style={{marginBottom:20}}><div style={{padding:"7px 12px",background:"rgba(255,255,255,0.04)",borderRadius:9,marginBottom:12,color:T.gold,fontSize:12,fontWeight:600}}>{icon} {label}</div>{children}</div>;
          const Row=({label,value})=>value?<div style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${T.border}`}}><span style={{color:T.faint,fontSize:13}}>{label}</span><span style={{color:T.text,fontSize:13,fontWeight:600,textAlign:"right",maxWidth:"60%"}}>{value}</span></div>:null;
          const deps=Array.isArray(c.dependents)?c.dependents:[];
          return(
            <div style={{maxHeight:"70vh",overflowY:"auto"}}>
              <Section icon="📋" label="Processo">
                <Row label="Tipo" value={c.caseType}/><Row label="Sponsor" value={c.sponsor}/><Row label="Priority Date" value={fmt(c.priorityDate)}/><Row label="E-mail" value={c.email}/>
              </Section>
              {c.personal&&<Section icon="👤" label="Dados Pessoais">
                <Row label="Telefone" value={c.personal.phone}/><Row label="WhatsApp" value={c.personal.whatsapp}/><Row label="Nascimento" value={fmt(c.personal.dob)}/><Row label="Nacionalidade" value={c.personal.nationality}/><Row label="CPF" value={c.personal.cpf}/><Row label="Estado Civil" value={c.personal.maritalStatus}/><Row label="Profissão" value={c.personal.occupation}/><Row label="Endereço" value={c.personal.address?.street&&`${c.personal.address.street}, ${c.personal.address.city} ${c.personal.address.state} ${c.personal.address.zip}`}/>
              </Section>}
              {c.documents&&<Section icon="🪪" label="Documentos">
                <Row label="Passaporte" value={c.documents.passportNum&&`${c.documents.passportNum} (val: ${fmt(c.documents.passportExp)})`}/><Row label="Visto" value={c.documents.visaType&&`${c.documents.visaType} ${c.documents.visaNum||""} (val: ${fmt(c.documents.visaExp)})`}/><Row label="Entrada nos EUA" value={fmt(c.documents.entryDate)}/><Row label="I-94" value={c.documents.i94}/><Row label="EAD" value={c.documents.eadNum&&`${c.documents.eadNum} (val: ${fmt(c.documents.eadExp)})`}/><Row label="A-Number" value={c.documents.aNumber}/>
              </Section>}
              {deps.length>0&&<Section icon="👨‍👩‍👧" label="Dependentes">
                {deps.map((d,i)=><div key={i} style={{padding:"10px 12px",background:"rgba(255,255,255,0.04)",borderRadius:10,marginBottom:8}}><div style={{color:T.text,fontWeight:600,fontSize:14,marginBottom:4}}>{d.name} <span style={{color:T.faint,fontWeight:400,fontSize:12}}>({d.relation})</span></div><div style={{color:T.faint,fontSize:12}}>Nasc: {fmt(d.dob)} · Passaporte: {d.passportNum||"—"} · Visto: {d.visaType||"—"}{d.inProcess?" · ✅ No processo":""}</div></div>)}
              </Section>}
              {c.employment&&<Section icon="💼" label="Emprego">
                <Row label="Empregador" value={c.employment.currentEmployer}/><Row label="Cargo" value={c.employment.currentRole}/><Row label="Início" value={fmt(c.employment.employmentStart)}/><Row label="Salário/hora" value={c.employment.salary&&`$${c.employment.salary}`}/>
                {c.employment.prevEmployers&&<div style={{marginTop:10}}><div style={{color:T.faint,fontSize:12,marginBottom:6}}>Histórico:</div><div style={{color:T.dim,fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{c.employment.prevEmployers}</div></div>}
              </Section>}
            </div>
          );
        })()}
      </Overlay>
      {/* Editar Protocolos */}
      <Overlay open={!!editProtos} onClose={()=>setEditProtos(null)} title={`Protocolos — ${editProtos?.name?.split(" ")[0]}`} mobile={mobile}>
        <div style={{padding:"8px 12px",background:"rgba(96,165,250,0.08)",borderRadius:10,marginBottom:16,color:T.blue,fontSize:12}}>🔢 Números de protocolo para acompanhamento nos sites oficiais</div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {PROTOCOL_SITES.map(site=>(
            <div key={site.id}>
              <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>{site.label}</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <input value={protosForm[site.id]} onChange={e=>setProtosForm(p=>({...p,[site.id]:e.target.value}))} placeholder={site.placeholder}
                  style={{flex:1,padding:"10px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13,fontFamily:"Georgia,serif"}}/>
                {protosForm[site.id]&&<a href={site.url} target="_blank" rel="noreferrer" style={{color:T.blue,fontSize:12,textDecoration:"none",flexShrink:0}}>🔗 Verificar</a>}
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <Btn onClick={saveProtos} disabled={savingProtos} style={{flex:1}}>{savingProtos?"Salvando…":"Salvar Protocolos"}</Btn>
          <Btn variant="ghost" onClick={()=>setEditProtos(null)} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>
      {/* Editar / Definir plano */}
      <Overlay open={!!editPlan} onClose={()=>setEditPlan(null)} title={`${editPlan?.plan?"Editar":"Definir"} Plano — ${editPlan?.name?.split(" ")[0]}`} mobile={mobile}>
        <div style={{padding:"8px 12px",background:"rgba(16,185,129,0.08)",borderRadius:10,marginBottom:16,color:T.green,fontSize:12,fontWeight:600}}>💰 Plano de Pagamento Personalizado</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <FInp label="Assinatura ($)" type="number" value={planForm.pAssinatura} onChange={e=>setPlanForm(p=>({...p,pAssinatura:e.target.value}))}/>
          <FInp label="I-140 ($)"     type="number" value={planForm.pI140}        onChange={e=>setPlanForm(p=>({...p,pI140:e.target.value}))}/>
          <FInp label="Valor parcela ($)" type="number" value={planForm.pParcela}     onChange={e=>setPlanForm(p=>({...p,pParcela:e.target.value}))}/>
          <FInp label="Nº de parcelas"    type="number" value={planForm.pNumParcelas} onChange={e=>setPlanForm(p=>({...p,pNumParcelas:e.target.value}))}/>
        </div>
        <FInp label="Dependente ($)" type="number" value={planForm.pDependente} onChange={e=>setPlanForm(p=>({...p,pDependente:e.target.value}))} placeholder="0"/>
        <div style={{padding:"12px 16px",background:"rgba(232,200,122,0.08)",border:`1px solid rgba(232,200,122,0.2)`,borderRadius:12,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{color:T.dim,fontSize:13}}>Total do processo</span>
            <span style={{color:T.gold,fontSize:20,fontWeight:700}}>{fmtUSD(planTotal())}</span>
          </div>
          <div style={{color:T.faint,fontSize:11,marginTop:4}}>
            Assin. {fmtUSD(Number(planForm.pAssinatura)||0)} + {planForm.pNumParcelas||0}× {fmtUSD(Number(planForm.pParcela)||0)} + I-140 {fmtUSD(Number(planForm.pI140)||0)} + Dep. {fmtUSD(Number(planForm.pDependente)||0)}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Observações</div>
          <textarea value={planForm.pObs} onChange={e=>setPlanForm(p=>({...p,pObs:e.target.value}))} rows={2} placeholder="Ex: Taxas USCIS separadas" style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:14,resize:"none",boxSizing:"border-box",fontFamily:"Georgia,serif"}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={savePlan} disabled={savingPlan} style={{flex:1}}>{savingPlan?"Salvando…":"Salvar Plano"}</Btn>
          <Btn variant="ghost" onClick={()=>setEditPlan(null)} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>

      {/* Editar dados do cliente */}
      <Overlay open={!!editClient} onClose={()=>setEditClient(null)} title={`Editar — ${editClient?.name?.split(" ")[0]}`} mobile={mobile}>
        <div style={{padding:"8px 12px",background:"rgba(232,200,122,0.08)",borderRadius:10,marginBottom:16,color:T.gold,fontSize:12,fontWeight:600}}>👤 Dados do Cliente</div>
        <FInp label="Nome completo *" value={editForm.name||""} onChange={e=>setEditForm(p=>({...p,name:e.target.value}))} placeholder="Nome do cliente"/>
        <FInp label="E-mail *" type="email" value={editForm.email||""} onChange={e=>setEditForm(p=>({...p,email:e.target.value}))} placeholder="email@cliente.com"/>
        <div style={{padding:"10px 14px",background:"rgba(96,165,250,0.07)",border:"1px solid rgba(96,165,250,0.2)",borderRadius:10,marginBottom:14,fontSize:12,color:T.dim}}>
          ℹ️ A atualização do e-mail de login funciona apenas se o cliente ainda usar a senha padrão (primeiro nome). Se já alterou a senha, será necessário atualizar no Firebase Console.
        </div>
        <div style={{marginBottom:14}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Tipo de Processo</div>
          <select value={editForm.caseType||"EB-3"} onChange={e=>setEditForm(p=>({...p,caseType:e.target.value}))} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>
            {TYPES.map(t=><option key={t} value={t} style={{background:"#0D1117"}}>{t}</option>)}
          </select>
        </div>
        <FInp label="Sponsor / Employer" value={editForm.sponsor||""} onChange={e=>setEditForm(p=>({...p,sponsor:e.target.value}))} placeholder="Empresa patrocinadora"/>
        <FInp label="Priority Date" type="date" value={editForm.priorityDate||""} onChange={e=>setEditForm(p=>({...p,priorityDate:e.target.value}))}/>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={saveClient} disabled={savingClient} style={{flex:1}}>{savingClient?"Salvando…":"Salvar"}</Btn>
          <Btn variant="ghost" onClick={()=>setEditClient(null)} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>

      {/* Confirmar exclusão */}
      <Overlay open={!!del} onClose={()=>setDel(null)} title="Confirmar remoção" mobile={mobile}>
        <div style={{padding:"14px 16px",background:"rgba(239,68,68,0.08)",borderRadius:12,marginBottom:16,border:"1px solid rgba(239,68,68,0.2)"}}>
          <div style={{color:T.text,fontWeight:600,fontSize:15}}>{clients.find(c=>(c.uid||c.id)===del)?.name}</div>
          <div style={{color:T.faint,fontSize:13,marginTop:4}}>{clients.find(c=>(c.uid||c.id)===del)?.email}</div>
        </div>
        <p style={{color:T.dim,marginBottom:8,fontSize:14,lineHeight:1.6}}>Todos os dados deste cliente serão removidos permanentemente:</p>
        <div style={{padding:"12px 14px",background:"rgba(239,68,68,0.06)",borderRadius:10,marginBottom:20,fontSize:13,color:T.dim,lineHeight:1.8}}>
          🗂 Perfil e dados do processo<br/>
          💳 Histórico de pagamentos<br/>
          ✉️ Mensagens<br/>
          🔑 Acesso ao portal (login)<br/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="danger" onClick={async()=>{
            const clientToDelete = clients.find(c=>(c.uid||c.id)===del);
            const clientId = clientToDelete?.clientId || del;
            setMsg({type:"success", text:"Removendo cliente..."});
            try {
              const { deleteDoc, doc, getDocs, collection, query, where } =
                await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

              // 1. Deleta documento do usuário no Firestore
              await deleteDoc(doc(_db.inst, "users", clientToDelete?.uid||clientToDelete?.id||del));

              // 2. Deleta caseStatus do cliente
              try { await deleteDoc(doc(_db.inst, "caseStatus", clientId)); } catch(e){}

              // 3. Deleta todos os pagamentos do cliente
              try {
                const paySnap = await getDocs(query(collection(_db.inst,"payments"), where("clientId","==",clientId)));
                for(const d of paySnap.docs) await deleteDoc(d.ref);
              } catch(e){}

              // 4. Deleta todas as mensagens do cliente
              try {
                const msgSnap = await getDocs(query(collection(_db.inst,"messages"), where("clientId","==",clientId)));
                for(const d of msgSnap.docs) await deleteDoc(d.ref);
              } catch(e){}

              // 5. Tenta deletar do Firebase Auth (funciona se cliente usa senha padrão)
              try {
                const firstName = clientToDelete?.name?.trim().split(" ")[0].toLowerCase();
                const loginRes = await fetch(
                  `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FB_CONFIG.apiKey}`,
                  {method:"POST",headers:{"Content-Type":"application/json"},
                   body:JSON.stringify({email:clientToDelete?.email,password:firstName,returnSecureToken:true})}
                );
                const loginData = await loginRes.json();
                if(loginData.idToken) {
                  await fetch(
                    `https://identitytoolkit.googleapis.com/v1/accounts:delete?key=${FB_CONFIG.apiKey}`,
                    {method:"POST",headers:{"Content-Type":"application/json"},
                     body:JSON.stringify({idToken:loginData.idToken})}
                  );
                }
              } catch(e2){}

            } catch(e) { console.warn("Erro ao deletar:", e); }

            setClients(p=>p.filter(c=>(c.uid||c.id)!==del));
            setDel(null);
            setMsg({type:"success", text:`✓ ${clientToDelete?.name?.split(" ")[0]} removido completamente do sistema.`});
          }} style={{flex:1}}>Sim, excluir tudo</Btn>
          <Btn variant="ghost" onClick={()=>setDel(null)} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// REPORTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Reports({user,payments,clients,caseStatus,mobile}) {
  const isAdmin = user.role==="admin"||user.role==="developer";
  const [tab, setTab] = useState(isAdmin?"geral":"extrato");
  const [selClient, setSelClient] = useState("all");

  // ── helpers ──────────────────────────────────────────────────────────────
  const clientPay = (cid) => payments.filter(p=>p.clientId===cid);
  const clientPaid = (cid) => clientPay(cid).filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
  const clientTotal = (c) => c?.plan?.total || (c?.plan?.assinatura||0)+((c?.plan?.parcela||0)*(c?.plan?.numParcelas||0))+(c?.plan?.i140||0)+(c?.plan?.dependente||0);

  const myClient = isAdmin ? null : (clients.find(c=>(c.clientId||c.uid)===(user.clientId||user.uid))||user);
  const myPay = isAdmin
    ? (selClient==="all" ? payments : payments.filter(p=>p.clientId===selClient))
    : payments.filter(p=>p.clientId===(user.clientId||user.uid));

  const confirmed = myPay.filter(p=>p.status==="confirmed");
  const pending   = myPay.filter(p=>p.status==="pending_review");
  const totalPago = confirmed.reduce((s,p)=>s+p.amount,0);
  const totalOwed = isAdmin
    ? (selClient==="all" ? clients.reduce((s,c)=>s+clientTotal(c),0) : clientTotal(clients.find(c=>(c.clientId||c.uid)===selClient)))
    : clientTotal(myClient);
  const pct = totalOwed>0 ? Math.min(100,Math.round((totalPago/totalOwed)*100)) : 0;

  // Monthly revenue (admin)
  const monthlyRevenue = () => {
    const map = {};
    payments.filter(p=>p.status==="confirmed").forEach(p=>{
      const m = p.date?.substring(0,7)||"";
      if (m) map[m] = (map[m]||0) + p.amount;
    });
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  };

  // Clients at risk (visto/passaporte vencendo em 90 dias)
  const atRisk = clients.filter(c=>{
    const v = c.documents?.visaExp;
    const p = c.documents?.passportExp;
    const d90 = Date.now() + 90*24*60*60*1000;
    const d180 = Date.now() + 180*24*60*60*1000;
    return (v && new Date(v)<new Date(d90)) || (p && new Date(p)<new Date(d180));
  });

  // ── Print functions ───────────────────────────────────────────────────────
  const buildPayRows = (cp) => cp.map(p => {
    const st = p.status==="confirmed"?"✓ Confirmado":p.status==="rejected"?"✗ Rejeitado":"⏳ Revisão";
    const stClass = p.status==="confirmed"?"g":p.status==="rejected"?"r":"y";
    const link = p.receiptUrl ? "<a href='"+p.receiptUrl+"' target='_blank'>📎 Ver</a>" : "—";
    return "<tr><td>"+p.description+"</td><td>"+fmt(p.date)+"</td><td>"+fmtUSD(p.amount)+"</td><td class='"+stClass+"'>"+st+"</td><td>"+link+"</td></tr>";
  }).join("");

  const printClientFinanceiro = (c) => {
    const cp = clientPay(c.clientId||c.uid);
    const paid = cp.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
    const total = clientTotal(c);
    const pct2 = total>0?Math.min(100,Math.round((paid/total)*100)):0;
    const html = "<div style='margin-bottom:24px'>"
      +"<div class='kpi'><div class='kpi-val'>"+fmtUSD(paid)+"</div><div class='kpi-lbl'>Total Pago</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+fmtUSD(total-paid)+"</div><div class='kpi-lbl'>Saldo Restante</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+pct2+"%</div><div class='kpi-lbl'>Progresso</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+cp.filter(p=>p.status==="confirmed").length+"</div><div class='kpi-lbl'>Confirmados</div></div>"
      +"</div><h2>Histórico de Pagamentos</h2>"
      +"<table><tr><th>Descrição</th><th>Data</th><th>Valor</th><th>Status</th><th>Comprovante</th></tr>"
      +buildPayRows(cp)+"</table>";
    printReport("Extrato Financeiro — "+c.name, html);
  };

  const printClientProcesso = (c) => {
    const html = "<div style='margin-bottom:24px'>"
      +"<div class='kpi'><div class='kpi-val'>"+(c.caseType||"—")+"</div><div class='kpi-lbl'>Tipo</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+(c.sponsor||"—")+"</div><div class='kpi-lbl'>Sponsor</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+(fmt(c.priorityDate)||"—")+"</div><div class='kpi-lbl'>Priority Date</div></div>"
      +"</div><h2>Protocolos</h2>"
      +"<table><tr><th>Etapa</th><th>Protocolo</th></tr>"
      +"<tr><td>PERM (DOL)</td><td>"+(c.protocols?.perm||"—")+"</td></tr>"
      +"<tr><td>I-140 (USCIS)</td><td>"+(c.protocols?.i140||"—")+"</td></tr>"
      +"<tr><td>I-485 (USCIS)</td><td>"+(c.protocols?.i485||"—")+"</td></tr>"
      +"<tr><td>NVC</td><td>"+(c.protocols?.nvc||"—")+"</td></tr>"
      +"</table>";
    printReport("Relatório do Processo — "+c.name, html);
  };

  const printClientDocumentos = (c) => {
    const vOK = c.documents?.visaExp&&new Date(c.documents.visaExp)<new Date(Date.now()+90*24*60*60*1000)?"⚠️ Vence em breve":"✓ OK";
    const pOK = c.documents?.passportExp&&new Date(c.documents.passportExp)<new Date(Date.now()+180*24*60*60*1000)?"⚠️ Vence em breve":"✓ OK";
    const html = "<h2>Documentos de Imigração</h2>"
      +"<table><tr><th>Documento</th><th>Número</th><th>Validade</th><th>Status</th></tr>"
      +"<tr><td>Passaporte</td><td>"+(c.documents?.passportNum||"—")+"</td><td>"+(fmt(c.documents?.passportExp)||"—")+"</td><td>"+pOK+"</td></tr>"
      +"<tr><td>Visto ("+(c.documents?.visaType||"—")+")</td><td>"+(c.documents?.visaNum||"—")+"</td><td>"+(fmt(c.documents?.visaExp)||"—")+"</td><td>"+vOK+"</td></tr>"
      +"<tr><td>I-94</td><td>"+(c.documents?.i94||"—")+"</td><td>—</td><td>—</td></tr>"
      +"<tr><td>EAD</td><td>"+(c.documents?.eadNum||"—")+"</td><td>"+(fmt(c.documents?.eadExp)||"—")+"</td><td>—</td></tr>"
      +"<tr><td>A-Number</td><td>"+(c.documents?.aNumber||"—")+"</td><td>—</td><td>—</td></tr>"
      +"</table><h2>Dados Pessoais</h2>"
      +"<table><tr><th>Campo</th><th>Valor</th></tr>"
      +"<tr><td>CPF</td><td>"+(c.personal?.cpf||"—")+"</td></tr>"
      +"<tr><td>Nascimento</td><td>"+(fmt(c.personal?.dob)||"—")+"</td></tr>"
      +"<tr><td>Endereço</td><td>"+(c.personal?.address?.street||"—")+", "+(c.personal?.address?.city||"")+" "+(c.personal?.address?.state||"")+"</td></tr>"
      +"<tr><td>Telefone</td><td>"+(c.personal?.phone||"—")+"</td></tr>"
      +"<tr><td>Empregador</td><td>"+(c.employment?.currentEmployer||"—")+" — "+(c.employment?.currentRole||"—")+"</td></tr>"
      +"</table>";
    printReport("Documentos — "+c.name, html);
  };

  const printClientCompleto = (c) => {
    const cp = clientPay(c.clientId||c.uid);
    const paid = cp.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
    const total = clientTotal(c);
    const html = "<div style='margin-bottom:24px'>"
      +"<div class='kpi'><div class='kpi-val'>"+(c.caseType||"—")+"</div><div class='kpi-lbl'>Processo</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+fmtUSD(paid)+"</div><div class='kpi-lbl'>Pago</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+fmtUSD(total-paid)+"</div><div class='kpi-lbl'>Restante</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+(fmt(c.priorityDate)||"—")+"</div><div class='kpi-lbl'>Priority Date</div></div>"
      +"</div><h2>Dados do Processo</h2>"
      +"<table><tr><td><b>Sponsor</b></td><td>"+(c.sponsor||"—")+"</td><td><b>E-mail</b></td><td>"+c.email+"</td></tr>"
      +"<tr><td><b>PERM</b></td><td>"+(c.protocols?.perm||"—")+"</td><td><b>I-140</b></td><td>"+(c.protocols?.i140||"—")+"</td></tr></table>"
      +"<h2>Documentos</h2>"
      +"<table><tr><th>Documento</th><th>Número</th><th>Validade</th></tr>"
      +"<tr><td>Passaporte</td><td>"+(c.documents?.passportNum||"—")+"</td><td>"+(fmt(c.documents?.passportExp)||"—")+"</td></tr>"
      +"<tr><td>Visto ("+(c.documents?.visaType||"—")+")</td><td>"+(c.documents?.visaNum||"—")+"</td><td>"+(fmt(c.documents?.visaExp)||"—")+"</td></tr>"
      +"<tr><td>EAD</td><td>"+(c.documents?.eadNum||"—")+"</td><td>"+(fmt(c.documents?.eadExp)||"—")+"</td></tr></table>"
      +"<h2>Histórico Financeiro</h2>"
      +"<table><tr><th>Descrição</th><th>Data</th><th>Valor</th><th>Status</th></tr>"
      +cp.map(p=>"<tr><td>"+p.description+"</td><td>"+fmt(p.date)+"</td><td>"+fmtUSD(p.amount)+"</td><td class='"+(p.status==="confirmed"?"g":"y")+"'>"+(p.status==="confirmed"?"✓ Confirmado":"⏳ Revisão")+"</td></tr>").join("")
      +"</table>";
    printReport("Relatório Completo — "+c.name, html);
  };

  const printMyExtrato = () => { if (!myClient) return; printClientFinanceiro(myClient); };
  const printMyProcesso = () => { if (!myClient) return; printClientProcesso(myClient); };
  const printMyDocumentos = () => { if (!myClient) return; printClientDocumentos(myClient); };

  const printGeralAdmin = () => {
    const rows = clients.map(c=>{
      const paid = clientPaid(c.clientId||c.uid);
      const total = clientTotal(c);
      const pct2 = total>0?Math.min(100,Math.round((paid/total)*100)):0;
      return "<tr><td>"+c.name+"</td><td>"+c.caseType+"</td><td>"+(c.sponsor||"—")+"</td><td>"+fmtUSD(paid)+"</td><td>"+fmtUSD(total-paid)+"</td><td>"+pct2+"%</td></tr>";
    }).join("");
    const totalAll = clients.reduce((s,c)=>s+clientTotal(c),0);
    const paidAll = clients.reduce((s,c)=>s+clientPaid(c.clientId||c.uid),0);
    const html = "<div style='margin-bottom:24px'>"
      +"<div class='kpi'><div class='kpi-val'>"+clients.length+"</div><div class='kpi-lbl'>Clientes</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+fmtUSD(paidAll)+"</div><div class='kpi-lbl'>Total Arrecadado</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+fmtUSD(totalAll-paidAll)+"</div><div class='kpi-lbl'>A Receber</div></div>"
      +"<div class='kpi'><div class='kpi-val'>"+atRisk.length+"</div><div class='kpi-lbl'>Em Risco</div></div>"
      +"</div><h2>Por Cliente</h2>"
      +"<table><tr><th>Nome</th><th>Processo</th><th>Sponsor</th><th>Pago</th><th>Restante</th><th>%</th></tr>"+rows+"</table>";
    printReport("Relatório Geral", html);
  };

  const printRisco = () => {
    const rows = atRisk.map(c=>{
      const v = c.documents?.visaExp;
      const p = c.documents?.passportExp;
      const vStr = v ? fmt(v)+" "+(new Date(v)<new Date()?"VENCIDO":"⚠️") : "—";
      const pStr = p ? fmt(p)+" "+(new Date(p)<new Date()?"VENCIDO":"⚠️") : "—";
      return "<tr><td>"+c.name+"</td><td>"+c.email+"</td><td>"+vStr+"</td><td>"+pStr+"</td></tr>";
    }).join("");
    const html = "<h2>Clientes com documentos vencidos ou próximos do vencimento</h2>"
      +"<table><tr><th>Nome</th><th>E-mail</th><th>Visto</th><th>Passaporte</th></tr>"
      +(rows||"<tr><td colspan='4'>Nenhum cliente em risco.</td></tr>")+"</table>";
    printReport("Clientes em Risco — Documentos", html);
  };

  const printReceita = () => {
    const monthly = monthlyRevenue();
    const rows = monthly.map(function(item){ return "<tr><td>"+item[0]+"</td><td>"+fmtUSD(item[1])+"</td></tr>"; }).join("");
    const html = "<h2>Últimos 6 meses</h2>"
      +"<table><tr><th>Mês</th><th>Receita</th></tr>"
      +(rows||"<tr><td colspan='2'>Sem dados.</td></tr>")+"</table>";
    printReport("Receita Mensal", html);
  };

  // ── ADMIN TABS ────────────────────────────────────────────────────────────
  const adminTabs = [
    {id:"geral",    label:"📊 Geral"},
    {id:"cliente",  label:"👤 Por Cliente"},
    {id:"risco",    label:"⚠️ Em Risco"},
    {id:"receita",  label:"📈 Receita"},
  ];

  // ── CLIENT TABS ───────────────────────────────────────────────────────────
  const clientTabs = [
    {id:"extrato",   label:"💰 Extrato"},
    {id:"processo",  label:"📋 Processo"},
    {id:"docs",      label:"🪪 Documentos"},
  ];

  const tabs = isAdmin ? adminTabs : clientTabs;

  const KPI = ({label,value,color}) => (
    <Card style={{padding:16,textAlign:"center"}}>
      <div style={{color:color||T.gold,fontSize:22,fontWeight:700}}>{value}</div>
      <div style={{color:T.faint,fontSize:11,marginTop:4}}>{label}</div>
    </Card>
  );

  const Row = ({label,value,color}) => (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
      <span style={{color:T.faint,fontSize:13}}>{label}</span>
      <span style={{color:color||T.text,fontSize:13,fontWeight:600}}>{value}</span>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

      {/* Tab bar */}
      <div style={{display:"flex",gap:6,background:"rgba(255,255,255,0.04)",padding:5,borderRadius:12,border:`1px solid ${T.border}`,overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"7px 16px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:tab===t.id?`linear-gradient(135deg,${T.goldDim},${T.gold})`:"transparent",color:tab===t.id?"#0A0F1E":T.dim,fontFamily:"Georgia,serif",whiteSpace:"nowrap",flexShrink:0}}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── ADMIN: GERAL ── */}
      {isAdmin&&tab==="geral"&&(()=>{
        const totalAll = clients.reduce((s,c)=>s+clientTotal(c),0);
        const paidAll  = clients.reduce((s,c)=>s+clientPaid(c.clientId||c.uid),0);
        const tc = {}; clients.forEach(c=>{const t=c.caseType||"EB-3";tc[t]=(tc[t]||0)+1;});
        return (
          <>
            <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(4,1fr)",gap:14}}>
              <KPI label="Clientes Ativos" value={clients.length} color={T.gold}/>
              <KPI label="Total Arrecadado" value={fmtUSD(paidAll)} color={T.green}/>
              <KPI label="A Receber" value={fmtUSD(totalAll-paidAll)} color={T.amber}/>
              <KPI label="Em Risco" value={atRisk.length} color={atRisk.length>0?T.red:T.dim}/>

            <Card>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

                const paid=clientPaid(c.clientId||c.uid);
                const total=clientTotal(c);
                return <ProgRow key={c.uid} label={c.name?.split(" ").slice(0,2).join(" ")} value={paid} total={total} color={T.gold}/>;

            <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:14}}>

                      const c=clients.find(cl=>(cl.clientId||cl.uid)===p.clientId);

                        <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>

                            <div style={{color:T.text,fontSize:13,fontWeight:600}}>{c?.name?.split(" ")[0]||"—"}</div>
                            <div style={{color:T.faint,fontSize:12}}>{p.description}</div>
                          </div>
                          <span style={{color:T.amber,fontWeight:700}}>{fmtUSD(p.amount)}</span>

                }
              </Card>
            </div>
          </>

      })()}

      {/* ── ADMIN: POR CLIENTE ── */}
      {isAdmin&&tab==="cliente"&&(()=>{
        const sel = clients.find(c=>(c.clientId||c.uid)===selClient);
        const selPay = selClient==="all" ? [] : clientPay(selClient);
        const selPaid = selPay.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
        const selTotal = sel ? clientTotal(sel) : 0;
        return (
          <>
            <Card>
              <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Selecionar cliente</div>
              <select value={selClient} onChange={e=>setSelClient(e.target.value)}
                style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>
                <option value="all" style={{background:"#0D1117"}}>— Selecione um cliente —</option>
                {clients.map(c=><option key={c.uid||c.id} value={c.clientId||c.uid} style={{background:"#0D1117"}}>{c.name}</option>)}
              </select>
            </Card>
            {sel&&(
              <>

                      <div style={{color:T.faint,fontSize:13}}>{sel.email}</div>

                        <span style={{padding:"2px 10px",borderRadius:99,fontSize:11,fontWeight:700,background:"rgba(232,200,122,0.15)",color:T.gold}}>{sel.caseType}</span>
                        <span style={{padding:"2px 10px",borderRadius:99,fontSize:11,background:"rgba(255,255,255,0.08)",color:T.dim}}>{sel.sponsor}</span>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <Btn variant="ghost" onClick={()=>printClientFinanceiro(sel)} style={{padding:"6px 12px",fontSize:12}}>💰 Financeiro</Btn>
                      <Btn variant="ghost" onClick={()=>printClientProcesso(sel)} style={{padding:"6px 12px",fontSize:12}}>📋 Processo</Btn>
                      <Btn variant="ghost" onClick={()=>printClientDocumentos(sel)} style={{padding:"6px 12px",fontSize:12}}>🪪 Documentos</Btn>
                      <Btn onClick={()=>printClientCompleto(sel)} style={{padding:"6px 12px",fontSize:12}}>📄 Completo</Btn>
                    </div>
                  </div>
                </Card>
                <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(4,1fr)",gap:14}}>
                  <KPI label="Total Pago" value={fmtUSD(selPaid)} color={T.green}/>
                  <KPI label="Saldo Restante" value={fmtUSD(selTotal-selPaid)} color={T.amber}/>
                  <KPI label="Progresso" value={`${Math.min(100,Math.round((selPaid/selTotal)*100))||0}%`} color={T.gold}/>
                  <KPI label="Pagamentos" value={selPay.length} color={T.blue}/>
                </div>
                <Card>
                  <h4 style={{color:T.gold,margin:"0 0 16px"}}>Histórico de Pagamentos</h4>
                  {selPay.length===0
                    ? <div style={{color:T.faint,textAlign:"center",padding:20}}>Nenhum pagamento.</div>
                    : <table style={{width:"100%",borderCollapse:"collapse"}}>
                        <thead><tr>{["Descrição","Data","Valor","Status","Comprovante"].map(h=><th key={h} style={{color:T.faint,fontSize:11,textTransform:"uppercase",padding:"8px 10px",textAlign:"left",borderBottom:`1px solid ${T.border}`}}>{h}</th>)}</tr></thead>
                        <tbody>{selPay.map(p=>(
                          <tr key={p.id} style={{borderTop:`1px solid rgba(255,255,255,0.05)`}}>
                            <td style={{padding:"10px",color:T.text,fontSize:13,fontWeight:600}}>{p.description}</td>
                            <td style={{padding:"10px",color:T.faint,fontSize:13}}>{fmt(p.date)}</td>
                            <td style={{padding:"10px",color:T.gold,fontWeight:700}}>{fmtUSD(p.amount)}</td>
                            <td style={{padding:"10px"}}>{p.status==="confirmed"?<span style={{color:T.green}}>✓</span>:p.status==="rejected"?<span style={{color:T.red}}>✗</span>:<span style={{color:T.amber}}>⏳</span>}</td>
                            <td style={{padding:"10px"}}>{p.receiptUrl?<a href={p.receiptUrl} target="_blank" rel="noreferrer" style={{color:T.blue,fontSize:12}}>📎 Ver</a>:<span style={{color:T.faint,fontSize:12}}>—</span>}</td>
                          </tr>
                        ))}</tbody>
                      </table>
                  }
                </Card>
                <Card>
                  <h4 style={{color:T.gold,margin:"0 0 14px"}}>Documentos</h4>
                  <Row label="Passaporte" value={sel.documents?.passportNum||"—"}/>
                  <Row label="Validade Passaporte" value={fmt(sel.documents?.passportExp)||"—"} color={sel.documents?.passportExp&&new Date(sel.documents.passportExp)<new Date(Date.now()+180*24*60*60*1000)?T.red:T.green}/>
                  <Row label="Visto" value={`${sel.documents?.visaType||"—"} ${sel.documents?.visaNum||""}`}/>
                  <Row label="Validade Visto" value={fmt(sel.documents?.visaExp)||"—"} color={sel.documents?.visaExp&&new Date(sel.documents.visaExp)<new Date(Date.now()+90*24*60*60*1000)?T.red:T.green}/>
                  <Row label="I-94" value={sel.documents?.i94||"—"}/>
                  <Row label="EAD" value={sel.documents?.eadNum||"—"}/>
                  <Row label="A-Number" value={sel.documents?.aNumber||"—"}/>
                </Card>
              </>
            )}
          </>
        );
      })()}

      {/* ── ADMIN: EM RISCO ── */}
      {isAdmin&&tab==="risco"&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{color:T.dim,fontSize:13}}>{atRisk.length} cliente{atRisk.length!==1?"s":""} com documentos vencidos ou próximos do vencimento</div>
            <Btn variant="ghost" onClick={printRisco} style={{padding:"6px 14px",fontSize:12}}>🖨 Imprimir</Btn>
          </div>
          {atRisk.length===0
            ? <Card style={{textAlign:"center",padding:30}}><div style={{fontSize:36,marginBottom:10}}>✅</div><div style={{color:T.faint}}>Nenhum cliente em risco no momento.</div></Card>
            : atRisk.map(c=>{
                const v = c.documents?.visaExp;
                const p = c.documents?.passportExp;
                const now = Date.now();
                return (
                  <Card key={c.uid} style={{borderColor:"rgba(239,68,68,0.25)",background:"rgba(239,68,68,0.05)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                      <div>
                        <div style={{color:T.text,fontWeight:700,fontSize:15}}>{c.name}</div>
                        <div style={{color:T.faint,fontSize:12,marginTop:2}}>{c.email} · {c.caseType}</div>
                      </div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        {v&&new Date(v)<new Date(now+90*24*60*60*1000)&&(
                          <span style={{padding:"4px 12px",borderRadius:99,fontSize:12,fontWeight:700,background:new Date(v)<new Date()?"rgba(239,68,68,0.2)":"rgba(245,158,11,0.15)",color:new Date(v)<new Date()?T.red:T.amber}}>
                            {new Date(v)<new Date()?"🚨":"⚠️"} Visto: {fmt(v)}
                          </span>
                        )}
                        {p&&new Date(p)<new Date(now+180*24*60*60*1000)&&(
                          <span style={{padding:"4px 12px",borderRadius:99,fontSize:12,fontWeight:700,background:new Date(p)<new Date()?"rgba(239,68,68,0.2)":"rgba(245,158,11,0.15)",color:new Date(p)<new Date()?T.red:T.amber}}>

                    </div>

                );
              })
          }
        </>
      )}

      {/* ── ADMIN: RECEITA ── */}
      {isAdmin&&tab==="receita"&&(()=>{
        const monthly = monthlyRevenue();
        const max = Math.max(...monthly.map(([,v])=>v),1);
        return (
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{color:T.dim,fontSize:13}}>Últimos 6 meses de receita confirmada</div>
              <Btn variant="ghost" onClick={printReceita} style={{padding:"6px 14px",fontSize:12}}>🖨 Imprimir</Btn>
            </div>
            <Card>
              <h4 style={{color:T.gold,margin:"0 0 20px"}}>Receita Mensal</h4>
              {monthly.length===0
                ? <div style={{color:T.faint,textAlign:"center",padding:20}}>Nenhum dado disponível.</div>
                : monthly.map(([m,v])=>(
                    <div key={m} style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                        <span style={{color:T.dim,fontSize:13}}>{m}</span>
                        <span style={{color:T.green,fontWeight:700}}>{fmtUSD(v)}</span>
                      </div>
                      <div style={{height:8,borderRadius:4,background:"rgba(255,255,255,0.08)"}}>
                        <div style={{height:8,borderRadius:4,background:`linear-gradient(90deg,${T.goldDim},${T.gold})`,width:`${Math.round((v/max)*100)}%`}}/>
                      </div>
                    </div>
                  ))
              }
            </Card>
            <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(3,1fr)",gap:14}}>
              <KPI label="Total no Período" value={fmtUSD(monthly.reduce((s,[,v])=>s+v,0))} color={T.green}/>
              <KPI label="Média Mensal" value={monthly.length>0?fmtUSD(monthly.reduce((s,[,v])=>s+v,0)/monthly.length):"—"} color={T.gold}/>
              <KPI label="Melhor Mês" value={monthly.length>0?fmtUSD(Math.max(...monthly.map(([,v])=>v))):"—"} color={T.blue}/>
            </div>
          </>
        );
      })()}

      {/* ── CLIENT: EXTRATO ── */}
      {!isAdmin&&tab==="extrato"&&(
        <>
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={printMyExtrato} style={{padding:"6px 14px",fontSize:12}}>🖨 Imprimir extrato</Btn>
          </div>
          <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"repeat(4,1fr)",gap:14}}>
            <KPI label="Total Pago" value={fmtUSD(totalPago)} color={T.green}/>
            <KPI label="Saldo Restante" value={fmtUSD(totalOwed-totalPago)} color={T.amber}/>
            <KPI label="Progresso" value={`${pct}%`} color={T.gold}/>
            <KPI label="Confirmados" value={confirmed.length} color={T.blue}/>
          </div>
          <Card>
            <h4 style={{color:T.gold,margin:"0 0 16px"}}>Histórico Completo</h4>
            {myPay.length===0
              ? <div style={{color:T.faint,textAlign:"center",padding:20}}>Nenhum pagamento registrado.</div>
              : <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>{["Descrição","Data","Valor","Status","Comprovante"].map(h=><th key={h} style={{color:T.faint,fontSize:11,textTransform:"uppercase",padding:"8px 10px",textAlign:"left",borderBottom:`1px solid ${T.border}`}}>{h}</th>)}</tr></thead>
                  <tbody>{myPay.map(p=>(
                    <tr key={p.id} style={{borderTop:`1px solid rgba(255,255,255,0.05)`}}>
                      <td style={{padding:"10px",color:T.text,fontSize:13,fontWeight:600}}>{p.description}</td>
                      <td style={{padding:"10px",color:T.faint,fontSize:13}}>{fmt(p.date)}</td>
                      <td style={{padding:"10px",color:T.gold,fontWeight:700}}>{fmtUSD(p.amount)}</td>
                      <td style={{padding:"10px"}}>{p.status==="confirmed"?<span style={{color:T.green}}>✓ Confirmado</span>:p.status==="rejected"?<span style={{color:T.red}}>✗ Rejeitado</span>:<span style={{color:T.amber}}>⏳ Revisão</span>}</td>
                      <td style={{padding:"10px"}}>{p.receiptUrl?<a href={p.receiptUrl} target="_blank" rel="noreferrer" style={{color:T.blue,fontSize:12}}>📎 Ver</a>:<span style={{color:T.faint,fontSize:12}}>—</span>}</td>
                    </tr>
                  ))}</tbody>
                </table>
            }
          </Card>
          {pending.length>0&&(
            <Card style={{borderColor:"rgba(245,158,11,0.3)",background:"rgba(245,158,11,0.05)"}}>
              <h4 style={{color:T.amber,margin:"0 0 12px"}}>⏳ {pending.length} comprovante{pending.length>1?"s":""} aguardando revisão</h4>
              {pending.map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid rgba(245,158,11,0.15)`}}>
                  <span style={{color:T.dim,fontSize:13}}>{p.description} · {fmt(p.date)}</span>
                  <span style={{color:T.amber,fontWeight:700}}>{fmtUSD(p.amount)}</span>
                </div>
              ))}
            </Card>
          )}
        </>
      )}

      {/* ── CLIENT: PROCESSO ── */}
      {!isAdmin&&tab==="processo"&&(
        <>
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={printMyProcesso} style={{padding:"6px 14px",fontSize:12}}>🖨 Imprimir</Btn>
          </div>
          <Card style={{background:"linear-gradient(135deg,rgba(200,169,110,0.12),rgba(232,200,122,0.05))",borderColor:"rgba(200,169,110,0.25)"}}>
            <Row label="Tipo de Processo" value={myClient?.caseType||user.caseType||"—"} color={T.gold}/>
            <Row label="Sponsor" value={myClient?.sponsor||user.sponsor||"—"}/>
            <Row label="Priority Date" value={fmt(myClient?.priorityDate||user.priorityDate)||"—"}/>
            <Row label="E-mail" value={user.email}/>
          </Card>
          <Card>
            <h4 style={{color:T.gold,margin:"0 0 14px"}}>Protocolos</h4>
            {[["PERM (DOL)", myClient?.protocols?.perm||user.protocols?.perm],["I-140 (USCIS)", myClient?.protocols?.i140||user.protocols?.i140],["I-485 (USCIS)", myClient?.protocols?.i485||user.protocols?.i485],["NVC", myClient?.protocols?.nvc||user.protocols?.nvc]].map(([label,val])=>(
              <Row key={label} label={label} value={val||"—"} color={val?T.text:T.faint}/>
            ))}
          </Card>
        </>
      )}

      {/* ── CLIENT: DOCUMENTOS ── */}
      {!isAdmin&&tab==="docs"&&(
        <>
          <div style={{display:"flex",justifyContent:"flex-end"}}>
            <Btn variant="ghost" onClick={printMyDocumentos} style={{padding:"6px 14px",fontSize:12}}>🖨 Imprimir</Btn>
          </div>
          <Card>
            <h4 style={{color:T.gold,margin:"0 0 14px"}}>🛂 Passaporte</h4>
            <Row label="Número" value={myClient?.documents?.passportNum||"—"}/>
            <Row label="Validade" value={fmt(myClient?.documents?.passportExp)||"—"} color={myClient?.documents?.passportExp&&new Date(myClient.documents.passportExp)<new Date(Date.now()+180*24*60*60*1000)?T.red:T.green}/>
            {myClient?.documents?.passportExp&&new Date(myClient.documents.passportExp)<new Date(Date.now()+180*24*60*60*1000)&&(
              <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,marginTop:10,color:T.red,fontSize:13}}>⚠️ Passaporte vence em menos de 6 meses — providencie a renovação!</div>
            )}
          </Card>
          <Card>
            <h4 style={{color:T.gold,margin:"0 0 14px"}}>🇺🇸 Visto Atual</h4>
            <Row label="Tipo" value={myClient?.documents?.visaType||"—"}/>
            <Row label="Número" value={myClient?.documents?.visaNum||"—"}/>
            <Row label="Validade" value={fmt(myClient?.documents?.visaExp)||"—"} color={myClient?.documents?.visaExp&&new Date(myClient.documents.visaExp)<new Date(Date.now()+90*24*60*60*1000)?T.red:T.green}/>
            <Row label="Entrada nos EUA" value={fmt(myClient?.documents?.entryDate)||"—"}/>
            <Row label="I-94" value={myClient?.documents?.i94||"—"}/>
            {myClient?.documents?.visaExp&&new Date(myClient.documents.visaExp)<new Date(Date.now()+90*24*60*60*1000)&&(
              <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,marginTop:10,color:T.red,fontSize:13}}>⚠️ Visto vence em menos de 90 dias — entre em contato com a Zion Solutions!</div>
            )}
          </Card>
          <Card>
            <h4 style={{color:T.gold,margin:"0 0 14px"}}>📄 Outros Documentos</h4>
            <Row label="EAD" value={myClient?.documents?.eadNum||"—"}/>
            <Row label="Validade EAD" value={fmt(myClient?.documents?.eadExp)||"—"}/>
            <Row label="A-Number" value={myClient?.documents?.aNumber||"—"}/>
            {myClient?.documents?.i20Num&&<><Row label="I-20 Número" value={myClient.documents.i20Num}/><Row label="Escola (I-20)" value={myClient.documents.i20School||"—"}/><Row label="Válido até" value={fmt(myClient.documents.i20End)||"—"}/></>}
          </Card>
          {Array.isArray(myClient?.documents?.visaHistory)&&myClient.documents.visaHistory.length>0&&(
            <Card>
              <h4 style={{color:T.gold,margin:"0 0 14px"}}>📜 Histórico de Status Imigratório</h4>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                {myClient.documents.visaHistory.map((h,i)=>(
                  <div key={i} style={{padding:"6px 14px",borderRadius:10,background:h.isCurrent?"rgba(16,185,129,0.12)":"rgba(255,255,255,0.06)",border:"1px solid "+(h.isCurrent?"rgba(16,185,129,0.3)":"rgba(255,255,255,0.1)")}}>
                    <div style={{color:h.isCurrent?T.green:T.text,fontWeight:600,fontSize:13}}>{h.type}</div>
                    <div style={{color:T.faint,fontSize:11,marginTop:2}}>{h.dateFrom||"—"}{h.dateTo?" → "+h.dateTo:h.isCurrent?" → atual":""}</div>
                    {h.notes&&<div style={{color:T.dim,fontSize:11,marginTop:2}}>{h.notes}</div>}
                  </div>
                ))}
              </div>
            </Card>
          )}
        </>
      )}
    </div>
  );
}

function VersionCard() {
