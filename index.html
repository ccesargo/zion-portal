const FB_CONFIG = window.__FIREBASE_CONFIG__ || {};

// SDK carregado dinamicamente via CDN (funciona no HTML standalone)
let _app, _auth, _db, _storage;

async function initFirebase() {
  if (_app) return;
  const { initializeApp }             = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
  const { getFirestore, collection, doc, getDocs, getDoc, addDoc, setDoc, updateDoc, onSnapshot, query, where, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const { getStorage, ref, uploadBytes, getDownloadURL } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js");

  _app  = initializeApp(FB_CONFIG);
  _auth = { inst: getAuth(_app), signIn: signInWithEmailAndPassword, signOut, onAuthStateChanged };
  _db   = { inst: getFirestore(_app), collection, doc, getDocs, getDoc, addDoc, setDoc, updateDoc, onSnapshot, query, where, serverTimestamp };
  _storage = { inst: getStorage(_app), ref, uploadBytes, getDownloadURL };
}

// ── Firestore helpers ─────────────────────────────
async function dbGet(col, id) {
  const snap = await _db.getDoc(_db.doc(_db.inst, col, id));
  return snap.exists() ? { id: snap.id, ...snap.data() } : null;
}
async function dbAdd(col, data) {
  const r = await _db.addDoc(_db.collection(_db.inst, col), { ...data, createdAt: _db.serverTimestamp() });
  return r.id;
}
// dbSet: cria ou sobrescreve (merge) — nunca falha se documento não existe
async function dbSet(col, id, data) {
  await _db.setDoc(_db.doc(_db.inst, col, id), { ...data, updatedAt: _db.serverTimestamp() }, { merge: true });
}
// dbUpdate: mantido para compatibilidade, mas usa setDoc com merge internamente
async function dbUpdate(col, id, data) {
  await _db.setDoc(_db.doc(_db.inst, col, id), { ...data, updatedAt: _db.serverTimestamp() }, { merge: true });
}
function dbListen(col, cb, ...filters) {
  const q = filters.length
    ? _db.query(_db.collection(_db.inst, col), ...filters)
    : _db.collection(_db.inst, col);
  return _db.onSnapshot(q, snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
}
async function dbList(col, ...filters) {
  const q = filters.length
    ? _db.query(_db.collection(_db.inst, col), ...filters)
    : _db.collection(_db.inst, col);
  const snap = await _db.getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function uploadReceipt(file, clientId) {
  const r = _storage.ref(_storage.inst, `receipts/${clientId}/${Date.now()}_${file.name}`);
  await _storage.uploadBytes(r, file);
  return _storage.getDownloadURL(r);
}

async function sendEmail({to_email, to_name, subject, message, event_type}) {
  if (!to_email) { console.warn("sendEmail: sem destinatário"); return; }
  try {
    const res = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id:  EMAILJS.serviceId,
        template_id: EMAILJS.templateId,
        user_id:     EMAILJS.publicKey,
        template_params: {
          to_email,
          to_name:   to_name || to_email,
          subject,
          message,
          event_type: event_type || "notification",
          from_name:  "Zion Solutions",
          reply_to:   "admin@zionsolutions.com",
        },
      }),
    });
    if (res.ok) {
      console.log("✓ E-mail enviado para", to_email);
    } else {
      const txt = await res.text();
      console.warn("EmailJS erro:", res.status, txt);
    }
  } catch(e) {
    console.warn("EmailJS falhou (sem bloquear ação):", e.message);
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return mobile;
}

// Overlay adaptativo: Modal no desktop, Sheet no mobile
function Overlay({open,onClose,title,children,mobile}) {
  if (!open) return null;
  return mobile
    ? <Sheet open={open} onClose={onClose} title={title}>{children}</Sheet>
    : <Modal title={title} onClose={onClose}>{children}</Modal>;
}

          <button key={item.id} onClick={()=>setActive(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:active===item.id?isDev?"rgba(124,58,237,0.15)":"rgba(200,169,110,0.12)":"transparent",border:"none",borderRadius:10,color:active===item.id?isDev?"#A78BFA":T.gold:T.dim,fontSize:13,cursor:"pointer",textAlign:"left",marginBottom:2,borderLeft:active===item.id?`2px solid ${isDev?"#A78BFA":T.gold}`:"2px solid transparent",transition:"all .15s"}}>
            <span style={{fontSize:15}}>{item.icon}</span>{item.label}
          </button>
        ))}
      </nav>
      <div style={{padding:"14px 10px",borderTop:`1px solid ${T.border}`}}>
        <div style={{padding:"8px 12px",marginBottom:8}}><div style={{color:"rgba(255,255,255,0.7)",fontSize:13,fontWeight:600}}>{user.name?.split(" ")[0]}</div><div style={{color:T.faint,fontSize:11}}>{user.email}</div></div>
        <Btn variant="danger" onClick={onLogout} style={{width:"100%",textAlign:"center",padding:"8px"}}>Sair</Btn>
      </div>
    </div>
  );
}

// Bottom Nav (mobile)
function BottomNav({user,active,setActive,onLogout,unread}) {
  const isAdmin=user.role==="admin";
  const isDev=user.role==="developer";
  const nav=(isDev||isAdmin)
    ?[{id:"dashboard",icon:"⊞",label:"Início"},{id:"clients",icon:"👥",label:"Clientes"},{id:"payments",icon:"💳",label:"Pgtos"},{id:"jobs",icon:"💼",label:"Vagas"},{id:"more",icon:"☰",label:"Mais"}]
    :[{id:"dashboard",icon:"⊞",label:"Início"},{id:"messages",icon:"✉",label:"Msgs"},{id:"payments",icon:"💳",label:"Financeiro"},{id:"cases",icon:"📋",label:"Processo"},{id:"more",icon:"☰",label:"Mais"}];
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0A0F1E",borderTop:`1px solid ${T.border}`,display:"flex",zIndex:100}}>
      {nav.map(item=>{
        const on=active===item.id;
        const badge=item.id==="messages"&&unread>0;
        return (
          <button key={item.id} onClick={()=>setActive(item.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 4px 8px",background:"none",border:"none",cursor:"pointer",position:"relative"}}>
            <div style={{position:"relative"}}>
              <span style={{fontSize:19,opacity:on?1:0.4}}>{item.icon}</span>
              {badge&&<span style={{position:"absolute",top:-4,right:-6,width:16,height:16,borderRadius:"50%",background:T.gold,color:"#0A0F1E",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
            </div>
            <span style={{fontSize:10,color:on?T.gold:T.faint,fontWeight:on?700:400,fontFamily:"Georgia,serif"}}>{item.label}</span>
            {on&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:24,height:2,background:T.gold,borderRadius:1}}/>}
          </button>
        );
      })}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LOGIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Login({onLogin}) {
  const [email,setEmail]=useState(""), [pw,setPw]=useState(""), [err,setErr]=useState(""), [loading,setLoading]=useState(false);
  const [forgotMode,setForgotMode]=useState(false), [resetSent,setResetSent]=useState(false), [resetLoading,setResetLoading]=useState(false);

  const go=async()=>{
    setErr(""); setLoading(true);
    try {
      await initFirebase();
      const cred = await _auth.signIn(_auth.inst, email, pw);
      const userDoc = await dbGet("users", cred.user.uid);
      if (!userDoc) throw new Error("Perfil não encontrado no Firestore.");
      onLogin({ uid: cred.user.uid, ...userDoc });
    } catch(e) {
      setErr(e.code==="auth/invalid-credential"||e.code==="auth/wrong-password" ? "E-mail ou senha incorretos." : e.message);
    } finally { setLoading(false); }
  };

  const sendReset=async()=>{
    if(!email){setErr("Digite seu e-mail primeiro.");return;}
    setResetLoading(true); setErr("");
    try {
      await initFirebase();
      const { sendPasswordResetEmail } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      await sendPasswordResetEmail(_auth.inst, email);
      setResetSent(true);
    } catch(e) {
      setErr(e.code==="auth/user-not-found"?"E-mail não encontrado.":e.message);
    } finally { setResetLoading(false); }
  };

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(150deg,#060B18,#0D1829,#0A1220)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"Georgia,serif"}}>
      <div style={{marginBottom:36,textAlign:"center"}}>
        <div style={{width:68,height:68,borderRadius:"50%",background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:28,fontWeight:"bold",color:"#0A0F1E",boxShadow:`0 0 40px rgba(200,169,110,0.3)`}}>Z</div>
        <h1 style={{color:T.gold,fontSize:26,fontWeight:700,margin:0}}>Zion Solutions</h1>
        <p style={{color:T.faint,fontSize:13,marginTop:6}}>Portal do Cliente</p>
      </div>
      <div style={{width:"100%",maxWidth:400}}>
        {resetSent ? (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:16}}>📧</div>
            <div style={{color:T.green,fontWeight:700,fontSize:18,marginBottom:8}}>E-mail enviado!</div>
            <div style={{color:T.dim,fontSize:14,lineHeight:1.6,marginBottom:24}}>Verifique sua caixa de entrada em <strong style={{color:T.text}}>{email}</strong> e siga as instruções para redefinir sua senha.</div>
            <Btn variant="ghost" onClick={()=>{setForgotMode(false);setResetSent(false);}} style={{width:"100%"}}>← Voltar ao login</Btn>
          </div>
        ) : forgotMode ? (
          <>
            <div style={{color:T.text,fontWeight:700,fontSize:18,marginBottom:6}}>Redefinir senha</div>
            <div style={{color:T.faint,fontSize:13,marginBottom:20,lineHeight:1.6}}>Digite seu e-mail e enviaremos um link para criar uma nova senha.</div>
            <FInp label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
            {err&&<p style={{color:T.red,fontSize:13,marginBottom:14,textAlign:"center"}}>{err}</p>}
            <Btn onClick={sendReset} disabled={resetLoading} style={{width:"100%",fontSize:15,padding:13,marginBottom:12}}>
              {resetLoading?"Enviando…":"Enviar link de redefinição"}
            </Btn>
            <Btn variant="ghost" onClick={()=>{setForgotMode(false);setErr("");}} style={{width:"100%"}}>← Voltar ao login</Btn>
          </>
        ) : (
          <>
            <FInp label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
            <FInp label="Senha" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"/>
            {err&&<p style={{color:T.red,fontSize:13,marginBottom:14,textAlign:"center"}}>{err}</p>}
            <Btn onClick={go} disabled={loading} style={{width:"100%",fontSize:15,padding:13,opacity:loading?0.7:1}}>
              {loading?"Entrando…":"Entrar"}
            </Btn>
            <button onClick={()=>{setForgotMode(true);setErr("");}} style={{width:"100%",marginTop:14,background:"none",border:"none",color:T.dim,fontSize:13,cursor:"pointer",fontFamily:"Georgia,serif",textDecoration:"underline"}}>
              Esqueci minha senha
            </button>
            <div style={{marginTop:24,textAlign:"center"}}>
              <a href="?public=privacy" target="_blank" rel="noreferrer" style={{color:"rgba(255,255,255,0.2)",fontSize:11,textDecoration:"none"}}>Política de Privacidade</a>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DASHBOARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Dashboard({user,messages,payments,caseStatus,clients,mobile,setActive}) {
  const isAdmin=user.role==="admin";
  const isDev=user.role==="developer";

  if (isAdmin||isDev) {
    const pPay=payments.filter(p=>p.status==="pending_review").length;
    const unread=messages.filter(m=>!m.read).length;
    const totalArr=payments.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
    const cols=mobile?"1fr 1fr":"1fr 1fr 1fr";
    return (
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {(pPay>0||unread>0)&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {pPay>0&&<div onClick={()=>setActive("payments")} style={{padding:"14px 16px",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:14,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}><div><div style={{color:T.amber,fontWeight:600}}>💳 Comprovantes para revisar</div><div style={{color:T.dim,fontSize:12,marginTop:2}}>{pPay} aguardando confirmação</div></div><span style={{color:T.amber,fontSize:20}}>›</span></div>}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:cols,gap:14}}>
          {[{label:"Total Arrecadado",value:fmtK(totalArr),color:T.green},{label:"Clientes Ativos",value:clients.length,color:T.gold},{label:"Pgtos Pendentes",value:pPay,color:pPay>0?T.amber:T.dim},{label:"Msgs Não Lidas",value:unread,color:unread>0?T.blue:T.dim}].slice(0,mobile?4:4).map(k=>(
            <Card key={k.label} style={{padding:18}}><div style={{color:k.color,fontSize:mobile?24:32,fontWeight:700}}>{k.value}</div><div style={{color:T.faint,fontSize:11,marginTop:4}}>{k.label}</div></Card>
          ))}
        </div>
        <Card>
          <h3 style={{color:T.gold,margin:"0 0 14px",fontSize:16}}>Clientes</h3>
          {clients.map(c=>(
            <div key={c.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${T.border}`}}>
              <div><div style={{color:T.text,fontWeight:600,fontSize:15}}>{mobile?c.name?.split(" ").slice(0,2).join(" "):c.name}</div><div style={{color:T.faint,fontSize:12,marginTop:2}}>{c.caseType} · {c.sponsor}</div></div>
              <Pill>Ativo</Pill>
            </div>
          ))}
          {clients.length===0&&<div style={{color:T.faint,textAlign:"center",padding:20}}>Nenhum cliente</div>}
        </Card>
      </div>
    );
  }
  // Cliente
  const myPay=payments.filter(p=>p.clientId===user.clientId);
  const totalPago=myPay.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
  const clientData=clients.find(c=>(c.clientId||c.uid)===user.clientId||c.uid===user.uid);
  const totalOwed = clientData?.plan?.total || user?.plan?.total || 0;
  const pct=totalOwed>0?Math.min(100,Math.round((totalPago/totalOwed)*100)):0;
  const activeStage=caseStatus.find(s=>s.status!=="pending"&&s.status!=="approved")||caseStatus[0];
  const unread=messages.filter(m=>m.clientId===user.clientId&&!m.read).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card style={{background:`linear-gradient(135deg,rgba(200,169,110,0.12),rgba(232,200,122,0.05))`,borderColor:"rgba(200,169,110,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div><div style={{color:T.faint,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em"}}>Seu Processo</div><div style={{color:T.gold,fontSize:30,fontWeight:700,margin:"4px 0"}}>{user.caseType}</div><div style={{color:T.dim,fontSize:13}}>{user.sponsor}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:T.faint,fontSize:11}}>Priority Date</div><div style={{color:T.text,fontSize:14,fontWeight:600,marginTop:2}}>{fmt(user.priorityDate)}</div></div>
        </div>
        <Divider/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:T.faint,fontSize:11,marginBottom:4}}>Etapa atual</div><div style={{color:T.text,fontSize:15,fontWeight:600}}>{activeStage?.stage}</div></div>
          {activeStage&&<Badge status={activeStage.status}/>}
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"1fr 1fr 1fr 1fr",gap:14}}>
        {[{label:"Total Pago",value:fmtK(totalPago),color:T.green},{label:"Saldo Restante",value:fmtK(totalOwed-totalPago),color:T.amber},{label:"Progresso",value:`${pct}%`,color:T.gold},{label:"Msgs Não Lidas",value:unread,color:unread>0?T.blue:T.dim}].map(k=>(
          <Card key={k.label} style={{padding:16,textAlign:"center"}}><div style={{color:k.color,fontSize:22,fontWeight:700}}>{k.value}</div><div style={{color:T.faint,fontSize:11,marginTop:4}}>{k.label}</div></Card>
        ))}
      </div>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{color:T.faint,fontSize:12,textTransform:"uppercase",letterSpacing:"0.07em"}}>Financeiro</span><span style={{color:T.gold,fontWeight:700}}>{pct}%</span></div>
        <ProgBar value={totalPago} total={totalOwed}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}><div><div style={{color:T.faint,fontSize:11}}>Pago</div><div style={{color:T.green,fontSize:16,fontWeight:700}}>{fmtUSD(totalPago)}</div></div><div style={{textAlign:"right"}}><div style={{color:T.faint,fontSize:11}}>Restante</div><div style={{color:T.amber,fontSize:16,fontWeight:700}}>{fmtUSD(totalOwed-totalPago)}</div></div></div>
      </Card>
      {mobile&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"Enviar comprovante",icon:"📎",action:"payments"},{label:"Ver processo",icon:"📋",action:"cases"},{label:"Visa Bulletin",icon:"🗓",action:"bulletin"},{label:"Relatórios",icon:"📊",action:"reports"}].map(a=>(
            <button key={a.label} onClick={()=>setActive(a.action)} style={{padding:"14px 10px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
              <span style={{fontSize:22}}>{a.icon}</span><span style={{color:T.dim,fontSize:12,textAlign:"center",fontFamily:"Georgia,serif"}}>{a.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MESSAGES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Messages({user,messages,setMessages,addMessage,clients,mobile}) {
  const isAdmin=user.role==="admin"||user.role==="developer";
  const [sel,setSel]=useState(null), [open,setOpen]=useState(false);
  const [form,setForm]=useState({subject:"",body:"",source:"zion",clientId:""});
  const list=isAdmin?messages:messages.filter(m=>m.clientId===user.clientId);
  const openMsg=msg=>{setSel(msg);if(!msg.read){dbUpdate("messages",msg.id,{read:true});setMessages(p=>p.map(m=>m.id===msg.id?{...m,read:true}:m));}};

  // Mostra nome do cliente na lista de mensagens (admin)
  const getClientName = (clientId) => {
    const c = clients.find(c=>(c.clientId||c.uid)===clientId);
    return c?.name?.split(" ")[0] || clientId;
  };

  const send=async()=>{
    if(!form.subject||!form.body)return;
    if(isAdmin&&!form.clientId)return;
    const targetClientId = isAdmin ? form.clientId : (user.clientId||user.uid);
    const data={clientId:targetClientId,from:isAdmin?"Zion Solutions":user.name,subject:form.subject,body:form.body,date:new Date().toISOString().split("T")[0],source:form.source,read:false};
    await addMessage(data);
    setOpen(false); setForm({subject:"",body:"",source:"zion",clientId:""});
  };

  // Mobile: tela cheia ao abrir mensagem
  if (mobile&&sel) return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <button onClick={()=>setSel(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:T.dim,fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif",padding:0}}>‹ Voltar</button>
      <h2 style={{color:T.text,fontSize:18,fontWeight:700,margin:0}}>{sel.subject}</h2>
      <div style={{display:"flex",gap:8}}><Pill color={sel.source==="zion"?T.gold:T.blue} bg={sel.source==="zion"?"rgba(232,200,122,0.12)":"rgba(96,165,250,0.12)"}>{sel.source==="zion"?"Zion Solutions":"Sponsor"}</Pill><span style={{color:T.faint,fontSize:12,alignSelf:"center"}}>{fmt(sel.date)}</span></div>
      <Card><p style={{color:"rgba(255,255,255,0.8)",lineHeight:1.75,fontSize:15,margin:0,whiteSpace:"pre-wrap"}}>{sel.body}</p></Card>
    </div>
  );

  return (
    <div style={{display:"flex",gap:20,height:mobile?"auto":"calc(100vh - 140px)"}}>
      {/* Lista */}
      <div style={{width:mobile?"100%":300,display:"flex",flexDirection:"column",gap:10,flexShrink:0}}>
        {isAdmin&&<Btn onClick={()=>setOpen(true)} style={{width:"100%",textAlign:"center"}}>+ Nova Mensagem</Btn>}
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>
          {list.length===0&&<div style={{color:T.faint,textAlign:"center",paddingTop:30,fontSize:13}}>Nenhuma mensagem</div>}
          {list.map(msg=>(
            <div key={msg.id} onClick={()=>openMsg(msg)} style={{padding:"13px 15px",background:(!mobile&&sel?.id===msg.id)?"rgba(200,169,110,0.12)":T.surface,border:`1px solid ${(!mobile&&sel?.id===msg.id)?"rgba(200,169,110,0.35)":T.border}`,borderRadius:12,cursor:"pointer",position:"relative"}}>
              {!msg.read&&<div style={{position:"absolute",top:14,right:14,width:8,height:8,borderRadius:"50%",background:T.gold}}/>}
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <Pill color={msg.source==="zion"?T.gold:T.blue} bg={msg.source==="zion"?"rgba(232,200,122,0.1)":"rgba(96,165,250,0.1)"}>{msg.source==="zion"?"Zion Solutions":"Sponsor"}</Pill>
                  {isAdmin&&<span style={{color:T.faint,fontSize:11}}>→ {getClientName(msg.clientId)}</span>}
                </div>
                <span style={{color:T.faint,fontSize:11}}>{fmt(msg.date)}</span>
              </div>
              <div style={{color:T.text,fontSize:13,fontWeight:msg.read?400:600,marginBottom:2,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{msg.subject}</div>
              <div style={{color:T.faint,fontSize:12,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:1,WebkitBoxOrient:"vertical"}}>{msg.body}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Conteúdo desktop */}
      {!mobile&&(
        <Card style={{flex:1,overflow:"auto"}}>
          {sel?(<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,paddingBottom:18,borderBottom:`1px solid ${T.border}`}}>
              <div><h2 style={{color:T.text,margin:"0 0 6px",fontSize:20}}>{sel.subject}</h2><div style={{color:T.faint,fontSize:13}}>De: {sel.from} · {fmt(sel.date)}</div></div>
              <Pill color={sel.source==="zion"?T.gold:T.blue} bg={sel.source==="zion"?"rgba(232,200,122,0.12)":"rgba(96,165,250,0.12)"}>{sel.source==="zion"?"Zion Solutions":"Sponsor"}</Pill>
            </div>
            <p style={{color:"rgba(255,255,255,0.8)",lineHeight:1.75,fontSize:14,margin:0,whiteSpace:"pre-wrap"}}>{sel.body}</p>
          </div>):(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:T.faint,fontSize:14}}>Selecione uma mensagem</div>)}
        </Card>
      )}
      <Overlay open={open} onClose={()=>setOpen(false)} title="Nova Mensagem" mobile={mobile}>
        {isAdmin&&(
          <>
            <div style={{marginBottom:14}}>
              <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Destinatário *</div>
              <select value={form.clientId} onChange={e=>setForm(p=>({...p,clientId:e.target.value}))} style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${form.clientId?T.border:"rgba(239,68,68,0.4)"}`,borderRadius:10,color:form.clientId?T.text:T.faint,fontSize:14,fontFamily:"Georgia,serif"}}>
                <option value="" style={{background:"#0D1117"}}>— Selecione o cliente —</option>
                {clients.map(c=><option key={c.uid} value={c.clientId||c.uid} style={{background:"#0D1117"}}>{c.name?.split(" ").slice(0,2).join(" ")}</option>)}
              </select>
            </div>
            <div style={{marginBottom:14}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Origem</div><select value={form.source} onChange={e=>setForm(p=>({...p,source:e.target.value}))} style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:14,fontFamily:"Georgia,serif"}}><option value="zion" style={{background:"#0D1117"}}>Zion Solutions</option><option value="sponsor" style={{background:"#0D1117"}}>Sponsor</option></select></div>
          </>
        )}
        <FInp label="Assunto" value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))}/>
        <div style={{marginBottom:16}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Mensagem</div><textarea value={form.body} onChange={e=>setForm(p=>({...p,body:e.target.value}))} rows={5} style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:14,resize:"none",boxSizing:"border-box",fontFamily:"Georgia,serif"}}/></div>
        <div style={{display:"flex",gap:10}}><Btn onClick={send} disabled={isAdmin&&!form.clientId} style={{flex:1,opacity:isAdmin&&!form.clientId?0.5:1}}>Enviar</Btn><Btn variant="ghost" onClick={()=>setOpen(false)} style={{flex:1}}>Cancelar</Btn></div>
      </Overlay>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PAYMENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Payments({user,payments,addPayment,updatePayment,deletePayment,clients,mobile}) {
  const isAdmin=user.role==="admin";
  return isAdmin
    ? <PaymentsAdmin payments={payments} updatePayment={updatePayment} deletePayment={deletePayment} clients={clients} mobile={mobile}/>
    : <PaymentsClient user={user} payments={payments} addPayment={addPayment} clients={clients} mobile={mobile}/>;
}

// ── Admin: confirmar comprovantes + visão geral ────────────────────────────
function PaymentsAdmin({payments,updatePayment,deletePayment,clients,mobile}) {
  const [filterId,setFilterId] = useState("all");
  const [confirmDel,setConfirmDel] = useState(null); // pagamento a deletar
  const change = async(id,status) => await updatePayment(id,status);

  const pending   = payments.filter(p=>p.status==="pending_review");
  const confirmed = payments.filter(p=>p.status==="confirmed");
  const totalArr  = confirmed.reduce((s,p)=>s+p.amount,0);
  const visible   = filterId==="all" ? payments : payments.filter(p=>p.clientId===filterId);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"1fr 1fr 1fr 1fr",gap:14}}>
        {[
          {label:"Total Arrecadado", value:fmtUSD(totalArr), color:T.green},
          {label:"Aguardando",       value:pending.length,   color:pending.length>0?T.amber:T.dim},
          {label:"Confirmados",      value:confirmed.length, color:T.blue},
          {label:"Clientes",         value:clients.length,   color:T.gold},
        ].map(k=>(
          <Card key={k.label} style={{padding:16,textAlign:"center"}}>
            <div style={{color:k.color,fontSize:22,fontWeight:700}}>{k.value}</div>
            <div style={{color:T.faint,fontSize:11,marginTop:4}}>{k.label}</div>
          </Card>
        ))}
      </div>

      {/* Progresso por cliente */}
      {clients.length>0&&(
        <Card>
          <h3 style={{color:T.gold,margin:"0 0 16px",fontSize:15}}>Progresso por Cliente</h3>
          {clients.map((c,i)=>{
            const pago = payments.filter(p=>p.clientId===(c.clientId||c.uid)&&p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
            const total = c.plan?.total || 0;
            const pct   = Math.min(100,Math.round((pago/total)*100));
            return (
              <div key={c.uid||i} style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <div>
                    <span style={{color:T.text,fontWeight:600,fontSize:14}}>{c.name?.split(" ").slice(0,2).join(" ")}</span>
                    {c.caseType&&<span style={{color:T.faint,fontSize:12,marginLeft:8}}>{c.caseType}</span>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <span style={{color:T.green,fontWeight:700,fontSize:13}}>{fmtUSD(pago)}</span>
                    <span style={{color:T.faint,fontSize:12}}> / {fmtUSD(total)} ({pct}%)</span>
                  </div>
                </div>
                <ProgBar value={pago} total={total} color={[T.gold,T.blue,T.green,"#8B5CF6"][i%4]}/>
              </div>
            );
          })}
        </Card>
      )}

      {/* Comprovantes pendentes em destaque */}
      {pending.length>0&&(
        <Card style={{borderColor:"rgba(245,158,11,0.35)",background:"rgba(245,158,11,0.05)"}}>
          <h3 style={{color:T.amber,margin:"0 0 14px",fontSize:15}}>⏳ Aguardando Revisão ({pending.length})</h3>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {pending.map(p=>{
              const cl=clients.find(c=>(c.clientId||c.uid)===p.clientId);
              return (
                <div key={p.id} style={{padding:"14px 16px",background:"rgba(255,255,255,0.04)",borderRadius:12,border:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{color:T.text,fontWeight:600,fontSize:14}}>{cl?.name?.split(" ").slice(0,2).join(" ")||p.clientId}</div>
                      <div style={{color:T.dim,fontSize:13,marginTop:2}}>{p.description}</div>
                      <div style={{color:T.faint,fontSize:12,marginTop:2}}>📅 {fmt(p.date)}</div>
                    </div>
                    <div style={{color:T.gold,fontWeight:700,fontSize:18}}>{fmtUSD(p.amount)}</div>
                  </div>
                  {p.receiptUrl&&(
                    <a href={p.receiptUrl} target="_blank" rel="noreferrer" style={{display:"inline-block",padding:"5px 12px",background:"rgba(96,165,250,0.1)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:8,color:T.blue,fontSize:12,textDecoration:"none",marginBottom:10}}>📎 Ver comprovante</a>
                  )}
                  <div style={{display:"flex",gap:8}}>
                    <Btn variant="success" onClick={()=>change(p.id,"confirmed")} style={{flex:1,padding:"9px",fontSize:13}}>✓ Confirmar</Btn>
                    <Btn variant="danger"  onClick={()=>change(p.id,"rejected")}  style={{flex:1,padding:"9px",fontSize:13}}>✗ Rejeitar</Btn>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>
      )}

      {/* Histórico completo com filtro + exclusão */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>
          <h3 style={{color:T.gold,margin:0,fontSize:15}}>Histórico Completo</h3>
          <select value={filterId} onChange={e=>setFilterId(e.target.value)} style={{padding:"7px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13,fontFamily:"Georgia,serif"}}>
            <option value="all" style={{background:"#0D1117"}}>Todos os clientes</option>
            {clients.map(c=><option key={c.uid} value={c.clientId||c.uid} style={{background:"#0D1117"}}>{c.name?.split(" ")[0]}</option>)}
          </select>
        </div>
        {visible.length===0
          ? <div style={{color:T.faint,textAlign:"center",padding:20}}>Nenhum pagamento.</div>
          : <div style={{display:"flex",flexDirection:"column",gap:0}}>
              {visible.map(p=>{
                const cl=clients.find(c=>(c.clientId||c.uid)===p.clientId);
                return (
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${T.border}`,gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                        <div style={{width:7,height:7,borderRadius:"50%",background:p.status==="confirmed"?T.green:p.status==="rejected"?T.red:T.amber,flexShrink:0}}/>
                        <span style={{color:T.dim,fontSize:12}}>{cl?.name?.split(" ")[0]||p.clientId}</span>
                      </div>
                      <div style={{color:T.text,fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.description}</div>
                      <div style={{color:T.faint,fontSize:11,marginTop:2}}>{fmt(p.date)}</div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{color:T.gold,fontWeight:700,fontSize:14}}>{fmtUSD(p.amount)}</div>
                      <div style={{fontSize:11,marginTop:2}}>
                        {p.status==="confirmed"&&<span style={{color:T.green}}>✓ Confirmado</span>}
                        {p.status==="rejected" &&<span style={{color:T.red}}>✗ Rejeitado</span>}
                        {p.status==="pending_review"&&<span style={{color:T.amber}}>⏳ Revisão</span>}
                      </div>
                      {p.receiptUrl&&<a href={p.receiptUrl} target="_blank" rel="noreferrer" style={{color:T.blue,fontSize:11,textDecoration:"none",display:"block"}}>📎 comprovante</a>}
                    </div>
                    {/* Botão excluir — só para confirmados */}
                    {p.status==="confirmed"&&(
                      <button onClick={()=>setConfirmDel(p)} title="Excluir pagamento confirmado" style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,color:T.red,fontSize:12,cursor:"pointer",padding:"5px 10px",fontFamily:"Georgia,serif",flexShrink:0}}>🗑</button>
                    )}
                  </div>
                );
              })}
            </div>
        }
      </Card>

      {/* Modal confirmar exclusão */}
      {confirmDel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}}>
          <Card style={{width:440,maxWidth:"100%"}}>
            <h3 style={{color:T.red,margin:"0 0 12px",fontSize:18}}>⚠️ Excluir Pagamento Confirmado</h3>
            <div style={{padding:"14px 16px",background:"rgba(239,68,68,0.08)",borderRadius:12,marginBottom:16,border:"1px solid rgba(239,68,68,0.2)"}}>
              <div style={{color:T.text,fontWeight:600,fontSize:15,marginBottom:4}}>{confirmDel.description}</div>
              <div style={{color:T.red,fontWeight:700,fontSize:22}}>{fmtUSD(confirmDel.amount)}</div>
              <div style={{color:T.faint,fontSize:12,marginTop:4}}>{fmt(confirmDel.date)}</div>
            </div>
            <p style={{color:T.dim,fontSize:14,lineHeight:1.6,marginBottom:20}}>
              Este pagamento de <strong style={{color:T.text}}>{fmtUSD(confirmDel.amount)}</strong> será excluído permanentemente e <strong style={{color:T.red}}>deduzido do total pago</strong> do cliente. Esta ação não pode ser desfeita.
            </p>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="danger" onClick={async()=>{await deletePayment(confirmDel.id);setConfirmDel(null);}} style={{flex:1}}>Sim, excluir</Btn>
              <Btn variant="ghost" onClick={()=>setConfirmDel(null)} style={{flex:1}}>Cancelar</Btn>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ── Cliente: plano com progresso automático + enviar comprovante ─────────────
function PaymentsClient({user,payments,addPayment,clients,mobile}) {
  const [open,setOpen]         = useState(false);
  const [uploading,setUploading] = useState(false);
  const [selectedOption,setSelectedOption] = useState(null); // opção selecionada do plano
  const [receiptUrl,setReceiptUrl] = useState("");

  const myPay    = payments.filter(p=>p.clientId===user.clientId);
  const clientData = clients.find(c=>(c.clientId||c.uid)===user.clientId||c.uid===user.uid) || user;

  // Valores do plano — prioriza clientData do Firestore, depois user.plan
  const hasPlan = !!(clientData?.plan?.total || user?.plan?.total);
  const plan_assinatura  = clientData?.plan?.assinatura  ?? user?.plan?.assinatura  ?? 0;
  const plan_parcela     = clientData?.plan?.parcela     ?? user?.plan?.parcela     ?? 0;
  const plan_numParcelas = clientData?.plan?.numParcelas ?? user?.plan?.numParcelas ?? 0;
  const plan_i140        = clientData?.plan?.i140        ?? user?.plan?.i140        ?? 0;
  const plan_dependente  = clientData?.plan?.dependente  ?? user?.plan?.dependente  ?? 0;
  const totalOwed = plan_assinatura + (plan_parcela*plan_numParcelas) + plan_i140 + plan_dependente;

  // Gera lista de opções de pagamento do plano
  const planOptions = [
    { id:"assinatura", label:"Assinatura do contrato",   amount: plan_assinatura },
    // Parcelas individuais
    ...Array.from({length: plan_numParcelas}, (_,i) => ({
      id: `parcela_${i+1}`,
      label: `${i+1}ª parcela`,
      amount: plan_parcela,
    })),
    { id:"i140",      label:"Aplicação do I-140",        amount: plan_i140 },
    { id:"dependente",label:"Dependente",                amount: plan_dependente > 0 ? plan_dependente : null },
    { id:"uscis",     label:"Taxas USCIS (governo)",     amount: null, custom: true },
    { id:"outro",     label:"Outro (valor personalizado)", amount: null, custom: true },
  ].filter(o => o.amount !== 0 || o.custom); // remove itens com valor zero

  // Pagamentos confirmados para checar quais já foram pagos
  const paidLabels = myPay.filter(p=>p.status==="confirmed").map(p=>p.description);

  // Progresso por etapa
  const totalPago = myPay.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
  const pendentes = myPay.filter(p=>p.status==="pending_review");
  let saldo = totalPago;
  const calcStage = amt => { if(!amt)return{pago:0,done:false}; const p=Math.min(amt,saldo); saldo=Math.max(0,saldo-amt); return{pago:p,done:p>=amt}; };
  const s1=calcStage(plan_assinatura);
  const s2=calcStage(plan_parcela*plan_numParcelas);
  const s3=calcStage(plan_i140);
  const s4=calcStage(plan_dependente);
  const stages = [
    {label:"Assinatura do contrato",                              amount:plan_assinatura,              ...s1, icon:"✍️"},
    {label:`${plan_numParcelas}× parcelas de ${fmtUSD(plan_parcela)}`, amount:plan_parcela*plan_numParcelas, ...s2, icon:"📅"},
    {label:"Aplicação do I-140",                                  amount:plan_i140,                    ...s3, icon:"📋"},
    {label:"Dependente",                                          amount:plan_dependente,              ...s4, icon:"👥"},
    {label:"Taxas USCIS (governo)",                               amount:null, pago:0, done:false, note:"A definir", icon:"🏛"},
  ];
  const pct = Math.min(100,Math.round((totalPago/totalOwed)*100));

  const [customAmount, setCustomAmount] = useState("");

  const submit = async() => {
    if(!selectedOption) return;
    const amount = selectedOption.custom ? Number(customAmount) : selectedOption.amount;
    if(!amount||amount<=0) return;
    setUploading(true);
    try {
      await addPayment({
        clientId:    user.clientId||user.uid,
        description: selectedOption.label,
        amount,
        date:        new Date().toISOString().split("T")[0],
        status:      "pending_review",
        receiptUrl:  receiptUrl||null,
        planOptionId: selectedOption.id,
      });
      setOpen(false); setSelectedOption(null); setReceiptUrl(""); setCustomAmount("");
    } finally { setUploading(false); }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

      {/* Aviso se plano não configurado */}
      {!hasPlan&&(
        <div style={{padding:"14px 16px",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:14}}>
          <div style={{color:T.amber,fontWeight:600,fontSize:14,marginBottom:4}}>⚠️ Plano não configurado</div>
          <div style={{color:T.dim,fontSize:13,lineHeight:1.6}}>Seu plano de pagamento ainda não foi cadastrado pela Zion Solutions. Entre em contato para regularizar.</div>
        </div>
      )}
      {pendentes.length>0&&(
        <div style={{padding:"12px 16px",background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:T.amber,fontWeight:600,fontSize:14}}>⏳ {pendentes.length} comprovante{pendentes.length>1?"s":""} em revisão</div><div style={{color:T.dim,fontSize:12,marginTop:2}}>Aguardando confirmação da Zion Solutions</div></div>
        </div>
      )}

      {/* Card principal — progresso geral */}
      <Card style={{background:`linear-gradient(135deg,rgba(200,169,110,0.12),rgba(16,185,129,0.04))`,borderColor:"rgba(200,169,110,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
          <div>
            <div style={{color:T.faint,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>Progresso Total</div>
            <div style={{display:"flex",alignItems:"baseline",gap:8}}>
              <span style={{color:T.green,fontSize:32,fontWeight:700}}>{fmtUSD(totalPago)}</span>
              <span style={{color:T.faint,fontSize:14}}>de {fmtUSD(totalOwed)}</span>
            </div>
          </div>
          <div style={{textAlign:"center"}}>
            {/* Círculo de progresso */}
            <div style={{position:"relative",width:72,height:72}}>
              <svg width="72" height="72" style={{transform:"rotate(-90deg)"}}>
                <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="8"/>
                <circle cx="36" cy="36" r="28" fill="none" stroke={pct>=100?T.green:T.gold} strokeWidth="8"
                  strokeDasharray={`${2*Math.PI*28}`}
                  strokeDashoffset={`${2*Math.PI*28*(1-pct/100)}`}
                  strokeLinecap="round" style={{transition:"stroke-dashoffset 0.8s ease"}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <span style={{color:pct>=100?T.green:T.gold,fontWeight:700,fontSize:15}}>{pct}%</span>
              </div>
            </div>
          </div>
        </div>
        <ProgBar value={totalPago} total={totalOwed} h={10}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:12}}>
          <div><div style={{color:T.faint,fontSize:11}}>Pago</div><div style={{color:T.green,fontWeight:700,fontSize:15}}>{fmtUSD(totalPago)}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:T.faint,fontSize:11}}>Restante</div><div style={{color:T.amber,fontWeight:700,fontSize:15}}>{fmtUSD(Math.max(0,totalOwed-totalPago))}</div></div>
        </div>
      </Card>

      {/* Plano detalhado com progresso por etapa */}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <h3 style={{color:T.gold,margin:0,fontSize:15}}>Plano de Pagamento</h3>
          <Btn onClick={()=>setOpen(true)} style={{padding:"7px 16px",fontSize:13}}>+ Enviar Comprovante</Btn>
        </div>
        {stages.map((item,i)=>(
          <div key={i} style={{padding:"14px 0",borderBottom:i<stages.length-1?`1px solid ${T.border}`:"none"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:item.amount&&!item.done&&item.pago>0?10:0}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                {/* Ícone de status */}
                <div style={{width:32,height:32,borderRadius:"50%",background:item.done?"rgba(16,185,129,0.15)":item.pago>0?"rgba(245,158,11,0.15)":"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0,border:`2px solid ${item.done?T.green:item.pago>0?T.amber:"rgba(255,255,255,0.1)"}`}}>
                  {item.done?"✓":item.pago>0?"…":item.icon}
                </div>
                <div>
                  <div style={{color:item.done?T.text:item.pago>0?T.text:T.dim,fontSize:13,fontWeight:item.done||item.pago>0?600:400}}>{item.label}</div>
                  {item.done&&<div style={{color:T.green,fontSize:11,marginTop:2}}>✓ Quitado</div>}
                  {!item.done&&item.pago>0&&<div style={{color:T.amber,fontSize:11,marginTop:2}}>Em andamento</div>}
                  {!item.done&&item.pago===0&&item.amount&&<div style={{color:T.faint,fontSize:11,marginTop:2}}>Aguardando etapas anteriores</div>}
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                {item.amount?(
                  item.done
                    ? <span style={{color:T.green,fontWeight:700,fontSize:14}}>{fmtUSD(item.amount)}</span>
                    : item.pago>0
                      ? <div><span style={{color:T.amber,fontWeight:700,fontSize:14}}>{fmtUSD(item.pago)}</span><div style={{color:T.faint,fontSize:11}}>{fmtUSD(item.amount)} total</div></div>
                      : <span style={{color:T.faint,fontSize:13}}>{fmtUSD(item.amount)}</span>
                ):(
                  <span style={{color:T.faint,fontSize:12,fontStyle:"italic"}}>{item.note}</span>
                )}
              </div>
            </div>
            {/* Barra de progresso parcial */}
            {item.amount&&!item.done&&item.pago>0&&(
              <div style={{marginLeft:44}}>
                <ProgBar value={item.pago} total={item.amount} color={T.amber} h={6}/>
                <div style={{color:T.faint,fontSize:11,marginTop:4}}>{Math.round((item.pago/item.amount)*100)}% desta etapa</div>
              </div>
            )}
          </div>
        ))}
      </Card>

      {/* Histórico */}
      <Card>
        <h3 style={{color:T.gold,margin:"0 0 14px",fontSize:15}}>Histórico de Pagamentos</h3>
        {myPay.length===0
          ? <div style={{color:T.faint,textAlign:"center",padding:20,fontSize:13}}>Nenhum pagamento registrado.<br/><span style={{fontSize:12}}>Envie um comprovante para começar.</span></div>
          : <div style={{display:"flex",flexDirection:"column",gap:0}}>
              {[...myPay].reverse().map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:p.status==="confirmed"?T.green:p.status==="rejected"?T.red:T.amber,flexShrink:0}}/>
                    <div>
                      <div style={{color:T.text,fontWeight:600,fontSize:13}}>{p.description}</div>
                      <div style={{color:T.faint,fontSize:11,marginTop:2}}>{fmt(p.date)}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:T.gold,fontWeight:700,fontSize:14}}>{fmtUSD(p.amount)}</div>
                    <div style={{fontSize:11,marginTop:2}}>
                      {p.status==="confirmed"&&<span style={{color:T.green}}>✓ Confirmado</span>}
                      {p.status==="rejected" &&<span style={{color:T.red}}>✗ Rejeitado</span>}
                      {p.status==="pending_review"&&<span style={{color:T.amber}}>⏳ Em revisão</span>}
                    </div>
                    {p.receiptUrl&&<a href={p.receiptUrl} target="_blank" rel="noreferrer" style={{color:T.blue,fontSize:11,textDecoration:"none"}}>📎 ver</a>}
                  </div>
                </div>
              ))}
            </div>
        }
      </Card>

      <Overlay open={open} onClose={()=>{setOpen(false);setSelectedOption(null);setReceiptUrl("");setCustomAmount("");}} title="Enviar Comprovante" mobile={mobile}>
        {/* Seleção do item do plano */}
        <div style={{marginBottom:16}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>O que você está pagando? *</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:280,overflowY:"auto"}}>
            {planOptions.map(opt=>{
              const isSelected = selectedOption?.id===opt.id;
              const isPaid = paidLabels.includes(opt.label);
              return (
                <button key={opt.id} onClick={()=>!isPaid&&setSelectedOption(opt)} disabled={isPaid}
                  style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:isSelected?"rgba(232,200,122,0.15)":isPaid?"rgba(16,185,129,0.06)":T.surface,border:`2px solid ${isSelected?"rgba(232,200,122,0.5)":isPaid?"rgba(16,185,129,0.2)":T.border}`,borderRadius:12,cursor:isPaid?"default":"pointer",fontFamily:"Georgia,serif",opacity:isPaid?0.7:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:16}}>{isPaid?"✅":isSelected?"🔘":"⬜"}</span>
                    <div style={{textAlign:"left"}}>
                      <div style={{color:isPaid?T.green:T.text,fontWeight:isSelected?700:400,fontSize:14}}>{opt.label}</div>
                      {isPaid&&<div style={{color:T.green,fontSize:11}}>já pago</div>}
                    </div>
                  </div>
                  {opt.amount&&<span style={{color:isSelected?T.gold:T.faint,fontWeight:600,fontSize:14}}>{fmtUSD(opt.amount)}</span>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Valor customizado para "Outro" ou "USCIS" */}
        {selectedOption?.custom&&(
          <FInp label="Valor ($)" type="number" value={customAmount} onChange={e=>setCustomAmount(e.target.value)} placeholder="Digite o valor"/>
        )}

        {/* Resumo do selecionado */}
        {selectedOption&&(
          <div style={{padding:"12px 16px",background:"rgba(232,200,122,0.08)",border:`1px solid rgba(232,200,122,0.2)`,borderRadius:12,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{color:T.faint,fontSize:11}}>Pagamento selecionado</div><div style={{color:T.text,fontWeight:600,fontSize:14}}>{selectedOption.label}</div></div>
            <div style={{color:T.gold,fontWeight:700,fontSize:18}}>{selectedOption.amount?fmtUSD(selectedOption.amount):customAmount?fmtUSD(Number(customAmount)):"—"}</div>
          </div>
        )}

        {/* Link do comprovante */}
        <FInp label="Link do comprovante (Google Drive, iCloud, etc.)" value={receiptUrl} onChange={e=>setReceiptUrl(e.target.value)} placeholder="https://drive.google.com/..."/>
        <div style={{padding:"10px 14px",background:"rgba(96,165,250,0.07)",border:`1px solid rgba(96,165,250,0.2)`,borderRadius:10,marginBottom:16,fontSize:12,color:T.dim,lineHeight:1.6}}>
          💡 <strong style={{color:T.blue}}>Google Drive</strong> → Compartilhar → Copiar link &nbsp;|&nbsp;
          <strong style={{color:T.blue}}>iCloud</strong> → Compartilhar → Copiar link
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={submit} disabled={uploading||!selectedOption||(selectedOption.custom&&!customAmount)} style={{flex:1}}>{uploading?"Enviando…":"Enviar"}</Btn>
          <Btn variant="ghost" onClick={()=>{setOpen(false);setSelectedOption(null);setReceiptUrl("");setCustomAmount("");}} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CASES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Cases({user,caseStatus,updateCaseStatus,clients,mobile}) {
  const isAdmin=user.role==="admin"||user.role==="developer";
  const [editing,setEditing]=useState(null), [ed,setEd]=useState({});
  const [selectedClient,setSelectedClient]=useState(null);
  const [clientCaseStatus,setClientCaseStatus]=useState(null);
  const [loadingCase,setLoadingCase]=useState(false);

  // Admin seleciona cliente → carrega caseStatus dele
  const loadClientCase = async (c) => {
    setSelectedClient(c);
    setLoadingCase(true);
    const cid = c.clientId || c.uid;
    const data = await dbGet("caseStatus", cid);
    setClientCaseStatus(data?.stages || DEFAULT_CASE);
    setLoadingCase(false);
    setEditing(null);
  };

  // Usa caseStatus do cliente selecionado (admin) ou do próprio usuário (cliente)
  const displayStatus = isAdmin ? (clientCaseStatus || []) : caseStatus;
  const clientInfo = isAdmin ? selectedClient : user;

  const save = async id => {
    const updated = displayStatus.map(s=>s.id===id?{...s,...ed}:s);
    if (isAdmin && selectedClient) {
      await updateCaseStatus(updated, selectedClient);
      setClientCaseStatus(updated);
    } else {
      await updateCaseStatus(updated);
    }
    setEditing(null);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Seletor de cliente (admin only) */}

        <Card>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:10}}>Selecionar Cliente</div>

            ? <div style={{color:T.faint,fontSize:13}}>Nenhum cliente cadastrado.</div>

                {clients.map(c=>(
                  <button key={c.uid} onClick={()=>loadClientCase(c)}
                    style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:selectedClient?.uid===c.uid?"rgba(232,200,122,0.12)":T.surface,border:`2px solid ${selectedClient?.uid===c.uid?"rgba(232,200,122,0.4)":T.border}`,borderRadius:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                    <div style={{textAlign:"left"}}>
                      <div style={{color:T.text,fontWeight:600,fontSize:14}}>{c.name}</div>
                      <div style={{color:T.faint,fontSize:12,marginTop:2}}>{c.caseType} · {c.sponsor||"—"}</div>
                    </div>

      {/* Timeline do processo */}
      {(!isAdmin||selectedClient)&&(
        <Card>
          <h3 style={{color:T.gold,margin:"0 0 6px",fontSize:18}}>

          {isAdmin&&selectedClient&&<div style={{color:T.faint,fontSize:12,marginBottom:20}}>👤 {selectedClient.name}</div>}
          {loadingCase&&<div style={{color:T.faint,textAlign:"center",padding:30}}>Carregando…</div>}
          {!loadingCase&&(
            <div style={{position:"relative"}}>
              <div style={{position:"absolute",left:19,top:8,bottom:8,width:2,background:T.border}}/>
              {displayStatus.map(stage=>{
                const cfg=SC[stage.status]||SC.pending;
                return (
                  <div key={stage.id} style={{display:"flex",gap:18,paddingBottom:22}}>
                    <div style={{width:40,display:"flex",justifyContent:"center",flexShrink:0,zIndex:1}}>
                      <div style={{width:20,height:20,borderRadius:"50%",background:cfg.color,marginTop:6,boxShadow:`0 0 10px ${cfg.color}66`}}/>
                    </div>
                    <div style={{flex:1,background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:12,padding:"13px 16px"}}>
                      {editing===stage.id?(
                        <div>
                          <div style={{display:"flex",gap:10,marginBottom:10}}>
                            <select value={ed.status} onChange={e=>setEd(p=>({...p,status:e.target.value}))} style={{flex:1,padding:"9px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13,fontFamily:"Georgia,serif"}}>
                              {Object.entries(SC).map(([k,v])=><option key={k} value={k} style={{background:"#0D1117"}}>{v.label}</option>)}
                            </select>
                            <input type="date" value={ed.date||""} onChange={e=>setEd(p=>({...p,date:e.target.value}))} style={{padding:"9px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13}}/>
                          </div>
                          <input value={ed.note||""} onChange={e=>setEd(p=>({...p,note:e.target.value}))} placeholder="Observação" style={{width:"100%",padding:"9px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:9,color:T.text,fontSize:13,boxSizing:"border-box",fontFamily:"Georgia,serif",marginBottom:10}}/>
                          <div style={{display:"flex",gap:8}}>
                            <Btn style={{padding:"6px 16px",fontSize:12}} onClick={()=>save(stage.id)}>Salvar</Btn>
                            <Btn variant="ghost" style={{padding:"6px 14px",fontSize:12}} onClick={()=>setEditing(null)}>Cancelar</Btn>
                          </div>
                        </div>
                      ):(
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                          <div>
                            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
                              <span style={{color:T.text,fontWeight:700,fontSize:15}}>{stage.stage}</span>
                              <Badge status={stage.status}/>
                            </div>
                            {stage.date&&<div style={{color:T.faint,fontSize:12,marginBottom:4}}>📅 {fmt(stage.date)}</div>}
                            <div style={{color:T.dim,fontSize:13,lineHeight:1.5}}>{stage.note}</div>
                          </div>
                          {isAdmin&&<Btn variant="ghost" style={{padding:"5px 12px",fontSize:12,flexShrink:0}} onClick={()=>{setEditing(stage.id);setEd({status:stage.status,note:stage.note||"",date:stage.date||""});}}>Editar</Btn>}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      )}
      {isAdmin&&!selectedClient&&clients.length>0&&(
        <div style={{textAlign:"center",color:T.faint,fontSize:14,padding:20}}>
          ← Selecione um cliente para ver o processo
        </div>
      )}

      {/* Links de pesquisa externa — só para clientes */}
      {!isAdmin&&(
        <Card style={{borderColor:"rgba(96,165,250,0.2)",background:"rgba(96,165,250,0.03)"}}>
          <h3 style={{color:T.gold,margin:"0 0 6px",fontSize:16}}>🔍 Consultar nos Sites Oficiais</h3>
          <p style={{color:T.dim,fontSize:12,lineHeight:1.6,marginBottom:14}}>
            Cada etapa é gerenciada por um órgão diferente. Consulte diretamente:
          </p>

          {/* DOL — PERM */}
          <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:12,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{color:T.text,fontWeight:700,fontSize:13,marginBottom:3}}>🏛 PERM — DOL (Departamento do Trabalho)</div>
                <div style={{color:T.faint,fontSize:11,lineHeight:1.5}}>Para consultar o status da sua certificação de trabalho. Use seu número de protocolo <span style={{color:T.gold,fontFamily:"monospace"}}>G-200-26086-734717</span></div>
              </div>
              <a href="https://flag.dol.gov/case-status-search" target="_blank" rel="noreferrer"
                style={{display:"block",padding:"8px 14px",background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,borderRadius:9,color:"#0A0F1E",fontWeight:700,fontSize:12,textDecoration:"none",flexShrink:0,fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>
                Abrir ↗
              </a>
            </div>
          </div>

          {/* USCIS */}
          <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.04)",border:`1px solid ${T.border}`,borderRadius:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{color:T.text,fontWeight:700,fontSize:13,marginBottom:3}}>🦅 I-140 / I-485 / Green Card — USCIS</div>
                <div style={{color:T.faint,fontSize:11,lineHeight:1.5}}>Etapas após o PERM. Use o Receipt Number fornecido pela Zion Solutions (ex: <span style={{fontFamily:"monospace"}}>MSC259...</span>)</div>
              </div>
              <a href="https://egov.uscis.gov/casestatus/landing.do" target="_blank" rel="noreferrer"
                style={{display:"block",padding:"8px 14px",background:"rgba(96,165,250,0.15)",border:"1px solid rgba(96,165,250,0.3)",borderRadius:9,color:T.blue,fontWeight:700,fontSize:12,textDecoration:"none",flexShrink:0,fontFamily:"Georgia,serif",whiteSpace:"nowrap"}}>
                Abrir ↗
              </a>
            </div>
          </div>
        </Card>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// BULLETIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Bulletin({user,bulletin,updateBulletin,mobile}) {
  const isAdmin=user.role==="admin";
  const [editing,setEditing]=useState(false), [draft,setDraft]=useState(bulletin), [saving,setSaving]=useState(false);
  const setB=(key,field,val)=>setDraft(p=>({...p,[key]:{...p[key],brazil:{...p[key].brazil,[field]:val}}}));
  const save=async()=>{ setSaving(true); await updateBulletin(draft); setEditing(false); setSaving(false); };
  const b=editing?draft:bulletin;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div><h3 style={{color:T.gold,margin:"0 0 4px",fontSize:18}}>Visa Bulletin — {b.month}</h3><p style={{color:T.faint,margin:0,fontSize:12}}>Fonte: {b.source} · Atualizado: {fmt(b.updated)}</p></div>
          {isAdmin&&!editing&&<Btn variant="ghost" onClick={()=>setEditing(true)} style={{padding:"7px 14px",fontSize:12}}>Editar</Btn>}
          {isAdmin&&editing&&<div style={{display:"flex",gap:8}}><Btn onClick={save} disabled={saving} style={{padding:"7px 14px",fontSize:12}}>{saving?"Salvando…":"Salvar"}</Btn><Btn variant="ghost" onClick={()=>{setEditing(false);setDraft(bulletin);}} style={{padding:"7px 14px",fontSize:12}}>Cancelar</Btn></div>}
        </div>
        {editing&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20,paddingBottom:20,borderBottom:`1px solid ${T.border}`}}>
          <FInp label="Mês" value={draft.month} onChange={e=>setDraft(p=>({...p,month:e.target.value}))}/>
          <FInp label="Data de atualização" type="date" value={draft.updated} onChange={e=>setDraft(p=>({...p,updated:e.target.value}))}/>
        </div>}
        <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:14}}>
          {[{title:"EB-3 Skilled Workers",key:"eb3",color:T.gold},{title:"EB-3 Other Workers (Unskilled)",key:"eb3Unskilled",color:T.blue}].map(({title,key,color})=>(
            <div key={key} style={{padding:16,background:"rgba(255,255,255,0.04)",borderRadius:12,border:`1px solid ${T.border}`}}>
              <div style={{color,fontWeight:600,fontSize:13,marginBottom:14}}>{title}</div>
              {[{label:"Final Action Date",field:"finalAction"},{label:"Dates for Filing",field:"datesForFiling"}].map(({label,field})=>(
                <div key={field} style={{marginBottom:12}}>
                  <div style={{color:T.faint,fontSize:11,marginBottom:4}}>BRASIL — {label}</div>
                  {editing?<input value={b[key].brazil[field]} onChange={e=>setB(key,field,e.target.value)} style={{width:"100%",padding:"8px 12px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13,boxSizing:"border-box",fontFamily:"Georgia,serif"}}/>:<div style={{color:b[key].brazil[field]==="Current"?T.green:color,fontWeight:700,fontSize:16}}>{b[key].brazil[field]==="Current"?"🟢 Current":fmt(b[key].brazil[field])}</div>}
                </div>
              ))}
            </div>
          ))}
        </div>
      </Card>
      {!isAdmin&&(
        <div style={{padding:16,background:"rgba(245,158,11,0.08)",border:"1px solid rgba(245,158,11,0.25)",borderRadius:14}}>
          <div style={{color:T.amber,fontWeight:600,marginBottom:8}}>⚠️ Sua Situação</div>
          <div style={{color:"rgba(255,255,255,0.65)",fontSize:14,lineHeight:1.7}}>Priority date: <strong style={{color:T.text}}>{fmt(user.priorityDate)||"27/03/2026"}</strong>. EB-3 Unskilled analisando até <strong style={{color:T.text}}>{fmt(bulletin.eb3Unskilled.brazil.datesForFiling)}</strong>. Faltam aprox. <strong style={{color:T.text}}>3 anos e 7 meses</strong> para o I-485.</div>
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CLIENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Clients({clients,setClients,mobile}) {
  const TYPES=["EB-1","EB-2","EB-3","EB-3 Unskilled","O-1","H-1B","L-1","TN"];
  const EMPTY={name:"",email:"",caseType:"EB-3",sponsor:"",priorityDate:"",pAssinatura:"3500",pParcela:"550",pNumParcelas:"10",pI140:"4500",pDependente:"0",pObs:""};
  const [open,setOpen]=useState(false), [planView,setPlanView]=useState(null), [del,setDel]=useState(null);
  const [form,setForm]=useState(EMPTY);
  const [loading,setLoading]=useState(false);
  const [msg,setMsg]=useState(null);
  const total=()=>(Number(form.pAssinatura)||0)+((Number(form.pParcela)||0)*(Number(form.pNumParcelas)||0))+(Number(form.pI140)||0)+(Number(form.pDependente)||0);

  const add=async()=>{
    if(!form.name||!form.email){setMsg({type:"error",text:"Nome e e-mail são obrigatórios."});return;}
    setLoading(true); setMsg(null);

    // Senha padrão = primeiro nome em minúsculo
    const defaultPassword = form.name.trim().split(" ")[0].toLowerCase();

    try {
      // 1. Criar usuário no Firebase Auth
      const res = await fetch(
        `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FB_CONFIG.apiKey}`,
        { method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({email:form.email, password:defaultPassword, returnSecureToken:true}) }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const uid = data.localId;
      const clientId = `client_${Date.now()}`;
      const plan={assinatura:Number(form.pAssinatura)||0,parcela:Number(form.pParcela)||0,numParcelas:Number(form.pNumParcelas)||0,i140:Number(form.pI140)||0,dependente:Number(form.pDependente)||0,total:total(),obs:form.pObs};

      // 2. Salvar perfil no Firestore
      await dbUpdate("users", uid, {
        name:form.name, email:form.email, role:"client",
        clientId, caseType:form.caseType, sponsor:form.sponsor,
        priorityDate:form.priorityDate, plan,
      });

      // 3. Criar caseStatus padrão
      await dbUpdate("caseStatus", clientId, { stages: DEFAULT_CASE });

      // 4. Enviar e-mail de boas-vindas com resumo do processo e plano
      await sendEmail({
        to_email:   form.email,
        to_name:    form.name.split(" ")[0],
        subject:    "🎉 Bem-vindo ao Portal Zion Solutions!",
        event_type: "welcome",
        message:    `Seu acesso ao portal foi criado com sucesso!\n\n` +
                    `━━ SEUS DADOS DE ACESSO ━━\n` +
                    `🌐 Portal: zionsolution.netlify.app\n` +
                    `📧 E-mail: ${form.email}\n` +
                    `🔑 Senha: ${defaultPassword}\n` +
                    `(Recomendamos alterar sua senha no primeiro acesso)\n\n` +
                    `━━ SEU PROCESSO ━━\n` +
