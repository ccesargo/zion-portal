const FB_CONFIG = window.__FIREBASE_CONFIG__ || {};

// SDK carregado dinamicamente via CDN (funciona no HTML standalone)
let _app, _auth, _db, _storage;

async function initFirebase() {
  if (_app) return;
  const { initializeApp }             = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
  const { getFirestore, collection, doc, getDocs, getDoc, addDoc, setDoc, updateDoc, onSnapshot, query, where, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
  const { getStorage, ref, uploadBytes, getDownloadURL } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js");

  _app  = initializeApp(FB_CONFIG);
  _auth = { inst: getAuth(_app), signIn: signInWithEmailAndPassword, signOut, onAuthStateChanged };
  _db   = { inst: getFirestore(_app), collection, doc, getDocs, getDoc, addDoc, setDoc, updateDoc, onSnapshot, query, where, serverTimestamp };
  _storage = { inst: getStorage(_app), ref, uploadBytes, getDownloadURL };
}

// ── Firestore helpers ─────────────────────────────
async function dbGet(col, id) {
  const snap = await _db.getDoc(_db.doc(_db.inst, col, id));
  return snap.exists() ? { id: snap.id, ...snap.data() } : null;
}
async function dbAdd(col, data) {
  const r = await _db.addDoc(_db.collection(_db.inst, col), { ...data, createdAt: _db.serverTimestamp() });
  return r.id;
}
// dbSet: cria ou sobrescreve (merge) — nunca falha se documento não existe
async function dbSet(col, id, data) {
  await _db.setDoc(_db.doc(_db.inst, col, id), { ...data, updatedAt: _db.serverTimestamp() }, { merge: true });
}
// dbUpdate: mantido para compatibilidade, mas usa setDoc com merge internamente
async function dbUpdate(col, id, data) {
  await _db.setDoc(_db.doc(_db.inst, col, id), { ...data, updatedAt: _db.serverTimestamp() }, { merge: true });
}
function dbListen(col, cb, ...filters) {
  const q = filters.length
    ? _db.query(_db.collection(_db.inst, col), ...filters)
    : _db.collection(_db.inst, col);
  return _db.onSnapshot(q, snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
}
async function dbList(col, ...filters) {
  const q = filters.length
    ? _db.query(_db.collection(_db.inst, col), ...filters)
    : _db.collection(_db.inst, col);
  const snap = await _db.getDocs(q);
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function uploadReceipt(file, clientId) {
  const r = _storage.ref(_storage.inst, `receipts/${clientId}/${Date.now()}_${file.name}`);
  await _storage.uploadBytes(r, file);
  return _storage.getDownloadURL(r);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function driveCreateFolder(clientName, clientId) {
  const res = await fetch("/.netlify/functions/create-folder", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ clientName, clientId }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Erro ao criar pasta no Drive");
  return data; // { folderId, created }
}

async function driveUploadFile(folderId, subfolder, file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const base64 = reader.result.split(",")[1];
        const res = await fetch("/.netlify/functions/upload-file", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            folderId,
            subfolder,
            fileName: file.name,
            mimeType: file.type,
            fileBase64: base64,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Erro no upload");
        resolve(data); // { fileId, fileName, viewLink }
      } catch(e) { reject(e); }
    };
    reader.onerror = () => reject(new Error("Erro ao ler arquivo"));
    reader.readAsDataURL(file);
  });
}

async function driveListFiles(folderId) {
  const res = await fetch(`/.netlify/functions/list-files?folderId=${folderId}`);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Erro ao listar arquivos");
  return data.files;
}

async function sendEmail({to_email, to_name, subject, message, event_type}) {
  if (!to_email) { console.warn("sendEmail: sem destinatário"); return; }
  try {
    const res = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        service_id:  EMAILJS.serviceId,
        template_id: EMAILJS.templateId,
        user_id:     EMAILJS.publicKey,
        template_params: {
          to_email,
          to_name:   to_name || to_email,
          subject,
          message,
          event_type: event_type || "notification",
          from_name:  "Zion Solutions",
          reply_to:   "admin@zionsolutions.com",
        },
      }),
    });
    if (res.ok) {
      console.log("✓ E-mail enviado para", to_email);
    } else {
      const txt = await res.text();
      console.warn("EmailJS erro:", res.status, txt);
    }
  } catch(e) {
    console.warn("EmailJS falhou (sem bloquear ação):", e.message);
  }
}

// HOOK: detecta mobile (< 768px)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth < 768);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth < 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return mobile;
}

function Card({children,style={}}) {
  return <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:16,padding:20,...style}}>{children}</div>;
}
function Badge({status}) {
  const c=SC[status]||SC.pending;
  return <span style={{padding:"3px 12px",borderRadius:99,fontSize:12,fontWeight:700,color:c.color,background:c.bg,display:"inline-block"}}>{c.label}</span>;
}
function Pill({children,color=T.gold,bg="rgba(232,200,122,0.12)"}) {
  return <span style={{padding:"3px 10px",borderRadius:99,fontSize:11,fontWeight:600,color,background:bg}}>{children}</span>;
}
function Btn({children,variant="primary",style={},...p}) {
  const v={
    primary:{background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,color:"#0A0F1E",border:"none"},
    ghost:{background:T.surface,color:T.text,border:`1px solid ${T.border}`},
    danger:{background:"rgba(239,68,68,0.12)",color:T.red,border:"1px solid rgba(239,68,68,0.25)"},
    success:{background:"rgba(16,185,129,0.15)",color:T.green,border:`1px solid rgba(16,185,129,0.3)`},
  };
  return <button {...p} style={{padding:"10px 20px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"Georgia,serif",...v[variant],...style}}>{children}</button>;
}
function Divider() { return <div style={{height:1,background:T.border,margin:"12px 0"}}/>; }
function ProgBar({value,total,color=T.gold,h=8}) {
  const pct=total>0?Math.min(100,Math.round((value/total)*100)):0;
  return <div style={{background:"rgba(255,255,255,0.09)",borderRadius:99,height:h,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:99,transition:"width .8s ease"}}/></div>;
}
function ProgRow({label,value,total,color}) {
  const pct=total>0?Math.min(100,Math.round((value/total)*100)):0;
  return (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
        <span style={{color:T.dim,fontSize:13}}>{label}</span>
        <span style={{color:T.text,fontSize:13,fontWeight:600}}>{fmtUSD(value)} <span style={{color:T.faint,fontWeight:400}}>({pct}%)</span></span>
      </div>
      <ProgBar value={value} total={total} color={color}/>
    </div>
  );
}
function FInp({label,value,onChange,type="text",placeholder="",style={}}) {
  return (
    <div style={{marginBottom:16}}>
      {label&&<div style={{color:"rgba(255,255,255,0.7)",fontSize:12,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:7,fontWeight:600}}>{label}</div>}
      <input type={type} value={value} onChange={onChange} placeholder={placeholder}
        style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,boxSizing:"border-box",fontFamily:"Georgia,serif",outline:"none",transition:"border-color 0.2s",...style}}/>
    </div>
  );
}

// ── Modal (desktop) ───────────────────────────────────────────────────────────
function Modal({title,children,onClose,width=560}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20,backdropFilter:"blur(4px)"}}>
      <div style={{width,maxWidth:"100%",maxHeight:"90vh",overflowY:"auto",background:"#0F1829",border:"1px solid rgba(255,255,255,0.12)",borderRadius:20,boxShadow:"0 25px 60px rgba(0,0,0,0.6)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"22px 24px 18px",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
          <h3 style={{color:T.gold,margin:0,fontSize:20,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"rgba(255,255,255,0.6)",fontSize:20,cursor:"pointer",lineHeight:1,width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
        </div>
        <div style={{padding:"20px 24px 24px"}}>{children}</div>
      </div>
    </div>
  );
}

// ── Sheet (mobile) ─────────────────────────────────────────────────────────────
function Sheet({open,onClose,title,children}) {
  if (!open) return null;
  return (
    <div style={{position:"fixed",inset:0,zIndex:300}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)"}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"#0F1829",borderRadius:"22px 22px 0 0",border:"1px solid rgba(255,255,255,0.1)",borderBottom:"none",maxHeight:"92vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"center",padding:"12px 0 4px"}}><div style={{width:40,height:4,borderRadius:2,background:"rgba(255,255,255,0.15)"}}/></div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 20px 16px"}}>
          <h3 style={{color:T.gold,margin:0,fontSize:18}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:T.dim,fontSize:26,cursor:"pointer",lineHeight:1}}>×</button>
        </div>
        <div style={{padding:"0 20px 36px"}}>{children}</div>
      </div>
    </div>
  );
}

// Overlay adaptativo: Modal no desktop, Sheet no mobile
function Overlay({open,onClose,title,children,mobile}) {
  if (!open) return null;
  return mobile
    ? <Sheet open={open} onClose={onClose} title={title}>{children}</Sheet>
    : <Modal title={title} onClose={onClose}>{children}</Modal>;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// LOGIN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Login({onLogin}) {
  const [email,setEmail]=useState(""), [pw,setPw]=useState(""), [err,setErr]=useState(""), [loading,setLoading]=useState(false);
  const [forgotMode,setForgotMode]=useState(false), [resetSent,setResetSent]=useState(false), [resetLoading,setResetLoading]=useState(false);

  const go=async()=>{
    setErr(""); setLoading(true);
    try {
      await initFirebase();
      const cred = await _auth.signIn(_auth.inst, email, pw);
      const userDoc = await dbGet("users", cred.user.uid);
      if (!userDoc) throw new Error("Perfil não encontrado no Firestore.");
      onLogin({ uid: cred.user.uid, ...userDoc });
    } catch(e) {
      setErr(e.code==="auth/invalid-credential"||e.code==="auth/wrong-password" ? "E-mail ou senha incorretos." : e.message);
    } finally { setLoading(false); }
  };

  const sendReset=async()=>{
    if(!email){setErr("Digite seu e-mail primeiro.");return;}
    setResetLoading(true); setErr("");
    try {
      await initFirebase();
      const { sendPasswordResetEmail } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      await sendPasswordResetEmail(_auth.inst, email);
      setResetSent(true);
    } catch(e) {
      setErr(e.code==="auth/user-not-found"?"E-mail não encontrado.":e.message);
    } finally { setResetLoading(false); }
  };

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(150deg,#060B18,#0D1829,#0A1220)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"Georgia,serif"}}>
      <div style={{marginBottom:36,textAlign:"center"}}>
        <div style={{width:68,height:68,borderRadius:"50%",background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:28,fontWeight:"bold",color:"#0A0F1E",boxShadow:`0 0 40px rgba(200,169,110,0.3)`}}>Z</div>
        <h1 style={{color:T.gold,fontSize:26,fontWeight:700,margin:0}}>Zion Solutions</h1>
        <p style={{color:T.faint,fontSize:13,marginTop:6}}>Portal do Cliente</p>
      </div>
      <div style={{width:"100%",maxWidth:400}}>
        {resetSent ? (
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:16}}>📧</div>
            <div style={{color:T.green,fontWeight:700,fontSize:18,marginBottom:8}}>E-mail enviado!</div>
            <div style={{color:T.dim,fontSize:14,lineHeight:1.6,marginBottom:24}}>Verifique sua caixa de entrada em <strong style={{color:T.text}}>{email}</strong> e siga as instruções para redefinir sua senha.</div>
            <Btn variant="ghost" onClick={()=>{setForgotMode(false);setResetSent(false);}} style={{width:"100%"}}>← Voltar ao login</Btn>
          </div>
        ) : forgotMode ? (
          <>
            <div style={{color:T.text,fontWeight:700,fontSize:18,marginBottom:6}}>Redefinir senha</div>
            <div style={{color:T.faint,fontSize:13,marginBottom:20,lineHeight:1.6}}>Digite seu e-mail e enviaremos um link para criar uma nova senha.</div>
            <FInp label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
            {err&&<p style={{color:T.red,fontSize:13,marginBottom:14,textAlign:"center"}}>{err}</p>}
            <Btn onClick={sendReset} disabled={resetLoading} style={{width:"100%",fontSize:15,padding:13,marginBottom:12}}>
              {resetLoading?"Enviando…":"Enviar link de redefinição"}
            </Btn>
            <Btn variant="ghost" onClick={()=>{setForgotMode(false);setErr("");}} style={{width:"100%"}}>← Voltar ao login</Btn>
          </>
        ) : (
          <>
            <FInp label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
            <FInp label="Senha" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••"/>
            {err&&<p style={{color:T.red,fontSize:13,marginBottom:14,textAlign:"center"}}>{err}</p>}
            <Btn onClick={go} disabled={loading} style={{width:"100%",fontSize:15,padding:13,opacity:loading?0.7:1}}>
              {loading?"Entrando…":"Entrar"}
            </Btn>
            <button onClick={()=>{setForgotMode(true);setErr("");}} style={{width:"100%",marginTop:14,background:"none",border:"none",color:T.dim,fontSize:13,cursor:"pointer",fontFamily:"Georgia,serif",textDecoration:"underline"}}>
              Esqueci minha senha
            </button>
            <div style={{marginTop:24,textAlign:"center"}}>
              <a href="?public=privacy" target="_blank" rel="noreferrer" style={{color:"rgba(255,255,255,0.2)",fontSize:11,textDecoration:"none"}}>Política de Privacidade</a>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DASHBOARD
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Dashboard({user,messages,payments,caseStatus,clients,mobile,setActive}) {
  const isAdmin=user.role==="admin";
  const isDev=user.role==="developer";

  if (isAdmin||isDev) {
    const pPay=payments.filter(p=>p.status==="pending_review").length;
    const unread=messages.filter(m=>m.source==="client"&&!m.read).length;
    const totalArr=payments.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
    const cols=mobile?"1fr 1fr":"1fr 1fr 1fr";
    return (
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {(pPay>0||unread>0)&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {unread>0&&(
              <div onClick={()=>setActive("messages")} style={{padding:"14px 16px",background:"rgba(96,165,250,0.1)",border:"1px solid rgba(96,165,250,0.35)",borderRadius:14,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",animation:"pulse-blue 2s ease-in-out infinite"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{position:"relative",flexShrink:0}}>
                    <span style={{fontSize:22}}>✉</span>
                    <span style={{position:"absolute",top:-4,right:-6,minWidth:18,height:18,borderRadius:99,background:T.blue,color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{unread}</span>
                  </div>
                  <div>
                    <div style={{color:T.blue,fontWeight:700,fontSize:14}}>Nova{unread>1?"s":""} mensagem{unread>1?"s":""} não lida{unread>1?"s":""}</div>
                    <div style={{color:T.dim,fontSize:12,marginTop:2}}>Clique para ver {unread>1?`as ${unread} mensagens`:"a mensagem"}</div>
                  </div>
                </div>
                <span style={{color:T.blue,fontSize:22,fontWeight:300}}>›</span>
              </div>
            )}
            {pPay>0&&<div onClick={()=>setActive("payments")} style={{padding:"14px 16px",background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:14,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}><div><div style={{color:T.amber,fontWeight:600}}>💳 Comprovantes para revisar</div><div style={{color:T.dim,fontSize:12,marginTop:2}}>{pPay} aguardando confirmação</div></div><span style={{color:T.amber,fontSize:20}}>›</span></div>}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:cols,gap:14}}>
          {[{label:"Total Arrecadado",value:fmtK(totalArr),color:T.green},{label:"Clientes Ativos",value:clients.length,color:T.gold},{label:"Pgtos Pendentes",value:pPay,color:pPay>0?T.amber:T.dim},{label:"Msgs Não Lidas",value:unread,color:unread>0?T.blue:T.dim}].slice(0,mobile?4:4).map(k=>(
            <Card key={k.label} style={{padding:18}}><div style={{color:k.color,fontSize:mobile?24:32,fontWeight:700}}>{k.value}</div><div style={{color:T.faint,fontSize:11,marginTop:4}}>{k.label}</div></Card>
          ))}
        </div>
        <Card>
          <h3 style={{color:T.gold,margin:"0 0 14px",fontSize:16}}>Clientes</h3>
          {clients.map(c=>(
            <div key={c.uid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${T.border}`}}>
              <div><div style={{color:T.text,fontWeight:600,fontSize:15}}>{mobile?c.name?.split(" ").slice(0,2).join(" "):c.name}</div><div style={{color:T.faint,fontSize:12,marginTop:2}}>{c.caseType} · {c.sponsor}</div></div>
              <Pill>Ativo</Pill>
            </div>
          ))}
          {clients.length===0&&<div style={{color:T.faint,textAlign:"center",padding:20}}>Nenhum cliente</div>}
        </Card>
      </div>
    );
  }
  // Cliente
  const myPay=payments.filter(p=>p.clientId===user.clientId);
  const totalPago=myPay.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
  const clientData=clients.find(c=>(c.clientId||c.uid)===user.clientId||c.uid===user.uid);
  const totalOwed = clientData?.plan?.total || user?.plan?.total || 0;
  const pct=totalOwed>0?Math.min(100,Math.round((totalPago/totalOwed)*100)):0;
  const activeStage=caseStatus.find(s=>s.status!=="pending"&&s.status!=="approved")||caseStatus[0];
  const unread=messages.filter(m=>m.clientId===user.clientId&&m.source!=="client"&&!m.read).length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card style={{background:`linear-gradient(135deg,rgba(200,169,110,0.12),rgba(232,200,122,0.05))`,borderColor:"rgba(200,169,110,0.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
          <div><div style={{color:T.faint,fontSize:11,textTransform:"uppercase",letterSpacing:"0.08em"}}>Seu Processo</div><div style={{color:T.gold,fontSize:30,fontWeight:700,margin:"4px 0"}}>{user.caseType}</div><div style={{color:T.dim,fontSize:13}}>{user.sponsor}</div></div>
          <div style={{textAlign:"right"}}><div style={{color:T.faint,fontSize:11}}>Priority Date</div><div style={{color:T.text,fontSize:14,fontWeight:600,marginTop:2}}>{fmt(user.priorityDate)}</div></div>
        </div>
        <Divider/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{color:T.faint,fontSize:11,marginBottom:4}}>Etapa atual</div><div style={{color:T.text,fontSize:15,fontWeight:600}}>{activeStage?.stage}</div></div>
          {activeStage&&<Badge status={activeStage.status}/>}
        </div>
      </Card>
      <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"1fr 1fr 1fr 1fr",gap:14}}>
        {[{label:"Total Pago",value:fmtK(totalPago),color:T.green},{label:"Saldo Restante",value:fmtK(totalOwed-totalPago),color:T.amber},{label:"Progresso",value:`${pct}%`,color:T.gold},{label:"Msgs Não Lidas",value:unread,color:unread>0?T.blue:T.dim}].map(k=>(
          <Card key={k.label} style={{padding:16,textAlign:"center"}}><div style={{color:k.color,fontSize:22,fontWeight:700}}>{k.value}</div><div style={{color:T.faint,fontSize:11,marginTop:4}}>{k.label}</div></Card>
        ))}
      </div>
      {unread>0&&(
        <div onClick={()=>setActive("messages")} style={{padding:"14px 16px",background:"rgba(96,165,250,0.1)",border:"1px solid rgba(96,165,250,0.35)",borderRadius:14,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",animation:"pulse-blue 2s ease-in-out infinite"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{position:"relative",flexShrink:0}}>
              <span style={{fontSize:24}}>✉</span>
              <span style={{position:"absolute",top:-4,right:-6,minWidth:18,height:18,borderRadius:99,background:T.blue,color:"#fff",fontSize:10,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{unread}</span>
            </div>
            <div>
              <div style={{color:T.blue,fontWeight:700,fontSize:14}}>Nova{unread>1?"s":""} mensagem{unread>1?"s":""} da Zion Solutions</div>
              <div style={{color:T.dim,fontSize:12,marginTop:2}}>Clique para ler {unread>1?`as ${unread} mensagens`:"a mensagem"}</div>
            </div>
          </div>
          <span style={{color:T.blue,fontSize:22,fontWeight:300}}>›</span>
        </div>
      )}
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{color:T.faint,fontSize:12,textTransform:"uppercase",letterSpacing:"0.07em"}}>Financeiro</span><span style={{color:T.gold,fontWeight:700}}>{pct}%</span></div>
        <ProgBar value={totalPago} total={totalOwed}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:10}}><div><div style={{color:T.faint,fontSize:11}}>Pago</div><div style={{color:T.green,fontSize:16,fontWeight:700}}>{fmtUSD(totalPago)}</div></div><div style={{textAlign:"right"}}><div style={{color:T.faint,fontSize:11}}>Restante</div><div style={{color:T.amber,fontSize:16,fontWeight:700}}>{fmtUSD(totalOwed-totalPago)}</div></div></div>
      </Card>
      {mobile&&(
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{label:"Enviar comprovante",icon:"📎",action:"payments"},{label:"Ver processo",icon:"📋",action:"cases"},{label:"Visa Bulletin",icon:"🗓",action:"bulletin"},{label:"Relatórios",icon:"📊",action:"reports"}].map(a=>(
            <button key={a.label} onClick={()=>setActive(a.action)} style={{padding:"14px 10px",background:T.surface,border:`1px solid ${T.border}`,borderRadius:14,display:"flex",flexDirection:"column",alignItems:"center",gap:6,cursor:"pointer"}}>
              <span style={{fontSize:22}}>{a.icon}</span><span style={{color:T.dim,fontSize:12,textAlign:"center",fontFamily:"Georgia,serif"}}>{a.label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// MESSAGES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Messages({user,messages,setMessages,addMessage,clients,mobile}) {
  const isAdmin=user.role==="admin"||user.role==="developer";
  const [sel,setSel]=useState(null), [open,setOpen]=useState(false);
  const [form,setForm]=useState({subject:"",body:"",source:"zion",clientId:""});
  const list=isAdmin?messages:messages.filter(m=>m.clientId===user.clientId);
  const [confirmDel,setConfirmDel]=useState(null);
  const [deleting,setDeleting]=useState(false);
  const openMsg=msg=>{setSel(msg);const shouldMark=(isAdmin&&msg.source==="client")||(!isAdmin&&msg.source!=="client");if(!msg.read&&shouldMark){dbUpdate("messages",msg.id,{read:true});setMessages(p=>p.map(m=>m.id===msg.id?{...m,read:true}:m));}};
  const canDelete=(msg)=>(isAdmin&&(msg.source==="zion"||msg.source==="sponsor"))||(!isAdmin&&msg.source==="client"&&msg.clientId===(user.clientId||user.uid));
  const deleteMsg=async()=>{
    if(!confirmDel)return; setDeleting(true);
    try{
      const{deleteDoc,doc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      await deleteDoc(doc(_db.inst,"messages",confirmDel.id));
      setMessages(p=>p.filter(m=>m.id!==confirmDel.id));
      if(sel?.id===confirmDel.id)setSel(null);
      setConfirmDel(null);
    }catch(e){alert("Erro ao apagar: "+e.message);}
    finally{setDeleting(false);}
  };

  // Mostra nome do cliente na lista de mensagens (admin)
  const getClientName = (clientId) => {
    const c = clients.find(c=>(c.clientId||c.uid)===clientId);
    return c?.name?.split(" ")[0] || clientId;
  };

  const send=async()=>{
    if(!form.subject||!form.body)return;
    if(isAdmin&&!form.clientId)return;
    const targetClientId = isAdmin ? form.clientId : (user.clientId||user.uid);
    const data={clientId:targetClientId,from:isAdmin?"Zion Solutions":user.name,subject:form.subject,body:form.body,date:new Date().toISOString().split("T")[0],source:isAdmin?form.source:"client",read:false};
    await addMessage(data);
    setOpen(false); setForm({subject:"",body:"",source:"zion",clientId:""});
  };

  // Mobile: tela cheia ao abrir mensagem
  if (mobile&&sel) return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <button onClick={()=>setSel(null)} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",color:T.dim,fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif",padding:0}}>‹ Voltar</button>
      <h2 style={{color:T.text,fontSize:18,fontWeight:700,margin:0}}>{sel.subject}</h2>
      <div style={{display:"flex",gap:8}}><Pill color={sel.source==="zion"?T.gold:sel.source==="client"?"#A78BFA":T.blue} bg={sel.source==="zion"?"rgba(232,200,122,0.12)":sel.source==="client"?"rgba(167,139,250,0.12)":"rgba(96,165,250,0.12)"}>{sel.source==="zion"?"Zion Solutions":sel.source==="client"?(isAdmin?sel.from:"Você"):"Sponsor"}</Pill><span style={{color:T.faint,fontSize:12,alignSelf:"center"}}>{fmt(sel.date)}</span></div>
      <Card><p style={{color:"rgba(255,255,255,0.8)",lineHeight:1.75,fontSize:15,margin:0,whiteSpace:"pre-wrap"}}>{sel.body}</p></Card>
      {canDelete(sel)&&<button onClick={()=>setConfirmDel(sel)} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"11px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:10,color:T.red,fontSize:13,cursor:"pointer",fontFamily:"Georgia,serif",width:"100%"}}>🗑 Apagar esta mensagem</button>}
    </div>
  );

  return (
    <div style={{display:"flex",gap:20,height:mobile?"auto":"calc(100vh - 140px)"}}>
      {/* Lista */}
      <div style={{width:mobile?"100%":300,display:"flex",flexDirection:"column",gap:10,flexShrink:0}}>
        <Btn onClick={()=>setOpen(true)} style={{width:"100%",textAlign:"center"}}>+ Nova Mensagem</Btn>
        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:8}}>
          {list.length===0&&<div style={{color:T.faint,textAlign:"center",paddingTop:30,fontSize:13}}>Nenhuma mensagem</div>}
          {list.map(msg=>(
            <div key={msg.id} onClick={()=>openMsg(msg)} style={{padding:"13px 15px",background:(!mobile&&sel?.id===msg.id)?"rgba(200,169,110,0.12)":T.surface,border:`1px solid ${(!mobile&&sel?.id===msg.id)?"rgba(200,169,110,0.35)":T.border}`,borderRadius:12,cursor:"pointer",position:"relative"}}>
              {!msg.read&&<div style={{position:"absolute",top:14,right:14,width:8,height:8,borderRadius:"50%",background:T.gold}}/>}
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <Pill color={msg.source==="zion"?T.gold:msg.source==="client"?"#A78BFA":T.blue} bg={msg.source==="zion"?"rgba(232,200,122,0.1)":msg.source==="client"?"rgba(167,139,250,0.1)":"rgba(96,165,250,0.1)"}>{msg.source==="zion"?"Zion Solutions":msg.source==="client"?(isAdmin?msg.from:"Você"):"Sponsor"}</Pill>
                  {isAdmin&&<span style={{color:T.faint,fontSize:11}}>→ {getClientName(msg.clientId)}</span>}
                </div>
                <span style={{color:T.faint,fontSize:11}}>{fmt(msg.date)}</span>
              </div>
              <div style={{color:T.text,fontSize:13,fontWeight:msg.read?400:600,marginBottom:2,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{msg.subject}</div>
              <div style={{color:T.faint,fontSize:12,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:1,WebkitBoxOrient:"vertical"}}>{msg.body}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Conteúdo desktop */}
      {!mobile&&(
        <Card style={{flex:1,overflow:"auto"}}>
          {sel?(<div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18,paddingBottom:18,borderBottom:`1px solid ${T.border}`}}>
              <div><h2 style={{color:T.text,margin:"0 0 6px",fontSize:20}}>{sel.subject}</h2><div style={{color:T.faint,fontSize:13}}>De: {sel.from} · {fmt(sel.date)}</div></div>
              <Pill color={sel.source==="zion"?T.gold:sel.source==="client"?"#A78BFA":T.blue} bg={sel.source==="zion"?"rgba(232,200,122,0.12)":sel.source==="client"?"rgba(167,139,250,0.12)":"rgba(96,165,250,0.12)"}>{sel.source==="zion"?"Zion Solutions":sel.source==="client"?(isAdmin?sel.from:"Você"):"Sponsor"}</Pill>
            </div>
            <p style={{color:"rgba(255,255,255,0.8)",lineHeight:1.75,fontSize:14,margin:0,whiteSpace:"pre-wrap"}}>{sel.body}</p>
            {canDelete(sel)&&(
              <div style={{marginTop:20,paddingTop:16,borderTop:`1px solid ${T.border}`}}>
                <button onClick={()=>setConfirmDel(sel)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:9,color:T.red,fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>🗑 Apagar esta mensagem</button>
              </div>
            )}
          </div>):(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:T.faint,fontSize:14}}>Selecione uma mensagem</div>)}
        </Card>
      )}
      {/* Modal confirmação de exclusão */}
      {confirmDel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:16}}>
          <Card style={{width:420,maxWidth:"100%"}}>
            <h3 style={{color:T.red,margin:"0 0 14px",fontSize:18}}>🗑 Apagar Mensagem</h3>
            <div style={{padding:"14px 16px",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:12,marginBottom:18}}>
              <div style={{color:T.text,fontWeight:600,fontSize:14,marginBottom:4}}>{confirmDel.subject}</div>
              <div style={{color:T.faint,fontSize:12}}>De: {confirmDel.from} · {fmt(confirmDel.date)}</div>
            </div>
            <p style={{color:T.dim,fontSize:13,lineHeight:1.6,marginBottom:20}}>
              Esta mensagem será <strong style={{color:T.red}}>apagada permanentemente do servidor</strong> para todos os envolvidos. Esta ação não pode ser desfeita.
            </p>
            <div style={{display:"flex",gap:10}}>
              <Btn variant="danger" onClick={deleteMsg} disabled={deleting} style={{flex:1}}>{deleting?"Apagando…":"Sim, apagar"}</Btn>
              <Btn variant="ghost" onClick={()=>setConfirmDel(null)} style={{flex:1}}>Cancelar</Btn>
            </div>
          </Card>
        </div>
      )}
      <Overlay open={open} onClose={()=>setOpen(false)} title={isAdmin?"Nova Mensagem":"Enviar Mensagem para Zion"} mobile={mobile}>
        {!isAdmin&&<div style={{marginBottom:14,padding:"10px 14px",background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:10}}><span style={{color:"#A78BFA",fontSize:13}}>✉ Para: <strong>Zion Solutions</strong></span></div>}
        {isAdmin&&(
          <>
            <div style={{marginBottom:14}}>
              <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Destinatário *</div>
              <select value={form.clientId} onChange={e=>setForm(p=>({...p,clientId:e.target.value}))} style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${form.clientId?T.border:"rgba(239,68,68,0.4)"}`,borderRadius:10,color:form.clientId?T.text:T.faint,fontSize:14,fontFamily:"Georgia,serif"}}>
                <option value="" style={{background:"#0D1117"}}>— Selecione o cliente —</option>
                {clients.map(c=><option key={c.uid} value={c.clientId||c.uid} style={{background:"#0D1117"}}>{c.name?.split(" ").slice(0,2).join(" ")}</option>)}
              </select>
            </div>
            <div style={{marginBottom:14}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Origem</div><select value={form.source} onChange={e=>setForm(p=>({...p,source:e.target.value}))} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}><option value="zion" style={{background:"#0D1117"}}>Zion Solutions</option><option value="sponsor" style={{background:"#0D1117"}}>Sponsor</option></select></div>
          </>
        )}
        <FInp label="Assunto" value={form.subject} onChange={e=>setForm(p=>({...p,subject:e.target.value}))}/>
        <div style={{marginBottom:16}}><div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Mensagem</div><textarea value={form.body} onChange={e=>setForm(p=>({...p,body:e.target.value}))} rows={5} style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:14,resize:"none",boxSizing:"border-box",fontFamily:"Georgia,serif"}}/></div>
        <div style={{display:"flex",gap:10}}><Btn onClick={send} disabled={isAdmin&&!form.clientId} style={{flex:1,opacity:isAdmin&&!form.clientId?0.5:1}}>Enviar</Btn><Btn variant="ghost" onClick={()=>setOpen(false)} style={{flex:1}}>Cancelar</Btn></div>
      </Overlay>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PAYMENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PAYMENT STATEMENT MODAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function PaymentStatementModal({open, onClose, payments, client, mobile}) {
  const all = (payments || []).filter(p => p.status === "confirmed");
  const [selected, setSelected] = useState([]);
  const [generating, setGenerating] = useState(false);
  useEffect(() => { if (open) setSelected((payments||[]).filter(p=>p.status==="confirmed").map(p=>p.id)); }, [open, payments]);
  const toggle = (id) => setSelected(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);
  const toggleAll = () => setSelected(selected.length===all.length ? [] : all.map(p=>p.id));

  const generate = () => {
    const chosen = all.filter(p=>selected.includes(p.id));
    if (!chosen.length) return;
    setGenerating(true);
    const totalSel = chosen.reduce((s,p)=>s+p.amount,0);
    const totalAll = all.reduce((s,p)=>s+p.amount,0);
    const planTotal = client?.plan?.total||0;
    const remaining = Math.max(0, planTotal - totalAll);
    const m = n=>"$"+Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2});
    const rows = chosen.map(p=>{
      const d = !p.date?"—":new Date(p.date+"T12:00:00").toLocaleDateString("pt-BR");
      const r = p.receiptUrl?"<a href='"+p.receiptUrl+"' style='color:#1d4ed8;font-size:11px'>📎 Ver</a>":"—";
      return "<tr><td>"+(p.description||"—")+"</td><td>"+d+"</td><td style='text-align:right;font-weight:700;color:#15803d'>"+m(p.amount)+"</td><td style='text-align:center'>"+r+"</td></tr>";
    }).join("");
    const html=(
      "<div style='background:#fdf6e3;border:1px solid #e5d5b0;border-radius:12px;padding:18px 22px;margin-bottom:24px'>"+
        "<table style='width:100%;border:none;margin:0'>"+
          "<tr><td style='border:none;padding:3px 0;color:#888;font-size:12px;width:120px'>Cliente</td><td style='border:none;padding:3px 0;font-weight:600;color:#111'>"+(client?.name||"—")+"</td></tr>"+
          (client?.caseType?"<tr><td style='border:none;padding:3px 0;color:#888;font-size:12px'>Processo</td><td style='border:none;padding:3px 0;color:#5a4a1a'>"+client.caseType+"</td></tr>":"")+
          (client?.sponsor?"<tr><td style='border:none;padding:3px 0;color:#888;font-size:12px'>Patrocinador</td><td style='border:none;padding:3px 0;color:#5a4a1a'>"+client.sponsor+"</td></tr>":"")+
        "</table>"+
      "</div>"+
      "<div style='display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap'>"+
        "<div class='kpi'><div class='kpi-val'>"+m(totalSel)+"</div><div class='kpi-lbl'>Total Selecionado</div></div>"+
        "<div class='kpi'><div class='kpi-val'>"+chosen.length+"</div><div class='kpi-lbl'>Pagamento(s)</div></div>"+
        (planTotal>0?"<div class='kpi'><div class='kpi-val'>"+m(remaining)+"</div><div class='kpi-lbl'>Saldo Restante</div></div>":"")+
      "</div>"+
      "<table>"+
        "<tr><th>Descrição</th><th>Data</th><th style='text-align:right'>Valor</th><th style='text-align:center'>Comprovante</th></tr>"+
        rows+
        "<tr style='border-top:2px solid #C8A96E'>"+
          "<td colspan='2' style='font-weight:700;color:#5a4a1a;padding-top:12px'>TOTAL</td>"+
          "<td style='text-align:right;font-weight:700;font-size:16px;color:#15803d;padding-top:12px'>"+m(totalSel)+"</td>"+
          "<td></td>"+
        "</tr>"+
      "</table>"
    );
    printReport("Extrato de Pagamentos — "+(client?.name||"Cliente"), html);
    setTimeout(()=>{setGenerating(false);onClose();},300);
  };

  if (!open) return null;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:16}}>
      <div style={{background:"#0D1117",border:"1px solid rgba(232,200,122,0.25)",borderRadius:20,width:"100%",maxWidth:540,maxHeight:"90vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"18px 20px",borderBottom:"1px solid rgba(255,255,255,0.08)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>

}

function Payments({user,payments,addPayment,updatePayment,deletePayment,clients,mobile}) {
  const isAdmin=user.role==="admin";
  return isAdmin
    ? <PaymentsAdmin payments={payments} updatePayment={updatePayment} deletePayment={deletePayment} clients={clients} mobile={mobile}/>
    : <PaymentsClient user={user} payments={payments} addPayment={addPayment} clients={clients} mobile={mobile}/>;
}
