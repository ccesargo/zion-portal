  const [openVersion, setOpenVersion] = useState(null);
  return (
    <div>
      {/* Badge de versão */}
      <button onClick={()=>setExpanded(p=>!p)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:14,cursor:"pointer",fontFamily:"Georgia,serif"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>🚀</span>
          <div style={{textAlign:"left"}}>
            <div style={{color:T.text,fontSize:13,fontWeight:600}}>Zion Portal <span style={{color:T.gold}}>v{APP_VERSION}</span></div>
            <div style={{color:T.faint,fontSize:11,marginTop:1}}>Última atualização: {CHANGELOG[0].date}</div>
          </div>
        </div>
        <span style={{color:T.faint,fontSize:18,transition:"transform 0.2s",display:"inline-block",transform:expanded?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
      </button>

      {/* Changelog expandido */}
      {expanded&&(
        <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:8}}>
          {CHANGELOG.map((ver,i)=>(
            <div key={ver.version} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${T.border}`,borderRadius:12,overflow:"hidden"}}>
              {/* Header da versão */}
              <button onClick={()=>setOpenVersion(openVersion===ver.version?null:ver.version)}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"none",border:"none",cursor:"pointer",fontFamily:"Georgia,serif"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{padding:"2px 9px",borderRadius:99,fontSize:11,fontWeight:700,
                    background:i===0?"rgba(232,200,122,0.15)":"rgba(255,255,255,0.06)",
                    color:i===0?T.gold:T.faint,border:`1px solid ${i===0?"rgba(232,200,122,0.3)":"rgba(255,255,255,0.08)"}`}}>
                    v{ver.version}
                  </span>
                  {i===0&&<span style={{padding:"2px 8px",borderRadius:99,fontSize:10,fontWeight:700,background:"rgba(16,185,129,0.15)",color:T.green}}>atual</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{color:T.faint,fontSize:12}}>{ver.date}</span>
                  <span style={{color:T.faint,fontSize:14,transform:openVersion===ver.version?"rotate(180deg)":"rotate(0deg)",display:"inline-block",transition:"transform 0.2s"}}>▾</span>
                </div>
              </button>
              {/* Lista de mudanças */}
              {openVersion===ver.version&&(
                <div style={{padding:"0 16px 14px",borderTop:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:10}}>
                    {ver.changes.map((change,j)=>(
                      <div key={j} style={{display:"flex",alignItems:"flex-start",gap:8}}>
                        <span style={{color:T.gold,fontSize:12,marginTop:1,flexShrink:0}}>✦</span>
                        <span style={{color:T.dim,fontSize:13,lineHeight:1.5}}>{change}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function More({user,setActive,onLogout}) {
  const isAdmin=user.role==="admin";
  const isDev=user.role==="developer";
  const isClient=!isAdmin&&!isDev;
  const [changePw,setChangePw] = useState(false);
  const [pwForm,setPwForm]     = useState({current:"",newPw:"",confirm:""});
  const [pwMsg,setPwMsg]        = useState(null);
  const [pwLoading,setPwLoading]= useState(false);

  const handleChangePw = async () => {
    if(!pwForm.current||!pwForm.newPw||!pwForm.confirm){setPwMsg({type:"error",text:"Preencha todos os campos."});return;}
    if(pwForm.newPw!==pwForm.confirm){setPwMsg({type:"error",text:"As senhas não conferem."});return;}
    if(pwForm.newPw.length<6){setPwMsg({type:"error",text:"A nova senha deve ter ao menos 6 caracteres."});return;}
    setPwLoading(true); setPwMsg(null);
    try {
      // 1. Login com senha atual para obter token
      const loginRes = await fetch(
        `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${FB_CONFIG.apiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({email:user.email,password:pwForm.current,returnSecureToken:true})}
      );
      const loginData = await loginRes.json();
      if(loginData.error) throw new Error("Senha atual incorreta.");

      // 2. Atualiza para nova senha
      const updateRes = await fetch(
        `https://identitytoolkit.googleapis.com/v1/accounts:update?key=${FB_CONFIG.apiKey}`,
        {method:"POST",headers:{"Content-Type":"application/json"},
         body:JSON.stringify({idToken:loginData.idToken,password:pwForm.newPw,returnSecureToken:true})}
      );
      const updateData = await updateRes.json();
      if(updateData.error) throw new Error(updateData.error.message);

      setPwMsg({type:"success",text:"✓ Senha alterada com sucesso!"});
      setPwForm({current:"",newPw:"",confirm:""});
      setTimeout(()=>setChangePw(false),2000);
    } catch(e) {
      setPwMsg({type:"error",text:e.message||"Erro ao alterar senha."});
    } finally { setPwLoading(false); }
  };

  const items=(isAdmin||isDev)
    ?[{icon:"✉",label:"Mensagens",action:"messages"},{icon:"📋",label:"Processos",action:"cases"},{icon:"🗓",label:"Visa Bulletin",action:"bulletin"},{icon:"🔑",label:"Usuários",action:"users"},{icon:"📊",label:"Relatórios",action:"reports"},{icon:"⚡",label:"Dev Panel",action:"devpanel"}]
    :[{icon:"🗓",label:"Visa Bulletin",action:"bulletin"}];
  const adminItems = isAdmin&&!isDev ? items.filter(i=>i.action!=="devpanel") : items;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:isDev?"linear-gradient(135deg,#7C3AED,#A78BFA)":`linear-gradient(135deg,${T.goldDim},${T.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:"bold",color:"#fff"}}>{isDev?"⚡":user.name?.[0]}</div>
        <div><div style={{color:T.text,fontWeight:700,fontSize:17}}>{user.name?.split(" ").slice(0,2).join(" ")}</div><div style={{color:T.faint,fontSize:13,marginTop:2}}>{user.email}</div><Pill style={{marginTop:6}}>{isDev?"Developer":isAdmin?"Administrador":"Cliente"}</Pill></div>
      </div>

      {/* Alterar senha — cliente */}
      {isClient&&(
        <Card>
          {!changePw?(
            <button onClick={()=>setChangePw(true)} style={{width:"100%",display:"flex",alignItems:"center",gap:14,background:"none",border:"none",color:T.text,fontSize:15,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"left",padding:0}}>
              <span style={{fontSize:20}}>🔑</span><span style={{flex:1}}>Alterar senha</span><span style={{color:T.faint}}>›</span>
            </button>
          ):(
            <div>
              <div style={{color:T.gold,fontWeight:700,fontSize:15,marginBottom:16}}>🔑 Alterar Senha</div>
              <FInp label="Senha atual" type="password" value={pwForm.current} onChange={e=>setPwForm(p=>({...p,current:e.target.value}))} placeholder="••••••••"/>
              <FInp label="Nova senha (mín. 6 caracteres)" type="password" value={pwForm.newPw} onChange={e=>setPwForm(p=>({...p,newPw:e.target.value}))} placeholder="••••••••"/>
              <FInp label="Confirmar nova senha" type="password" value={pwForm.confirm} onChange={e=>setPwForm(p=>({...p,confirm:e.target.value}))} placeholder="••••••••"/>
              {pwMsg&&<div style={{padding:"10px 14px",background:pwMsg.type==="success"?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${pwMsg.type==="success"?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:10,color:pwMsg.type==="success"?T.green:T.red,fontSize:13,marginBottom:14}}>{pwMsg.text}</div>}
              <div style={{display:"flex",gap:10}}>
                <Btn onClick={handleChangePw} disabled={pwLoading} style={{flex:1}}>{pwLoading?"Salvando…":"Salvar senha"}</Btn>
                <Btn variant="ghost" onClick={()=>{setChangePw(false);setPwForm({current:"",newPw:"",confirm:""});setPwMsg(null);}} style={{flex:1}}>Cancelar</Btn>
              </div>
            </div>
          )}
        </Card>
      )}

      <Card style={{padding:0,overflow:"hidden"}}>
        {(isDev?items:adminItems).map((item,i,arr)=><button key={item.action} onClick={()=>setActive(item.action)} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"16px 18px",background:"none",border:"none",borderBottom:i<arr.length-1?`1px solid ${T.border}`:"none",color:item.action==="devpanel"?"#A78BFA":T.text,fontSize:15,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"left"}}><span style={{fontSize:20}}>{item.icon}</span><span style={{flex:1}}>{item.label}</span><span style={{color:T.faint}}>›</span></button>)}
      </Card>
      <Card style={{padding:0,overflow:"hidden"}}>
        <button onClick={onLogout} style={{width:"100%",display:"flex",alignItems:"center",gap:14,padding:"16px 18px",background:"none",border:"none",color:T.red,fontSize:15,cursor:"pointer",fontFamily:"Georgia,serif",textAlign:"left"}}><span style={{fontSize:20}}>🚪</span><span>Sair da conta</span></button>
      </Card>

      {/* Versão e Changelog */}
      <VersionCard/>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// USERS — Cadastro de usuários (admin only)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Users({mobile}) {
  const TYPES=["EB-1","EB-2","EB-3","EB-3 Unskilled","O-1","H-1B","L-1","TN"];
  const EMPTY={name:"",email:"",password:"",role:"client",caseType:"EB-3",sponsor:"",priorityDate:"",clientId:""};
  const [users,setUsers]   = useState([]);
  const [open,setOpen]     = useState(false);
  const [del,setDel]       = useState(null);
  const [form,setForm]     = useState(EMPTY);
  const [loading,setLoading] = useState(false);
  const [msg,setMsg]       = useState(null); // {type:"success"|"error", text}

  useEffect(()=>{
    dbList("users").then(setUsers);
  },[]);

  const createUser = async () => {
    if (!form.name||!form.email||!form.password) { setMsg({type:"error",text:"Nome, e-mail e senha são obrigatórios."}); return; }
    setLoading(true); setMsg(null);
    try {
      // 1. Criar no Firebase Auth via REST API (Admin SDK não disponível no browser)
      // Usa a API de signup + depois seta o perfil no Firestore
      const res = await fetch(
        `https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=${FB_CONFIG.apiKey}`,
        { method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ email:form.email, password:form.password, returnSecureToken:true }) }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const uid = data.localId;
      const clientId = form.clientId || `client_${Date.now()}`;

      // 2. Salvar perfil no Firestore
      await dbUpdate("users", uid, {
        name: form.name, email: form.email, role: form.role,
        clientId, caseType: form.caseType, sponsor: form.sponsor,
        priorityDate: form.priorityDate,
      });

      // 3. Se for cliente, criar caseStatus padrão
      if (form.role==="client") {
        await dbUpdate("caseStatus", clientId, { stages: DEFAULT_CASE });
      }

      setUsers(p=>[...p,{id:uid,uid,name:form.name,email:form.email,role:form.role,caseType:form.caseType,sponsor:form.sponsor,priorityDate:form.priorityDate}]);
      setMsg({type:"success",text:`Usuário ${form.name} criado com sucesso!`});
      setOpen(false); setForm(EMPTY);
    } catch(e) {
      const msgs = { "EMAIL_EXISTS":"Este e-mail já está cadastrado.", "WEAK_PASSWORD":"Senha deve ter ao menos 6 caracteres." };
      setMsg({type:"error", text: msgs[e.message]||e.message });
    } finally { setLoading(false); }
  };

  const deleteUser = async (uid) => {
    try {
      // Deleta o documento do Firestore completamente
      const { deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      await deleteDoc(doc(_db.inst, "users", uid));
    } catch(e) {
      // Fallback: marca como disabled se não conseguir deletar
      await dbUpdate("users", uid, { disabled: true, role: "_disabled" });
    }
    setUsers(p=>p.filter(u=>u.id!==uid));
    setDel(null);
    setMsg({type:"success",text:"Usuário removido do portal. Para remover do Firebase Auth também, acesse o Firebase Console → Authentication → Users."});
  };

  // Filtra usuários desativados ou com role inválida da lista
  const activeUsers = users.filter(u=>!u.disabled && u.role!=="undefined" && u.role);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {msg&&(
        <div style={{padding:"12px 16px",background:msg.type==="success"?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${msg.type==="success"?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:12,color:msg.type==="success"?T.green:T.red,fontSize:13,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          {msg.text}
          <button onClick={()=>setMsg(null)} style={{background:"none",border:"none",color:"inherit",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
        </div>
      )}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:T.faint,fontSize:13}}>{activeUsers.length} usuário{activeUsers.length!==1?"s":""} cadastrado{activeUsers.length!==1?"s":""}</span>
        <Btn onClick={()=>{setForm(EMPTY);setMsg(null);setOpen(true);}} style={{padding:"8px 16px",fontSize:13}}>+ Novo Usuário</Btn>
      </div>

      {activeUsers.length===0&&<Card style={{textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:12}}>🔑</div><div style={{color:T.faint}}>Nenhum usuário cadastrado</div></Card>}

      {activeUsers.map(u=>{
        const isProtected = u.role==="admin"||u.role==="developer";
        const roleLabel   = u.role==="admin"?"Admin":u.role==="developer"?"Developer":"Cliente";
        const roleColor   = u.role==="admin"?T.gold:u.role==="developer"?"#A78BFA":T.blue;
        const roleBg      = u.role==="admin"?"rgba(232,200,122,0.12)":u.role==="developer"?"rgba(124,58,237,0.12)":"rgba(96,165,250,0.12)";
        return (
          <Card key={u.id}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,flexWrap:"wrap"}}>
                  <span style={{color:T.text,fontWeight:700,fontSize:15}}>{u.name}</span>
                  <Pill color={roleColor} bg={roleBg}>{roleLabel}</Pill>
                  {isProtected&&<Pill color={T.amber} bg="rgba(245,158,11,0.1)">🔒 Protegido</Pill>}
                </div>
                <div style={{color:T.dim,fontSize:13,marginBottom:2}}>✉ {u.email}</div>
                {u.caseType&&<div style={{color:T.faint,fontSize:12}}>📋 {u.caseType} {u.sponsor&&`· ${u.sponsor}`}</div>}
                <div style={{color:T.faint,fontSize:11,marginTop:4,fontFamily:"monospace"}}>UID: {u.id}</div>
              </div>
              {!isProtected
                ? <Btn variant="danger" onClick={()=>setDel(u.id)} style={{padding:"5px 12px",fontSize:12,flexShrink:0,marginLeft:10}}>🗑 Remover</Btn>
                : <div style={{padding:"5px 12px",fontSize:11,color:T.faint,marginLeft:10,flexShrink:0}}>Não removível</div>
              }
            </div>
          </Card>
        );
      })}

      {/* Modal criar usuário */}
      <Overlay open={open} onClose={()=>setOpen(false)} title="Novo Usuário" mobile={mobile}>
        <div style={{padding:"8px 12px",background:"rgba(232,200,122,0.08)",borderRadius:10,marginBottom:16,color:T.gold,fontSize:12,fontWeight:600}}>🔑 Dados de Acesso</div>
        <FInp label="Nome completo *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Nome do usuário"/>
        <FInp label="E-mail *" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="email@usuario.com"/>
        <FInp label="Senha * (mín. 6 caracteres)" type="password" value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))} placeholder="••••••••"/>
        <div style={{marginBottom:14}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Perfil</div>
          <select value={form.role} onChange={e=>setForm(p=>({...p,role:e.target.value}))} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>
            <option value="client" style={{background:"#0D1117"}}>👤 Cliente</option>
            <option value="admin"  style={{background:"#0D1117"}}>🏢 Administrador</option>
          </select>
        </div>
        {form.role==="client"&&<>
          <div style={{padding:"8px 12px",background:"rgba(96,165,250,0.08)",borderRadius:10,marginBottom:16,color:T.blue,fontSize:12,fontWeight:600}}>📋 Dados do Processo</div>
          <div style={{marginBottom:14}}>
            <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Tipo de Processo</div>
            <select value={form.caseType} onChange={e=>setForm(p=>({...p,caseType:e.target.value}))} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>
              {TYPES.map(t=><option key={t} value={t} style={{background:"#0D1117"}}>{t}</option>)}
            </select>
          </div>
          <FInp label="Sponsor / Employer" value={form.sponsor} onChange={e=>setForm(p=>({...p,sponsor:e.target.value}))} placeholder="Empresa patrocinadora"/>
          <FInp label="Priority Date" type="date" value={form.priorityDate} onChange={e=>setForm(p=>({...p,priorityDate:e.target.value}))}/>
        <div style={{padding:"8px 12px",background:"rgba(96,165,250,0.08)",borderRadius:10,margin:"4px 0 14px",color:T.blue,fontSize:12,fontWeight:600}}>🔢 Números de Protocolo <span style={{color:T.faint,fontWeight:400}}>(opcional — pode preencher depois)</span></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {PROTOCOL_SITES.map(site=>(
            <FInp key={site.id} label={site.label} value={form[`proto_${site.id}`]||""} onChange={e=>setForm(p=>({...p,[`proto_${site.id}`]:e.target.value}))} placeholder={site.placeholder}/>
          ))}
        </div>
          <FInp label="Client ID (deixe vazio para gerar automático)" value={form.clientId} onChange={e=>setForm(p=>({...p,clientId:e.target.value}))} placeholder="Ex: joao_silva"/>
        </>}
        {msg&&msg.type==="error"&&<div style={{padding:"10px 14px",background:"rgba(239,68,68,0.12)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,color:T.red,fontSize:13,marginBottom:14}}>{msg.text}</div>}
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={createUser} disabled={loading} style={{flex:1}}>{loading?"Criando…":"Criar Usuário"}</Btn>
          <Btn variant="ghost" onClick={()=>setOpen(false)} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>

      {/* Confirmar remoção */}
      <Overlay open={!!del} onClose={()=>setDel(null)} title="Remover usuário?" mobile={mobile}>
        <div style={{padding:"14px 16px",background:"rgba(239,68,68,0.08)",borderRadius:12,marginBottom:16,border:"1px solid rgba(239,68,68,0.2)"}}>
          <div style={{color:T.text,fontWeight:600,fontSize:15}}>{activeUsers.find(u=>u.id===del)?.name}</div>
          <div style={{color:T.faint,fontSize:13,marginTop:4}}>{activeUsers.find(u=>u.id===del)?.email}</div>
        </div>
        <p style={{color:T.dim,marginBottom:8,lineHeight:1.6,fontSize:14}}>O perfil será removido do Firestore e o usuário perderá acesso imediatamente.</p>
        <p style={{color:T.amber,marginBottom:20,fontSize:12,lineHeight:1.6}}>⚠️ Para remover completamente do Firebase Auth, acesse o Firebase Console → Authentication → Users.</p>
        <div style={{display:"flex",gap:10}}>
          <Btn variant="danger" onClick={()=>deleteUser(del)} style={{flex:1}}>Sim, remover</Btn>
          <Btn variant="ghost" onClick={()=>setDel(null)} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// JOBS — Gestão de vagas (admin) + Área pública
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Jobs({mobile}) {
  const AREAS=["Cuidados ao Idoso","Enfermagem","Personal Care Aide","Cozinha","Limpeza","Administração","Outro"];
  const STATES=["MA","NY","CA","TX","FL","PA","NJ","OH","IL","GA","NC","VA","WA","AZ","CO","Outro"];
  const EMPTY={title:"",area:"Cuidados ao Idoso",location:"",state:"MA",description:"",requirements:"",salary:"",type:"CLT",status:"open"};

  const [jobs,setJobs]     = useState([]);
  const [apps,setApps]     = useState([]); // candidaturas recebidas
  const [open,setOpen]     = useState(false);
  const [viewApps,setViewApps] = useState(null); // vaga selecionada para ver candidaturas
  const [form,setForm]     = useState(EMPTY);
  const [loading,setLoading] = useState(false);
  const [saved,setSaved]   = useState(false);

  useEffect(()=>{
    dbList("jobs").then(setJobs);
    dbList("jobApplications").then(setApps);
  },[]);

  const save = async () => {
    if (!form.title||!form.location) return;
    setLoading(true);
    const id = await dbAdd("jobs",{...form, createdAt: new Date().toISOString()});
    setJobs(p=>[{id,...form},...p]);
    setSaved(true); setLoading(false);
    setTimeout(()=>setSaved(false),2000);
    setOpen(false); setForm(EMPTY);
  };

  const toggleStatus = async (job) => {
    const ns = job.status==="open"?"closed":"open";
    await dbUpdate("jobs",job.id,{status:ns});
    setJobs(p=>p.map(j=>j.id===job.id?{...j,status:ns}:j));
  };

  const removeJob = async (id) => {
    await dbUpdate("jobs",id,{status:"deleted"});
    setJobs(p=>p.filter(j=>j.id!==id));
  };

  const jobApps = viewApps ? apps.filter(a=>a.jobId===viewApps.id) : [];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:T.faint,fontSize:13}}>{jobs.filter(j=>j.status==="open").length} vaga{jobs.filter(j=>j.status==="open").length!==1?"s":""} abertas</span>
        <div style={{display:"flex",gap:8}}>
          <Btn variant="ghost" onClick={()=>window.open("?public=jobs","_blank")} style={{padding:"8px 14px",fontSize:12}}>🌐 Ver Página Pública</Btn>
          <Btn onClick={()=>{setForm(EMPTY);setOpen(true);}} style={{padding:"8px 16px",fontSize:13}}>+ Nova Vaga</Btn>
        </div>
      </div>

      {jobs.length===0&&<Card style={{textAlign:"center",padding:40}}><div style={{fontSize:36,marginBottom:12}}>💼</div><div style={{color:T.faint}}>Nenhuma vaga cadastrada</div></Card>}

      {jobs.map(job=>{
        const jobAppCount = apps.filter(a=>a.jobId===job.id).length;
        return (
          <Card key={job.id}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:6}}>
                  <span style={{color:T.text,fontWeight:700,fontSize:15}}>{job.title}</span>
                  <Pill color={job.status==="open"?T.green:T.red} bg={job.status==="open"?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.12)"}>{job.status==="open"?"🟢 Aberta":"🔴 Fechada"}</Pill>
                  <Pill color={T.dim} bg="rgba(255,255,255,0.06)">{job.type||"CLT"}</Pill>
                </div>
                <div style={{color:T.dim,fontSize:13,marginBottom:2}}>📍 {job.location}{job.state&&`, ${job.state}`} · {job.area}</div>
                {job.salary&&<div style={{color:T.green,fontSize:13,fontWeight:600}}>💰 {job.salary}</div>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>setViewApps(job)} style={{padding:"6px 14px",background:"rgba(96,165,250,0.1)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:8,color:T.blue,fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                📩 {jobAppCount} candidatura{jobAppCount!==1?"s":""}
              </button>
              <button onClick={()=>toggleStatus(job)} style={{padding:"6px 14px",background:job.status==="open"?"rgba(239,68,68,0.1)":"rgba(16,185,129,0.1)",border:`1px solid ${job.status==="open"?"rgba(239,68,68,0.25)":"rgba(16,185,129,0.25)"}`,borderRadius:8,color:job.status==="open"?T.red:T.green,fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                {job.status==="open"?"Fechar vaga":"Reabrir vaga"}
              </button>
              <button onClick={()=>removeJob(job.id)} style={{padding:"6px 14px",background:"rgba(239,68,68,0.06)",border:`1px solid rgba(239,68,68,0.15)`,borderRadius:8,color:"rgba(248,113,113,0.6)",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif"}}>Remover</button>
            </div>
          </Card>
        );
      })}

      {/* Modal nova vaga */}
      <Overlay open={open} onClose={()=>setOpen(false)} title="Nova Vaga" mobile={mobile}>
        <FInp label="Título da vaga *" value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="Ex: Personal Care Aide"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{marginBottom:14}}>
            <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Área</div>
            <select value={form.area} onChange={e=>setForm(p=>({...p,area:e.target.value}))} style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:13,fontFamily:"Georgia,serif"}}>
              {AREAS.map(a=><option key={a} value={a} style={{background:"#0D1117"}}>{a}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Tipo</div>
            <select value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))} style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:13,fontFamily:"Georgia,serif"}}>
              {["CLT","Part-time","Full-time","Contract","Seasonal"].map(t=><option key={t} value={t} style={{background:"#0D1117"}}>{t}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12}}>
          <FInp label="Cidade *" value={form.location} onChange={e=>setForm(p=>({...p,location:e.target.value}))} placeholder="Ex: Milford"/>
          <div style={{marginBottom:14}}>
            <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Estado</div>
            <select value={form.state} onChange={e=>setForm(p=>({...p,state:e.target.value}))} style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:13,fontFamily:"Georgia,serif"}}>
              {STATES.map(s=><option key={s} value={s} style={{background:"#0D1117"}}>{s}</option>)}
            </select>
          </div>
        </div>
        <FInp label="Salário / Faixa salarial" value={form.salary} onChange={e=>setForm(p=>({...p,salary:e.target.value}))} placeholder="Ex: $18–$22/hora"/>
        <div style={{marginBottom:14}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Descrição da vaga</div>
          <textarea value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} rows={4} placeholder="Descreva as responsabilidades..." style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:14,resize:"vertical",boxSizing:"border-box",fontFamily:"Georgia,serif"}}/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Requisitos</div>
          <textarea value={form.requirements} onChange={e=>setForm(p=>({...p,requirements:e.target.value}))} rows={3} placeholder="Ex: CNH, inglês básico..." style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:14,resize:"vertical",boxSizing:"border-box",fontFamily:"Georgia,serif"}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn onClick={save} disabled={loading} style={{flex:1}}>{loading?"Salvando…":saved?"✓ Salvo!":"Publicar Vaga"}</Btn>
          <Btn variant="ghost" onClick={()=>setOpen(false)} style={{flex:1}}>Cancelar</Btn>
        </div>
      </Overlay>

      {/* Modal candidaturas */}
      <Overlay open={!!viewApps} onClose={()=>setViewApps(null)} title={`Candidaturas — ${viewApps?.title}`} mobile={mobile}>
        {jobApps.length===0
          ? <div style={{color:T.faint,textAlign:"center",padding:30}}>Nenhuma candidatura ainda.</div>
          : <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {jobApps.map(a=>(
                <div key={a.id} style={{padding:"14px 16px",background:"rgba(255,255,255,0.04)",borderRadius:12,border:`1px solid ${T.border}`}}>
                  <div style={{color:T.text,fontWeight:600,fontSize:15,marginBottom:4}}>{a.name}</div>
                  <div style={{color:T.dim,fontSize:13,marginBottom:2}}>✉ {a.email}</div>
                  {a.phone&&<div style={{color:T.dim,fontSize:13,marginBottom:2}}>📱 {a.phone}</div>}
                  {a.message&&<div style={{color:T.faint,fontSize:12,marginTop:6,fontStyle:"italic"}}>"{a.message}"</div>}
                  <div style={{color:T.faint,fontSize:11,marginTop:6}}>{fmt(a.date)}</div>
                </div>
              ))}
            </div>
        }
      </Overlay>
    </div>
  );
}

    date:   {color:"#94a3b8",fontSize:13,marginBottom:40},

          <div style={s.circle}>Z</div>

        <h1 style={s.h1}>Política de Privacidade</h1>
        <div style={s.date}>Última atualização: abril de 2026</div>

        <h2 style={s.h2}>1. Quem somos</h2>
        <p style={s.p}>A Zion Solutions é uma empresa de consultoria em imigração que oferece serviços de assessoria para processos de Green Card e vistos nos Estados Unidos. Nosso portal do cliente é operado em <strong style={{color:"#e2e8f0"}}>zionsolution.netlify.app</strong>.</p>

        <h2 style={s.h2}>2. Quais dados coletamos</h2>
        <p style={s.p}>Coletamos apenas os dados necessários para a prestação dos serviços de imigração:</p>
        <ul style={{paddingLeft:24,marginBottom:16}}>
          {["Nome completo","Endereço de e-mail","Informações do processo imigratório (tipo de visto, sponsor, priority date)","Histórico de pagamentos e comprovantes","Mensagens trocadas com nossa equipe"].map((item,i)=><li key={i} style={s.li}>{item}</li>)}
        </ul>

        <h2 style={s.h2}>3. Como usamos seus dados</h2>
        <p style={s.p}>Seus dados são utilizados exclusivamente para:</p>
        <ul style={{paddingLeft:24,marginBottom:16}}>
          {["Gerenciar seu processo de imigração","Processar e registrar pagamentos","Enviar notificações sobre seu processo por e-mail","Comunicação entre você e nossa equipe","Cumprimento de obrigações legais"].map((item,i)=><li key={i} style={s.li}>{item}</li>)}
        </ul>

        <h2 style={s.h2}>4. Com quem compartilhamos</h2>
        <p style={s.p}>Não vendemos, alugamos ou compartilhamos seus dados pessoais com terceiros para fins comerciais. Seus dados podem ser compartilhados com:</p>
        <ul style={{paddingLeft:24,marginBottom:16}}>
          {["Google Firebase — armazenamento seguro e autenticação","EmailJS — envio de notificações por e-mail","Autoridades imigratórias (USCIS, DOL) quando exigido pelo processo"].map((item,i)=><li key={i} style={s.li}>{item}</li>)}
        </ul>

        <h2 style={s.h2}>5. Segurança</h2>
        <p style={s.p}>Seus dados são armazenados de forma segura no Google Firebase, com autenticação obrigatória para acesso. As senhas são criptografadas e nunca armazenadas em texto simples. O acesso ao portal é restrito por e-mail e senha pessoal.</p>

        <h2 style={s.h2}>6. Seus direitos</h2>
        <p style={s.p}>Você tem direito a acessar, corrigir, excluir ou exportar seus dados. Para exercer esses direitos, entre em contato pelo e-mail abaixo.</p>

        <h2 style={s.h2}>7. Retenção de dados</h2>
        <p style={s.p}>Seus dados são mantidos pelo período necessário para a conclusão do processo imigratório e cumprimento de obrigações legais, ou até que você solicite a exclusão.</p>

        <h2 style={s.h2}>8. Cookies</h2>

        <h2 style={s.h2}>9. Contato</h2>
        <div style={{padding:"20px 24px",background:"rgba(232,200,122,0.08)",border:"1px solid rgba(232,200,122,0.2)",borderRadius:14}}>
          <p style={{...s.p,marginBottom:4}}>Para dúvidas sobre privacidade ou seus dados:</p>
          <div style={{color:"#e2e8f0",fontSize:15,fontWeight:600}}>admin@zionsolutions.com</div>
          <div style={{color:"#94a3b8",fontSize:13,marginTop:4}}>Zion Solutions · zionsolution.netlify.app</div>
        </div>
      </div>
    </div>

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PUBLIC JOBS PAGE — sem login
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function PublicJobs() {
  const [jobs,setJobs]       = useState([]);
  const [loading,setLoading] = useState(true);
  const [applying,setApplying] = useState(null);
  const [form,setForm]       = useState({name:"",email:"",phone:"",message:""});
  const [sent,setSent]       = useState(false);
  const [submitting,setSubmitting] = useState(false);
  const [filter,setFilter]   = useState("all");

  useEffect(()=>{
    initFirebase().then(()=>{
      dbList("jobs", _db.where("status","==","open")).then(data=>{setJobs(data);setLoading(false);});
    });
  },[]);

  const apply = async () => {
    if (!form.name||!form.email) return;
    setSubmitting(true);
    await dbAdd("jobApplications",{jobId:applying.id,jobTitle:applying.title,...form,date:new Date().toISOString().split("T")[0]});
    setSent(true); setSubmitting(false);
    setTimeout(()=>{setSent(false);setApplying(null);setForm({name:"",email:"",phone:"",message:""});},3000);
  };

  const areas = ["all",...new Set(jobs.map(j=>j.area))];
  const visible = filter==="all" ? jobs : jobs.filter(j=>j.area===filter);

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,#060B18,#0D1829)`,fontFamily:"Georgia,serif",color:T.text}}>
      {/* Hero */}
      <div style={{borderBottom:`1px solid ${T.border}`,padding:"32px 24px",textAlign:"center",background:"rgba(0,0,0,0.2)"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:24,fontWeight:"bold",color:"#0A0F1E"}}>Z</div>
        <h1 style={{color:T.gold,fontSize:28,fontWeight:700,margin:"0 0 8px"}}>Vagas em Aberto</h1>
        <p style={{color:T.dim,fontSize:15,margin:0}}>Zion Solutions · Oportunidades para a comunidade brasileira nos EUA</p>
      </div>

      <div style={{maxWidth:800,margin:"0 auto",padding:"24px 16px 60px"}}>
        {/* Filtro por área */}
        {areas.length>1&&(
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24}}>
            {areas.map(a=>(
              <button key={a} onClick={()=>setFilter(a)} style={{padding:"7px 16px",borderRadius:99,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,background:filter===a?`linear-gradient(135deg,${T.goldDim},${T.gold})`:T.surface,color:filter===a?"#0A0F1E":T.dim,fontFamily:"Georgia,serif"}}>
                {a==="all"?"Todas as áreas":a}
              </button>
            ))}
          </div>
        )}

        {loading&&<div style={{textAlign:"center",color:T.faint,padding:40}}>Carregando vagas…</div>}
        {!loading&&visible.length===0&&<div style={{textAlign:"center",padding:60}}><div style={{fontSize:40,marginBottom:14}}>💼</div><div style={{color:T.faint,fontSize:16}}>Nenhuma vaga disponível no momento.</div><div style={{color:T.faint,fontSize:13,marginTop:8}}>Volte em breve ou entre em contato com a Zion Solutions.</div></div>}

        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {visible.map(job=>(
            <div key={job.id} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${T.border}`,borderRadius:18,padding:22}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:10}}>
                <div>
                  <h2 style={{color:T.text,fontSize:18,fontWeight:700,margin:"0 0 6px"}}>{job.title}</h2>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <Pill color={T.green} bg="rgba(16,185,129,0.12)">🟢 Vaga Aberta</Pill>
                    <Pill color={T.dim} bg="rgba(255,255,255,0.07)">{job.type}</Pill>
                    <Pill color={T.blue} bg="rgba(96,165,250,0.1)">{job.area}</Pill>
                  </div>
                </div>
                {job.salary&&<div style={{color:T.green,fontWeight:700,fontSize:16}}>💰 {job.salary}</div>}
              </div>
              <div style={{color:T.dim,fontSize:14,marginBottom:job.description?12:0}}>📍 {job.location}{job.state&&`, ${job.state}`}</div>
              {job.description&&<p style={{color:"rgba(255,255,255,0.7)",fontSize:14,lineHeight:1.7,margin:"0 0 10px",whiteSpace:"pre-wrap"}}>{job.description}</p>}
              {job.requirements&&<div style={{padding:"10px 14px",background:"rgba(255,255,255,0.04)",borderRadius:10,marginBottom:14}}><div style={{color:T.faint,fontSize:11,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4}}>Requisitos</div><p style={{color:T.dim,fontSize:13,margin:0,lineHeight:1.6}}>{job.requirements}</p></div>}
              <button onClick={()=>setApplying(job)} style={{padding:"11px 24px",background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,border:"none",borderRadius:10,color:"#0A0F1E",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif"}}>
                Quero me candidatar →
              </button>
            </div>
          ))}
        </div>

        <div style={{marginTop:40,textAlign:"center",color:T.faint,fontSize:12,lineHeight:1.8}}>
          Zion Solutions · abraçando histórias, construindo futuros<br/>
          <a href="/" style={{color:T.gold,textDecoration:"none"}}>← Acessar Portal do Cliente</a>
        </div>
      </div>

      {/* Overlay candidatura */}
      {applying&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:300,padding:16}}>
          <div style={{width:"100%",maxWidth:480,background:"#0F1829",borderRadius:"22px 22px 0 0",border:"1px solid rgba(255,255,255,0.1)",borderBottom:"none",padding:"28px 24px 36px",maxHeight:"90vh",overflowY:"auto"}}>
            {sent
              ? <div style={{textAlign:"center",padding:30}}>
                  <div style={{fontSize:48,marginBottom:16}}>✅</div>
                  <div style={{color:T.green,fontSize:20,fontWeight:700,marginBottom:8}}>Candidatura enviada!</div>
                  <div style={{color:T.dim,fontSize:14}}>A Zion Solutions entrará em contato em breve.</div>
                </div>
              : <>
                  <h3 style={{color:T.gold,margin:"0 0 4px",fontSize:18}}>Candidatura</h3>
                  <p style={{color:T.dim,fontSize:13,margin:"0 0 20px"}}>{applying.title} · {applying.location}</p>
                  <FInp label="Nome completo *" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Seu nome"/>
                  <FInp label="E-mail *" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} placeholder="seu@email.com"/>
                  <FInp label="WhatsApp / Telefone" value={form.phone} onChange={e=>setForm(p=>({...p,phone:e.target.value}))} placeholder="(555) 000-0000"/>
                  <div style={{marginBottom:20}}>
                    <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:6}}>Mensagem (opcional)</div>
                    <textarea value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} rows={3} placeholder="Conte um pouco sobre você..." style={{width:"100%",padding:"11px 14px",background:"rgba(255,255,255,0.07)",border:`1px solid ${T.border}`,borderRadius:10,color:T.text,fontSize:14,resize:"none",boxSizing:"border-box",fontFamily:"Georgia,serif"}}/>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <Btn onClick={apply} disabled={submitting} style={{flex:1}}>{submitting?"Enviando…":"Enviar Candidatura"}</Btn>
                    <Btn variant="ghost" onClick={()=>setApplying(null)} style={{flex:1}}>Cancelar</Btn>
                  </div>
                </>
            }
          </div>
        </div>
      )}
    </div>
  );
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DEV PANEL — logs, estatísticas, diagnóstico
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function DevPanel({payments,clients,messages,mobile}) {
  const [logs,setLogs]       = useState([]);
  const [tab,setTab]         = useState("logs");
  const [loading,setLoading] = useState(true);
  const [filter,setFilter]   = useState("all");
  const [clearing,setClearing] = useState(false);

  useEffect(()=>{
    setLoading(true);
    const unsub = dbListen("logs", data=>{
      const sorted = [...data].sort((a,b)=>(b.ts||"").localeCompare(a.ts||""));
      setLogs(sorted);
      setLoading(false);
    });
    return ()=>unsub();
  },[]);

  const clearLogs = async () => {
    if (!confirm("Apagar todos os logs? Esta ação não pode ser desfeita.")) return;
    setClearing(true);
    try {
      const { deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      for (const log of logs) {
        await deleteDoc(doc(_db.inst, "logs", log.id));
      }
      setLogs([]);
    } finally { setClearing(false); }
  };

  const ACTION_COLORS = {
    login:       T.green,
    logout:      T.dim,
    payment:     T.gold,
    message:     T.blue,
    client:      "#A78BFA",
    user:        "#F472B6",
    case:        T.amber,
    bulletin:    T.faint,
    error:       T.red,
  };

  const getColor = (action="") => {
    const key = Object.keys(ACTION_COLORS).find(k=>action.toLowerCase().includes(k));
    return key ? ACTION_COLORS[key] : T.dim;
  };

  const fmtTs = ts => {
    if (!ts) return "—";
    try { return new Date(ts).toLocaleString("pt-BR"); } catch{ return ts; }
  };

  const visibleLogs = filter==="all" ? logs : logs.filter(l=>l.action?.toLowerCase().includes(filter));

  // Estatísticas gerais
  const stats = {
    totalClients:   clients.length,
    totalPayments:  payments.length,
    totalConfirmed: payments.filter(p=>p.status==="confirmed").length,
    totalRevenue:   payments.filter(p=>p.status==="confirmed").reduce((s,p)=>s+p.amount,0),
    totalMessages:  messages.length,
    totalLogs:      logs.length,
    pendingPayments:payments.filter(p=>p.status==="pending_review").length,
    unreadMessages: messages.filter(m=>!m.read).length,

  const tabs = [{id:"logs",label:"📋 Logs"},{id:"stats",label:"📊 Estatísticas"},{id:"db",label:"🗄 Banco"}];

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Header Dev */}

        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
          <span style={{fontSize:28}}>⚡</span>
          <div>
            <div style={{color:"#A78BFA",fontWeight:700,fontSize:18}}>Developer Panel</div>
            <div style={{color:T.faint,fontSize:12}}>Acesso master — Zion Solutions Portal</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <span style={{padding:"3px 10px",borderRadius:99,background:"rgba(16,185,129,0.12)",color:T.green,fontSize:12}}>Firebase: Conectado</span>
          <span style={{padding:"3px 10px",borderRadius:99,background:"rgba(167,139,250,0.12)",color:"#A78BFA",fontSize:12}}>Role: developer</span>

        </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:8,background:"rgba(255,255,255,0.04)",padding:5,borderRadius:12,border:`1px solid ${T.border}`}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"8px 12px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,background:tab===t.id?"linear-gradient(135deg,#7C3AED,#A78BFA)":"transparent",color:tab===t.id?"#fff":T.dim,fontFamily:"Georgia,serif"}}>{t.label}</button>)}
      </div>

      {/* LOGS */}
      {tab==="logs"&&(

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>

          </div>

          {loading&&<div style={{color:T.faint,textAlign:"center",padding:30}}>Carregando logs…</div>}

          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:500,overflowY:"auto"}}>
            {visibleLogs.map(log=>(
              <div key={log.id} style={{padding:"10px 14px",background:"rgba(255,255,255,0.03)",borderRadius:10,border:`1px solid ${T.border}`,borderLeft:`3px solid ${getColor(log.action)}`}}>

                  <div style={{flex:1,minWidth:0}}>
                    <span style={{color:getColor(log.action),fontWeight:700,fontSize:13}}>{log.action||"—"}</span>
                    {log.details&&Object.keys(log.details).length>0&&(
                      <div style={{color:T.dim,fontSize:12,marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        {Object.entries(log.details).map(([k,v])=>`${k}: ${JSON.stringify(v)}`).join(" · ")}
                      </div>
                    )}
                  </div>
                  <div style={{color:T.faint,fontSize:11,flexShrink:0,textAlign:"right"}}>
                    {fmtTs(log.ts)}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* ESTATÍSTICAS */}
      {tab==="stats"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"1fr 1fr 1fr 1fr",gap:14}}>
            {[
              {label:"Clientes",       value:stats.totalClients,    color:"#A78BFA"},
              {label:"Receita Total",  value:fmtUSD(stats.totalRevenue), color:T.green},
              {label:"Pgtos Pendentes",value:stats.pendingPayments, color:stats.pendingPayments>0?T.amber:T.dim},
              {label:"Msgs Não Lidas", value:stats.unreadMessages,  color:stats.unreadMessages>0?T.blue:T.dim},
              {label:"Total Pgtos",    value:stats.totalPayments,   color:T.gold},
              {label:"Confirmados",    value:stats.totalConfirmed,  color:T.green},
              {label:"Mensagens",      value:stats.totalMessages,   color:T.blue},
              {label:"Logs",           value:stats.totalLogs,       color:"#A78BFA"},
            ].map(k=>(
              <Card key={k.label} style={{padding:16,textAlign:"center"}}>
                <div style={{color:k.color,fontSize:22,fontWeight:700}}>{k.value}</div>
                <div style={{color:T.faint,fontSize:11,marginTop:4}}>{k.label}</div>
              </Card>
            ))}
          </div>

          <Card>
            <h4 style={{color:"#A78BFA",margin:"0 0 16px"}}>Clientes cadastrados</h4>
            {clients.length===0&&<div style={{color:T.faint}}>Nenhum cliente.</div>}
            {clients.map(c=>{
              const pago=payments.filter(p=>p.clientId===(c.clientId||c.uid)&&p.status==="confirmed").reduce((s,p)=>s+p.amount,0);
              return (
                <div key={c.uid} style={{padding:"10px 0",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{color:T.text,fontWeight:600,fontSize:14}}>{c.name}</div>
                    <div style={{color:T.faint,fontSize:12}}>{c.email} · UID: {c.uid||c.id}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{color:T.green,fontWeight:700,fontSize:14}}>{fmtUSD(pago)}</div>
                    <div style={{color:T.faint,fontSize:11}}>pago</div>
                  </div>
                </div>
              );
            })}
          </Card>
        </div>
      )}

      {/* BANCO DE DADOS */}
      {tab==="db"&&(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Card>
            <h4 style={{color:"#A78BFA",margin:"0 0 14px"}}>Coleções do Firestore</h4>
            {[
              {col:"users",    count:null, desc:"Perfis de usuários (admin, client, developer)"},
              {col:"payments", count:payments.length, desc:"Todos os pagamentos e comprovantes"},
              {col:"messages", count:messages.length, desc:"Mensagens entre admin e clientes"},
              {col:"caseStatus",count:null, desc:"Status do processo de cada cliente"},
              {col:"bulletin", count:null, desc:"Visa Bulletin atual"},
              {col:"jobs",     count:null, desc:"Vagas publicadas"},
              {col:"jobApplications",count:null, desc:"Candidaturas recebidas"},
              {col:"logs",     count:logs.length, desc:"Logs do sistema (developer only)"},
            ].map(item=>(
              <div key={item.col} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:`1px solid ${T.border}`}}>
                <div>
                  <div style={{color:T.text,fontWeight:600,fontSize:14,fontFamily:"monospace"}}>{item.col}</div>
                  <div style={{color:T.faint,fontSize:12,marginTop:2}}>{item.desc}</div>
                </div>
                {item.count!==null&&<Pill color="#A78BFA" bg="rgba(124,58,237,0.12)">{item.count} docs</Pill>}
              </div>
            ))}
          </Card>

          <Card>
            <h4 style={{color:"#A78BFA",margin:"0 0 14px"}}>Configuração Firebase</h4>
            <div style={{fontFamily:"monospace",fontSize:12,color:T.dim,lineHeight:2}}>
              <div><span style={{color:"#A78BFA"}}>projectId:</span> zion-d233f</div>
              <div><span style={{color:"#A78BFA"}}>authDomain:</span> zion-d233f.firebaseapp.com</div>
              <div><span style={{color:"#A78BFA"}}>region:</span> nam5 (us-central)</div>
              <div><span style={{color:"#A78BFA"}}>emailjs:</span> service_uy9jrpi / template_8e8lszi</div>
              <div><span style={{color:"#A78BFA"}}>deploy:</span> zionsolution.netlify.app</div>
            </div>
          </Card>

          <Card style={{borderColor:"rgba(245,158,11,0.3)",background:"rgba(245,158,11,0.04)"}}>
            <h4 style={{color:T.amber,margin:"0 0 12px"}}>⚠️ EmailJS — Erro 412 (Gmail)</h4>

              O Gmail está bloqueando o envio por falta de permissão OAuth. Para corrigir:

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[
                "1. Acesse dashboard.emailjs.com",
                "2. Email Services → clique no Gmail → Disconnect",
                "3. Clique em Connect e faça login no Google",
                "4. Na tela do Google, role até o final e marque TODAS as permissões",

              ].map((step,i)=>(
                <div key={i} style={{padding:"8px 12px",background:"rgba(255,255,255,0.04)",borderRadius:8,color:T.dim,fontSize:12}}>{step}</div>
              ))}
            </div>
            <a href="https://dashboard.emailjs.com" target="_blank" rel="noreferrer" style={{display:"inline-block",marginTop:14,padding:"8px 16px",background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:9,color:T.amber,fontSize:13,textDecoration:"none"}}>

// APP ROOT — Firebase
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CLIENT PROFILE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// VISA HISTORY EDITOR
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const VISA_TYPES_ALL = ["B-1/B-2","F-1","F-2","J-1","H-1B","H-4","L-1","O-1","TN","E-2","EB-1","EB-2","EB-3","EAD","Green Card","Outro"];
const STATUS_LABELS = {
  "B-1/B-2": "Turista / Negócios",
  "F-1":     "Estudante",
  "F-2":     "Dependente de Estudante",
  "J-1":     "Intercâmbio",
  "H-1B":    "Trabalho Especializado",
  "H-4":     "Dependente H-1B",
  "L-1":     "Transferência Intraempresarial",
  "O-1":     "Habilidade Extraordinária",
  "TN":      "Profissional NAFTA/USMCA",
  "E-2":     "Investidor",
  "EB-1":    "Green Card EB-1",
  "EB-2":    "Green Card EB-2",

  "EAD":     "Autorização de Trabalho",

};

function VisaHistoryEditor({history, setHistory, mobile}) {
  const add = () => setHistory(p=>[...p, {type:"B-1/B-2",num:"",dateFrom:"",dateTo:"",notes:"",isCurrent:false}]);
  const upd = (i,k,v) => { const a=[...history]; a[i]={...a[i],[k]:v}; setHistory(a); };
  const rem = (i) => setHistory(history.filter((_,j)=>j!==i));

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{color:T.faint,fontSize:13}}>Adicione cada visto ou mudança de status na ordem cronológica</div>
        <Btn onClick={add} style={{padding:"7px 14px",fontSize:12}}>+ Adicionar</Btn>
      </div>

      {history.length===0&&(
        <div style={{textAlign:"center",padding:"24px 0",color:T.faint,fontSize:13}}>
          <div style={{fontSize:28,marginBottom:8}}>📜</div>
          Nenhum histórico adicionado.<br/>
          <span style={{fontSize:12}}>Ex: B-1/B-2 (entrada) → F-1 (mudança de status) → EB-3 (processo atual)</span>
        </div>
      )}

      {/* Timeline visual */}
      {history.length>0&&(
        <div style={{marginBottom:16,padding:"12px 16px",background:"rgba(96,165,250,0.06)",border:"1px solid rgba(96,165,250,0.15)",borderRadius:12}}>
          <div style={{color:T.blue,fontSize:12,fontWeight:600,marginBottom:10}}>📅 Timeline</div>
          <div style={{display:"flex",alignItems:"center",gap:0,overflowX:"auto",paddingBottom:4}}>
            {history.map((h,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",flexShrink:0}}>
                <div style={{textAlign:"center"}}>
                  <div style={{padding:"4px 10px",borderRadius:99,fontSize:11,fontWeight:700,
                    background:h.isCurrent?"rgba(16,185,129,0.2)":"rgba(255,255,255,0.08)",
                    color:h.isCurrent?T.green:T.dim,border:"1px solid "+(h.isCurrent?"rgba(16,185,129,0.4)":"rgba(255,255,255,0.1)")}}>
                    {h.type}
                  </div>
                  <div style={{color:T.faint,fontSize:10,marginTop:3}}>{h.dateFrom||"—"}</div>
                </div>
                {i<history.length-1&&<div style={{width:24,height:2,background:"rgba(255,255,255,0.15)",flexShrink:0,margin:"0 4px"}}/>}
              </div>
            ))}
          </div>
        </div>
      )}

      {history.map((h,i)=>(
        <div key={i} style={{marginBottom:14,padding:16,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{padding:"3px 10px",borderRadius:99,fontSize:12,fontWeight:700,
                background:h.isCurrent?"rgba(16,185,129,0.15)":"rgba(232,200,122,0.12)",
                color:h.isCurrent?T.green:T.gold}}>
                {h.type}
              </span>
              <span style={{color:T.faint,fontSize:12}}>{STATUS_LABELS[h.type]||""}</span>
            </div>
            <button onClick={()=>rem(i)} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:7,color:T.red,fontSize:12,cursor:"pointer",padding:"4px 10px",fontFamily:"Georgia,serif"}}>Remover</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"1fr 1fr 1fr",gap:12}}>
            <div style={{marginBottom:0}}>
              <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:7,fontWeight:600}}>Tipo de Status</div>
              <select value={h.type} onChange={e=>upd(i,"type",e.target.value)}
                style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>
                {VISA_TYPES_ALL.map(v=><option key={v} value={v} style={{background:"#0D1117"}}>{v} — {STATUS_LABELS[v]||v}</option>)}
              </select>
            </div>
            <FInp label="Número do visto/doc" value={h.num} onChange={e=>upd(i,"num",e.target.value)} placeholder="Ex: V0000000"/>
            <FInp label="Data de início" type="date" value={h.dateFrom} onChange={e=>upd(i,"dateFrom",e.target.value)}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"1fr 1fr 1fr",gap:12,marginTop:0}}>
            <FInp label="Data de término" type="date" value={h.dateTo} onChange={e=>upd(i,"dateTo",e.target.value)}/>
            <FInp label="Observações" value={h.notes} onChange={e=>upd(i,"notes",e.target.value)} placeholder="Ex: Mudança de status aprovada"/>
            <div style={{display:"flex",alignItems:"flex-end",paddingBottom:16}}>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
                <input type="checkbox" checked={h.isCurrent} onChange={e=>upd(i,"isCurrent",e.target.checked)}
                  style={{width:18,height:18,accentColor:T.green,cursor:"pointer"}}/>
                <span style={{color:T.dim,fontSize:13}}>Status atual</span>
              </label>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

    cpf:"", ssn:"", maritalStatus:"solteiro", occupation:"",
    addrStreet:"", addrCity:"", addrState:"", addrZip:"",
    passportNum:"", passportExp:"",
    visaType:"", visaNum:"", visaExp:"", entryDate:"", i94:"",
    eadNum:"", eadExp:"", aNumber:"",
    i20Num:"", i20School:"", i20Start:"", i20End:"",
    currentEmployer:"", currentRole:"", employmentStart:"", salary:"", prevEmployers:"",
  });
  const [visaHistory, setVisaHistory] = useState([]);

  // Load client data into form
  useEffect(()=>{
    const c = clientToView;
    if (!c) return;
    setForm({
      phone:          c.personal?.phone||"",
      whatsapp:       c.personal?.whatsapp||"",
      dob:            c.personal?.dob||"",
      nationality:    c.personal?.nationality||"Brasileira",
      cpf:            c.personal?.cpf||"",
      ssn:            c.personal?.ssn||"",
      maritalStatus:  c.personal?.maritalStatus||"solteiro",
      occupation:     c.personal?.occupation||"",
      addrStreet:     c.personal?.address?.street||"",
      addrCity:       c.personal?.address?.city||"",
      addrState:      c.personal?.address?.state||"",
      addrZip:        c.personal?.address?.zip||"",
      passportNum:    c.documents?.passportNum||"",
      passportExp:    c.documents?.passportExp||"",
      visaType:       c.documents?.visaType||"",
      visaNum:        c.documents?.visaNum||"",
      visaExp:        c.documents?.visaExp||"",
      entryDate:      c.documents?.entryDate||"",
      i94:            c.documents?.i94||"",
      eadNum:         c.documents?.eadNum||"",
      eadExp:         c.documents?.eadExp||"",
      aNumber:        c.documents?.aNumber||"",
      i20Num:         c.documents?.i20Num||"",
      i20School:      c.documents?.i20School||"",
      i20Start:       c.documents?.i20Start||"",
      i20End:         c.documents?.i20End||"",
      currentEmployer: c.employment?.currentEmployer||"",
      currentRole:    c.employment?.currentRole||"",
      employmentStart: c.employment?.employmentStart||"",
      salary:         c.employment?.salary||"",
      prevEmployers:  c.employment?.prevEmployers||"",
    });
    setVisaHistory(Array.isArray(c.documents?.visaHistory) ? c.documents.visaHistory : []);
  },[clientToView?.uid, clientToView?.id, selectedClient]);

  const savePersonal = async () => {
    const uid = clientToView?.uid || clientToView?.id;
    if (!uid) return;
    setSaving(true); setMsg(null);
    try {
      const update = {
        personal: {
          phone:form.phone, whatsapp:form.whatsapp, dob:form.dob,
          nationality:form.nationality, cpf:form.cpf, ssn:form.ssn,
          maritalStatus:form.maritalStatus, occupation:form.occupation,
          address:{street:form.addrStreet, city:form.addrCity, state:form.addrState, zip:form.addrZip},
        },
        documents: {
          passportNum:form.passportNum, passportExp:form.passportExp,
          visaType:form.visaType, visaNum:form.visaNum, visaExp:form.visaExp,
          entryDate:form.entryDate, i94:form.i94,
          eadNum:form.eadNum, eadExp:form.eadExp, aNumber:form.aNumber,
          i20Num:form.i20Num, i20School:form.i20School, i20Start:form.i20Start, i20End:form.i20End,

        },
        employment: {
          currentEmployer:form.currentEmployer, currentRole:form.currentRole,
          employmentStart:form.employmentStart, salary:form.salary,
          prevEmployers:form.prevEmployers,
        },
      };
      await dbUpdate("users", uid, update);
      if (setClients) setClients(p=>p.map(c=>(c.uid||c.id)===uid?{...c,...update}:c));
      setMsg({type:"success", text:"✓ Dados salvos com sucesso!"});
      setTimeout(()=>setMsg(null), 3000);
    } catch(e) {
      setMsg({type:"error", text:"Erro ao salvar: "+e.message});
    } finally { setSaving(false); }
  };

  const f = (k) => form[k];
  const s = (k) => (e) => setForm(p=>({...p,[k]:e.target.value}));
  const Section = ({icon, label}) => (
    <div style={{padding:"8px 12px",background:"rgba(232,200,122,0.08)",borderRadius:10,margin:"6px 0 16px",color:T.gold,fontSize:12,fontWeight:700,letterSpacing:"0.05em"}}>{icon} {label}</div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>

      {/* Admin: client selector */}
      {isAdmin&&(
        <Card>
          <div style={{color:T.dim,fontSize:12,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>Selecionar cliente</div>
          <select value={selectedClient?.uid||""} onChange={e=>{
            const c=clients.find(cl=>cl.uid===e.target.value||cl.id===e.target.value);
            setSelectedClient(c||null);
          }} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>
            <option value="" style={{background:"#0D1117"}}>— Selecione um cliente —</option>
            {clients.map(c=><option key={c.uid||c.id} value={c.uid||c.id} style={{background:"#0D1117"}}>{c.name}</option>)}

        </Card>
      )}

      {/* Show profile only when client selected (admin) or always (client) */}
      {(!isAdmin||selectedClient)&&(
        <>
          {/* Client info header */}
          <Card style={{background:"linear-gradient(135deg,rgba(200,169,110,0.12),rgba(232,200,122,0.05))",borderColor:"rgba(200,169,110,0.25)"}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{width:56,height:56,borderRadius:"50%",background:`linear-gradient(135deg,${T.goldDim},${T.gold})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:700,color:"#0A0F1E",flexShrink:0}}>

                <div style={{color:T.text,fontWeight:700,fontSize:18}}>{clientToView?.name}</div>
                <div style={{color:T.faint,fontSize:13,marginTop:2}}>{clientToView?.email}</div>
                <div style={{display:"flex",gap:8,marginTop:6}}>
                  <span style={{padding:"2px 10px",borderRadius:99,fontSize:11,fontWeight:700,background:"rgba(232,200,122,0.15)",color:T.gold}}>{clientToView?.caseType}</span>
                  <span style={{padding:"2px 10px",borderRadius:99,fontSize:11,background:"rgba(255,255,255,0.08)",color:T.dim}}>{clientToView?.sponsor}</span>
                </div>
              </div>
            </div>
          </Card>

          {/* Tabs */}
          <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"9px 16px",borderRadius:10,border:"none",cursor:"pointer",fontWeight:600,fontSize:13,whiteSpace:"nowrap",background:tab===t.id?`linear-gradient(135deg,${T.goldDim},${T.gold})`:"rgba(255,255,255,0.06)",color:tab===t.id?"#0A0F1E":T.dim,fontFamily:"Georgia,serif",flexShrink:0}}>

          {tab==="pessoal"&&(
            <Card>
              <Section icon="📞" label="Contato"/>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="Telefone" value={f("phone")} onChange={s("phone")} placeholder="(617) 000-0000"/>

              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="Data de nascimento" type="date" value={f("dob")} onChange={s("dob")}/>
                <FInp label="Nacionalidade" value={f("nationality")} onChange={s("nationality")} placeholder="Brasileira"/>

              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="CPF (Brasil)" value={f("cpf")} onChange={s("cpf")} placeholder="000.000.000-00"/>
                <FInp label="SSN (EUA, opcional)" value={f("ssn")} onChange={s("ssn")} placeholder="XXX-XX-XXXX"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <div style={{marginBottom:16}}>
                  <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:7,fontWeight:600}}>Estado Civil</div>
                  <select value={f("maritalStatus")} onChange={s("maritalStatus")} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>
                    {["solteiro","casado","divorciado","viúvo","união estável"].map(v=><option key={v} value={v} style={{background:"#0D1117"}}>{v.charAt(0).toUpperCase()+v.slice(1)}</option>)}

              </div>
              <Section icon="🏠" label="Endereço nos EUA"/>
              <FInp label="Rua e número" value={f("addrStreet")} onChange={s("addrStreet")} placeholder="123 Main St, Apt 2"/>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"2fr 1fr 1fr",gap:12}}>

              <Section icon="💼" label="Emprego Atual"/>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="Empregador" value={f("currentEmployer")} onChange={s("currentEmployer")} placeholder="Nome da empresa"/>
                <FInp label="Cargo / Função" value={f("currentRole")} onChange={s("currentRole")} placeholder="Ex: Cook, Caregiver"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="Data de início" type="date" value={f("employmentStart")} onChange={s("employmentStart")}/>
                <FInp label="Salário por hora ($)" type="number" value={f("salary")} onChange={s("salary")} placeholder="22.00"/>
              </div>
              {msg&&<div style={{padding:"10px 14px",background:msg.type==="success"?"rgba(16,185,129,0.12)":"rgba(239,68,68,0.12)",border:`1px solid ${msg.type==="success"?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:10,color:msg.type==="success"?T.green:T.red,fontSize:13,marginBottom:14}}>{msg.text}</div>}
              {!isAdmin&&<Btn onClick={savePersonal} disabled={saving} style={{width:"100%",marginTop:4}}>{saving?"Salvando…":"💾 Salvar dados pessoais"}</Btn>}
              {isAdmin&&<Btn onClick={savePersonal} disabled={saving} style={{width:"100%",marginTop:4}}>{saving?"Salvando…":"💾 Salvar alterações"}</Btn>}
            </Card>
          )}

          {/* TAB: Documentos */}
          {tab==="documentos"&&(
            <Card>
              <Section icon="🛂" label="Passaporte"/>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="Número do passaporte" value={f("passportNum")} onChange={s("passportNum")} placeholder="AB123456"/>
                <FInp label="Validade" type="date" value={f("passportExp")} onChange={s("passportExp")}/>
              </div>
              {f("passportExp")&&new Date(f("passportExp"))<new Date(Date.now()+180*24*60*60*1000)&&(
                <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,marginBottom:14,color:T.red,fontSize:13}}>⚠️ Passaporte vence em menos de 6 meses!</div>
              )}
              <Section icon="🇺🇸" label="Visto Atual"/>
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr 1fr":"1fr 1fr 1fr",gap:12}}>
                <div style={{marginBottom:16}}>
                  <div style={{color:"rgba(255,255,255,0.7)",fontSize:12,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:7,fontWeight:600}}>Tipo de Visto</div>
                  <select value={f("visaType")} onChange={s("visaType")} style={{width:"100%",padding:"13px 16px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#fff",fontSize:15,fontFamily:"Georgia,serif",outline:"none"}}>
                    {"Selecione,B-1/B-2,F-1,J-1,H-1B,H-4,L-1,O-1,TN,E-2,EB-1,EB-2,EB-3,Sem visto (EWI),Outro".split(",").map(v=><option key={v} value={v} style={{background:"#0D1117"}}>{v}</option>)}
                  </select>
                </div>
                <FInp label="Número do visto" value={f("visaNum")} onChange={s("visaNum")} placeholder="V0000000"/>
                <FInp label="Validade" type="date" value={f("visaExp")} onChange={s("visaExp")}/>
              </div>
              {f("visaExp")&&new Date(f("visaExp"))<new Date(Date.now()+90*24*60*60*1000)&&(
                <div style={{padding:"10px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,marginBottom:14,color:T.red,fontSize:13}}>⚠️ Visto vence em menos de 90 dias!</div>
              )}
              <div style={{display:"grid",gridTemplateColumns:mobile?"1fr":"1fr 1fr",gap:12}}>
                <FInp label="Data de entrada nos EUA" type="date" value={f("entryDate")} onChange={s("entryDate")}/>
                <FInp label="I-94 Number" value={f("i94")} onChange={s("i94")} placeholder="00000000000"/>
